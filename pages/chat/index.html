<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>智能客服</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- APP 全屏模式 -->
  <div id="app-chat" class="chat-app">
    <!-- 顶部导航栏 -->
    <header class="chat-header">
      <button class="btn-back" onclick="history.back()" aria-label="返回">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M15 19l-7-7 7-7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <div class="header-center">
        <span class="header-title" id="headerTitle">智能客服</span>
        <span class="header-status" id="headerStatus">在线</span>
      </div>
      <button class="btn-more" id="btnMore" aria-label="更多">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="5" r="1.5" fill="currentColor"/><circle cx="12" cy="12" r="1.5" fill="currentColor"/><circle cx="12" cy="19" r="1.5" fill="currentColor"/></svg>
      </button>
    </header>

    <!-- 更多菜单 -->
    <div class="more-menu hidden" id="moreMenu">
      <div class="more-menu-overlay" id="moreMenuOverlay"></div>
      <div class="more-menu-content">
        <button class="more-menu-item" id="btnTransferHuman">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><circle cx="12" cy="7" r="4" stroke="currentColor" stroke-width="1.5"/></svg>
          <span>转人工</span>
        </button>
        <button class="more-menu-item" id="btnEndChat">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          <span>结束会话</span>
        </button>
        <button class="more-menu-item" id="btnReport">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M12 9v4M12 17h.01M4.93 4.93l14.14 14.14M12 2a10 10 0 100 20 10 10 0 000-20z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span>举报</span>
        </button>
      </div>
    </div>

    <!-- 消息区域 -->
    <main class="chat-messages" id="chatMessages">
      <!-- 消息由 JS 动态渲染 -->
    </main>

    <!-- 转人工排队提示 -->
    <div class="queue-banner hidden" id="queueBanner">
      <div class="queue-spinner"></div>
      <span>正在为您转接人工客服，当前排队 <strong id="queueCount">3</strong> 人...</span>
      <button class="queue-cancel" id="btnCancelQueue">取消</button>
    </div>

    <!-- 底部输入区 -->
    <footer class="chat-input-area">
      <div class="input-toolbar">
        <button class="toolbar-btn" id="btnEmoji" aria-label="表情">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.5"/><path d="M8 14s1.5 2 4 2 4-2 4-2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><circle cx="9" cy="9" r="1" fill="currentColor"/><circle cx="15" cy="9" r="1" fill="currentColor"/></svg>
        </button>
        <button class="toolbar-btn" id="btnMedia" aria-label="图片/视频">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="18" height="18" rx="3" stroke="currentColor" stroke-width="1.5"/><circle cx="8.5" cy="8.5" r="1.5" stroke="currentColor" stroke-width="1.5"/><path d="M21 15l-5-5L5 21" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <button class="toolbar-btn" id="btnOrder" aria-label="订单">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><rect x="4" y="2" width="16" height="20" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M9 2v3h6V2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><line x1="8" y1="10" x2="16" y2="10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><line x1="8" y1="14" x2="13" y2="14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        </button>
      </div>
      <div class="input-row">
        <div class="input-wrapper">
          <textarea id="messageInput" placeholder="输入消息..." rows="1" maxlength="500"></textarea>
        </div>
        <button class="btn-send" id="btnSend" disabled aria-label="发送">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M22 2L11 13" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M22 2L15 22l-4-9-9-4L22 2z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>
    </footer>

    <!-- 表情面板 -->
    <div class="emoji-panel hidden" id="emojiPanel">
      <div class="emoji-grid" id="emojiGrid"></div>
    </div>

    <!-- 媒体选择面板 -->
    <div class="media-panel hidden" id="mediaPanel">
      <div class="media-options">
        <label class="media-option">
          <input type="file" accept="image/*" id="inputImage" hidden>
          <div class="media-icon">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="18" height="18" rx="3" stroke="currentColor" stroke-width="1.5"/><circle cx="8.5" cy="8.5" r="1.5" stroke="currentColor" stroke-width="1.5"/><path d="M21 15l-5-5L5 21" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>
          <span>图片</span>
        </label>
        <label class="media-option">
          <input type="file" accept="video/*" id="inputVideo" hidden>
          <div class="media-icon">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none"><rect x="2" y="4" width="15" height="16" rx="3" stroke="currentColor" stroke-width="1.5"/><path d="M17 9l5-3v12l-5-3V9z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>
          <span>视频</span>
        </label>
      </div>
    </div>

    <!-- 订单选择面板 -->
    <div class="order-panel hidden" id="orderPanel">
      <div class="order-panel-header">
        <span class="order-panel-title">选择订单</span>
      </div>
      <div class="order-list" id="orderList">
        <!-- 由 JS 渲染 -->
      </div>
    </div>

    <!-- 图片预览 -->
    <div class="image-preview-overlay hidden" id="imagePreview">
      <button class="preview-close" id="previewClose" aria-label="关闭">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none"><path d="M18 6L6 18M6 6l12 12" stroke="#fff" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
      <img id="previewImage" src="" alt="预览图片">
    </div>
  </div>

  <!-- PC 浮窗入口按钮 -->
  <button class="pc-chat-trigger hidden" id="pcChatTrigger" aria-label="联系客服">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none"><path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </button>

  <!-- Demo 模拟入口（实际项目中由路由参数/事件触发） -->
  <div class="demo-bar" id="demoBar">
    <button id="demoFromProduct">模拟：从商品页进入</button>
    <button id="demoAfterOrder">模拟：下单成功</button>
  </div>

  <script src="app.js"></script>
</body>
</html>
