<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>电商APP</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- SVG图标库 -->
    <div style="display: none;">
        <svg xmlns="http://www.w3.org/2000/svg">
            <symbol id="icon-back" viewBox="0 0 24 24"><path fill="currentColor" d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></symbol>
            <symbol id="icon-arrow-right" viewBox="0 0 24 24"><path fill="currentColor" d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6z"/></symbol>
            <symbol id="icon-signal" viewBox="0 0 24 24"><path fill="currentColor" d="M2 22h4V10H2v12zm6-6h4V2h-4v14zm6 6h4V6h-4v16zm6-10v10h4V12h-4z"/></symbol>
            <symbol id="icon-wifi" viewBox="0 0 24 24"><path fill="currentColor" d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-7.24 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></symbol>
            <symbol id="icon-store" viewBox="0 0 24 24"><path fill="currentColor" d="M20 4H4v2h16V4zm1 10v-2l-1-5H4l-1 5v2h1v6h10v-6h4v6h2v-6h1zm-9 4H6v-4h6v4z"/></symbol>
            <symbol id="icon-favorite" viewBox="0 0 24 24"><path fill="currentColor" d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></symbol>
            <symbol id="icon-chat" viewBox="0 0 24 24"><path fill="currentColor" d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z"/></symbol>
            <symbol id="icon-verified" viewBox="0 0 24 24"><path fill="currentColor" d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm-2 16l-4-4 1.41-1.41L10 14.17l6.59-6.59L18 9l-8 8z"/></symbol>
            <symbol id="icon-truck" viewBox="0 0 24 24"><path fill="currentColor" d="M18 18.5c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zm1.5-9l1.96 2.5H17V9.5h2.5m-11 9c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zM20 8h-3V4H3c-1.11 0-2 .89-2 2v11h2c0 1.66 1.34 3 3 3s3-1.34 3-3h6c0 1.66 1.34 3 3 3s3-1.34 3-3h2v-5l-3-4z"/></symbol>
            <symbol id="icon-fire" viewBox="0 0 24 24"><path fill="currentColor" d="M13.5.67s.74 2.65.74 4.8c0 2.06-1.35 3.73-3.41 3.73-2.07 0-3.63-1.67-3.63-3.73l.03-.36C5.21 7.51 4 10.62 4 14c0 4.42 3.58 8 8 8s8-3.58 8-8C20 8.61 17.41 3.8 13.5.67zM11.71 19c-1.78 0-3.22-1.4-3.22-3.14 0-1.62 1.05-2.76 2.81-3.12 1.77-.36 3.6-1.21 4.62-2.58.39 1.29.59 2.65.59 4.04 0 2.65-2.15 4.8-4.8 4.8z"/></symbol>
            <symbol id="icon-close" viewBox="0 0 24 24"><path fill="currentColor" d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></symbol>
        </svg>
    </div>
    <!-- 商品详情页 -->
    <div class="page" id="product-detail">
        <div class="status-bar">
            <span class="time">16:32</span>
            <div class="status-icons">
                <svg class="icon"><use href="#icon-signal"/></svg>
                <svg class="icon"><use href="#icon-wifi"/></svg>
                <span class="battery">86%</span>
            </div>
        </div>

        <div class="product-banner">
            <button class="back-btn">
                <svg class="icon"><use href="#icon-back"/></svg>
            </button>
            <img src="https://via.placeholder.com/375x400/ff69b4/ffffff?text=产品图片" alt="产品图片" class="product-image">
            <div class="banner-text">
                <h1>更精准<br>更灵敏</h1>
                <p>早测早发现</p>
            </div>
            <div class="page-indicator">1/8</div>
        </div>

        <div class="product-info">
            <div class="color-selector">
                <span>1色可选</span>
                <img src="https://via.placeholder.com/60x60" alt="颜色选项">
            </div>

            <div class="price-section">
                <span class="price-label">券后</span>
                <span class="current-price">¥0.79</span>
                <span class="original-price">¥2.37</span>
                <span class="sold">已售2545件</span>
            </div>

            <h2 class="product-title">慧韵早早孕笔(袋装) 1支验孕棒验孕笔测怀孕试纸 批发不含尿杯</h2>
            
            <div class="coupon-info">先用后付0元下单 ›</div>

            <div class="feature-box">
                <svg class="icon badge-icon"><use href="#icon-verified"/></svg>
                <span>官方授权，100%正品，假一赔十</span>
                <svg class="icon arrow-icon"><use href="#icon-arrow-right"/></svg>
            </div>

            <div class="feature-box">
                <svg class="icon badge-icon"><use href="#icon-truck"/></svg>
                <span>预计4小时发货 | 承诺24小时发货 晚发必赔</span>
                <svg class="icon arrow-icon"><use href="#icon-arrow-right"/></svg>
            </div>

            <div class="feature-box">
                <svg class="icon badge-icon"><use href="#icon-fire"/></svg>
                <span>热卖榜</span>
                <span class="rank">检测试纸 验孕试纸榜第5名</span>
                <svg class="icon arrow-icon"><use href="#icon-arrow-right"/></svg>
            </div>
        </div>

        <div class="bottom-bar">
            <div class="nav-icons">
                <div class="nav-item">
                    <svg class="icon"><use href="#icon-store"/></svg>
                    <span>店铺</span>
                </div>
                <div class="nav-item">
                    <svg class="icon"><use href="#icon-favorite"/></svg>
                    <span>收藏</span>
                </div>
                <div class="nav-item">
                    <svg class="icon"><use href="#icon-chat"/></svg>
                    <span>客服</span>
                </div>
            </div>
            <button class="buy-btn outline">采购车</button>
            <button class="buy-btn primary">先用后付¥0</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
