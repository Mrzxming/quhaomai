<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>优惠券弹窗 - 清新绿色</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', 'Microsoft YaHei', sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            z-index: 999;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .popup-container {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            z-index: 1000;
            animation: popIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        @keyframes popIn {
            0% { 
                transform: translate(-50%, -50%) scale(0) rotate(-10deg);
                opacity: 0;
            }
            100% { 
                transform: translate(-50%, -50%) scale(1) rotate(0deg);
                opacity: 1;
            }
        }

        .glow-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 400px;
            height: 400px;
            border-radius: 50%;
            border: 2px solid rgba(52, 199, 89, 0.4);
            pointer-events: none;
            animation: ringExpand 3s ease-out infinite;
        }

        .glow-ring:nth-child(2) {
            animation-delay: 1s;
        }

        .glow-ring:nth-child(3) {
            animation-delay: 2s;
        }

        @keyframes ringExpand {
            0% {
                width: 320px;
                height: 320px;
                opacity: 1;
            }
            100% {
                width: 520px;
                height: 520px;
                opacity: 0;
            }
        }

        .leaf-container {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
        }

        .leaf {
            position: absolute;
            width: 25px;
            height: 25px;
            animation: leafFloat 4s ease-in-out infinite;
        }

        @keyframes leafFloat {
            0%, 100% {
                opacity: 0.4;
                transform: translateY(0) rotate(0deg);
            }
            50% {
                opacity: 0.8;
                transform: translateY(-30px) rotate(180deg);
            }
        }

        .leaf:nth-child(1) { top: 15%; left: 10%; animation-delay: 0s; }
        .leaf:nth-child(2) { top: 25%; right: 12%; animation-delay: 0.5s; }
        .leaf:nth-child(3) { top: 45%; left: 15%; animation-delay: 1s; }
        .leaf:nth-child(4) { top: 35%; right: 10%; animation-delay: 1.5s; }
        .leaf:nth-child(5) { top: 60%; left: 8%; animation-delay: 2s; }
        .leaf:nth-child(6) { top: 55%; right: 8%; animation-delay: 2.5s; }

        .popup {
            width: 320px;
            background: linear-gradient(135deg, #34C759 0%, #30D158 50%, #34C759 100%);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 0 60px rgba(52, 199, 89, 0.7),
                        0 0 120px rgba(52, 199, 89, 0.5),
                        0 20px 60px rgba(0, 0, 0, 0.3);
            position: relative;
            animation: glowPulse 2s ease-in-out infinite;
        }

        @keyframes glowPulse {
            0%, 100% {
                box-shadow: 0 0 60px rgba(52, 199, 89, 0.7),
                            0 0 120px rgba(52, 199, 89, 0.5),
                            0 20px 60px rgba(0, 0, 0, 0.3);
            }
            50% {
                box-shadow: 0 0 80px rgba(52, 199, 89, 0.9),
                            0 0 160px rgba(52, 199, 89, 0.7),
                            0 20px 60px rgba(0, 0, 0, 0.3);
            }
        }

        .popup-header {
            padding: 18px 20px 15px;
            position: relative;
            overflow: hidden;
        }

        .shine-effect {
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            animation: shine 3s ease-in-out infinite;
        }

        @keyframes shine {
            to { left: 100%; }
        }

        .badge {
            display: inline-block;
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(10px);
            padding: 5px 14px;
            border-radius: 18px;
            font-size: 11px;
            color: #fff;
            font-weight: 700;
            margin-bottom: 12px;
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        .header-title {
            font-size: 16px;
            color: #fff;
            text-align: center;
            font-weight: 800;
            margin-bottom: 15px;
            text-shadow: 0 3px 15px rgba(0, 0, 0, 0.3);
            letter-spacing: 1px;
            position: relative;
            z-index: 1;
        }

        .header-subtitle {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.95);
            text-align: center;
            position: relative;
            z-index: 1;
            margin-bottom: 0;
        }

        .icon-wrapper {
            text-align: center;
            margin-bottom: 0;
            position: relative;
            z-index: 1;
            display: none;
        }

        .gift-icon {
            width: 70px;
            height: 70px;
            animation: giftBounce 2s ease-in-out infinite;
            filter: drop-shadow(0 10px 25px rgba(0, 0, 0, 0.3));
        }

        @keyframes giftBounce {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-12px) scale(1.05); }
        }

        .white-section {
            background: #fff;
            padding: 18px 20px 18px;
            border-radius: 0 0 24px 24px;
        }

        .amount-section {
            text-align: center;
            margin-bottom: 15px;
        }

        .amount {
            font-size: 64px;
            font-weight: 900;
            color: #34C759;
            line-height: 1;
            text-shadow: 0 4px 20px rgba(52, 199, 89, 0.3);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .amount-currency {
            font-size: 26px;
            vertical-align: super;
        }

        .amount-unit {
            font-size: 20px;
            margin-left: 3px;
        }

        .condition {
            font-size: 13px;
            color: #666;
            margin-top: 8px;
        }

        .message {
            font-size: 14px;
            color: #666;
            text-align: center;
            font-weight: 500;
            margin-bottom: 12px;
        }

        .timer-wrapper {
            text-align: center;
            margin-bottom: 15px;
        }

        .countdown {
            display: inline-flex;
            align-items: center;
            gap: 3px;
            font-size: 26px;
            color: #34C759;
            font-weight: 800;
            font-family: 'DIN Alternate', 'Arial', sans-serif;
            margin-bottom: 0;
        }

        .time-value {
            background: #F0FDF4;
            padding: 6px 10px;
            border-radius: 6px;
            min-width: 38px;
            text-align: center;
            border: 2px solid rgba(52, 199, 89, 0.2);
        }

        .time-separator {
            color: #34C759;
            font-weight: 700;
            margin: 0 1px;
        }

        .milliseconds {
            display: inline-block;
            background: #F0FDF4;
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 26px;
            color: #34C759;
            font-weight: 800;
            min-width: 38px;
            text-align: center;
            border: 2px solid rgba(52, 199, 89, 0.2);
        }

        .expire-hint {
            font-size: 12px;
            color: #999;
            margin-top: 6px;
        }

        .use-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #34C759, #30D158);
            color: #fff;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 8px 24px rgba(52, 199, 89, 0.4);
            transition: all 0.3s;
            letter-spacing: 2px;
        }

        .use-btn:active {
            transform: scale(0.98);
            box-shadow: 0 6px 20px rgba(52, 199, 89, 0.5);
        }

        .close-btn {
            position: absolute;
            bottom: -60px;
            left: 50%;
            transform: translateX(-50%);
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.2);
            border: 3px solid rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            position: relative;
        }

        .close-btn:active {
            transform: translateX(-50%) scale(0.95);
        }

        .close-btn-circle {
            position: absolute;
            top: -3px;
            left: -3px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 3px solid transparent;
            border-top-color: #fff;
            animation: countdown 10s linear forwards;
        }

        @keyframes countdown {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .close-btn-text {
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            color: rgba(255, 255, 255, 0.9);
            white-space: nowrap;
            font-weight: 600;
        }

        .close-icon {
            width: 20px;
            height: 20px;
            stroke: white;
            stroke-width: 3;
            position: relative;
            z-index: 1;
        }
    </style>
</head>
<body>
    <div class="overlay" onclick="closePopup()"></div>
    <div class="popup-container">
        <div class="glow-ring"></div>
        <div class="glow-ring"></div>
        <div class="glow-ring"></div>
        <div class="leaf-container">
            <svg class="leaf" viewBox="0 0 30 30">
                <path d="M15 5 Q25 10 25 20 Q25 25 20 25 Q15 25 15 20 Q15 15 10 10 Q5 5 15 5" 
                      fill="url(#leafGradient)" stroke="#30D158" stroke-width="1"/>
                <defs>
                    <linearGradient id="leafGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#34C759"/>
                        <stop offset="100%" style="stop-color:#30D158"/>
                    </linearGradient>
                </defs>
            </svg>
            <svg class="leaf" viewBox="0 0 30 30">
                <path d="M15 5 Q25 10 25 20 Q25 25 20 25 Q15 25 15 20 Q15 15 10 10 Q5 5 15 5" 
                      fill="url(#leafGradient2)" stroke="#30D158" stroke-width="1"/>
                <defs>
                    <linearGradient id="leafGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#34C759"/>
                        <stop offset="100%" style="stop-color:#30D158"/>
                    </linearGradient>
                </defs>
            </svg>
            <svg class="leaf" viewBox="0 0 30 30">
                <path d="M15 5 Q25 10 25 20 Q25 25 20 25 Q15 25 15 20 Q15 15 10 10 Q5 5 15 5" 
                      fill="url(#leafGradient3)" stroke="#30D158" stroke-width="1"/>
                <defs>
                    <linearGradient id="leafGradient3" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#34C759"/>
                        <stop offset="100%" style="stop-color:#30D158"/>
                    </linearGradient>
                </defs>
            </svg>
            <svg class="leaf" viewBox="0 0 30 30">
                <path d="M15 5 Q25 10 25 20 Q25 25 20 25 Q15 25 15 20 Q15 15 10 10 Q5 5 15 5" 
                      fill="url(#leafGradient4)" stroke="#30D158" stroke-width="1"/>
                <defs>
                    <linearGradient id="leafGradient4" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#34C759"/>
                        <stop offset="100%" style="stop-color:#30D158"/>
                    </linearGradient>
                </defs>
            </svg>
            <svg class="leaf" viewBox="0 0 30 30">
                <path d="M15 5 Q25 10 25 20 Q25 25 20 25 Q15 25 15 20 Q15 15 10 10 Q5 5 15 5" 
                      fill="url(#leafGradient5)" stroke="#30D158" stroke-width="1"/>
                <defs>
                    <linearGradient id="leafGradient5" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#34C759"/>
                        <stop offset="100%" style="stop-color:#30D158"/>
                    </linearGradient>
                </defs>
            </svg>
            <svg class="leaf" viewBox="0 0 30 30">
                <path d="M15 5 Q25 10 25 20 Q25 25 20 25 Q15 25 15 20 Q15 15 10 10 Q5 5 15 5" 
                      fill="url(#leafGradient6)" stroke="#30D158" stroke-width="1"/>
                <defs>
                    <linearGradient id="leafGradient6" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#34C759"/>
                        <stop offset="100%" style="stop-color:#30D158"/>
                    </linearGradient>
                </defs>
            </svg>
        </div>
        
        <div class="popup">
            <div class="popup-header">
                <div class="shine-effect"></div>
                <div style="text-align: center;">
                    <div class="badge">趣好卖</div>
                </div>
                <div class="header-title">限时优惠领取</div>
                <div class="header-subtitle">活动马上失效</div>
                
                <div class="icon-wrapper">
                    <svg class="gift-icon" viewBox="0 0 100 100">
                        <circle cx="50" cy="50" r="45" fill="url(#circleGradient)" opacity="0.2"/>
                        <path d="M50 20 L60 40 L80 45 L65 60 L68 80 L50 70 L32 80 L35 60 L20 45 L40 40 Z" 
                              fill="url(#starGradient)" stroke="#fff" stroke-width="2"/>
                        <circle cx="50" cy="50" r="15" fill="rgba(255,255,255,0.3)"/>
                        <defs>
                            <linearGradient id="circleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:#34C759"/>
                                <stop offset="100%" style="stop-color:#30D158"/>
                            </linearGradient>
                            <linearGradient id="starGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:#FFD700"/>
                                <stop offset="100%" style="stop-color:#FFA500"/>
                            </linearGradient>
                        </defs>
                    </svg>
                </div>
            </div>
            
            <div class="white-section">
                <div class="amount-section">
                    <div class="amount">
                        <span class="amount-currency">¥</span><span id="amount">5</span><span class="amount-unit">元</span>
                    </div>
                </div>
                
                <div class="timer-wrapper">
                    <div class="countdown">
                        <span class="time-value" id="minutes">10</span>
                        <span class="time-separator">:</span>
                        <span class="time-value" id="seconds">00</span>
                        <span class="time-separator">:</span>
                        <span class="milliseconds" id="milliseconds">00</span>
                    </div>
                </div>
                
                <button class="use-btn" onclick="useCoupon()">立即领取</button>
            </div>
        </div>
        
        <button class="close-btn" onclick="closePopup()">
            <div class="close-btn-circle"></div>
            <div class="close-btn-text"><span id="closeCountdown">10</span>s 后关闭</div>
            <svg class="close-icon" viewBox="0 0 24 24" fill="none">
                <path d="M18 6L6 18M6 6l12 12" stroke-linecap="round"/>
            </svg>
        </button>
    </div>

    <script>
        let totalMilliseconds = 10 * 60 * 1000;
        let closeCountdown = 10;

        function updateCountdown() {
            const minutes = Math.floor(totalMilliseconds / 60000);
            const seconds = Math.floor((totalMilliseconds % 60000) / 1000);
            const centiseconds = Math.floor((totalMilliseconds % 1000) / 10);

            document.getElementById('minutes').textContent = String(minutes).padStart(2, '0');
            document.getElementById('seconds').textContent = String(seconds).padStart(2, '0');
            document.getElementById('milliseconds').textContent = String(centiseconds).padStart(2, '0');

            if (totalMilliseconds > 0) {
                totalMilliseconds -= 10;
            }
        }

        function updateCloseCountdown() {
            document.getElementById('closeCountdown').textContent = closeCountdown;
            if (closeCountdown > 0) {
                closeCountdown--;
            } else {
                closePopup();
            }
        }

        setInterval(updateCountdown, 10);
        setInterval(updateCloseCountdown, 1000);
        updateCountdown();
        updateCloseCountdown();

        function closePopup() {
            document.querySelector('.popup-container').style.animation = 'none';
            document.querySelector('.popup-container').style.transform = 'translate(-50%, -50%) scale(0) rotate(10deg)';
            document.querySelector('.popup-container').style.opacity = '0';
            document.querySelector('.overlay').style.opacity = '0';
            setTimeout(() => {
                document.querySelector('.overlay').style.display = 'none';
                document.querySelector('.popup-container').style.display = 'none';
            }, 300);
        }

        function useCoupon() {
            alert('跳转到优惠券使用页面');
            closePopup();
        }
    </script>
</body>
</html>
