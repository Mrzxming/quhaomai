<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>优惠券弹窗 - 节日气球</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', 'Microsoft YaHei', sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            z-index: 999;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .popup-container {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            z-index: 1000;
            animation: bounceIn 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards;
        }

        @keyframes bounceIn {
            0% { 
                transform: translate(-50%, -50%) scale(0) rotate(-10deg);
                opacity: 0;
            }
            100% { 
                transform: translate(-50%, -50%) scale(1) rotate(0deg);
                opacity: 1;
            }
        }

        .glow-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 400px;
            height: 400px;
            border-radius: 50%;
            border: 2px solid rgba(255, 59, 92, 0.3);
            pointer-events: none;
            animation: ringExpand 3s ease-out infinite;
        }

        .glow-ring:nth-child(2) {
            animation-delay: 1s;
        }

        .glow-ring:nth-child(3) {
            animation-delay: 2s;
        }

        @keyframes ringExpand {
            0% {
                width: 320px;
                height: 320px;
                opacity: 1;
            }
            100% {
                width: 520px;
                height: 520px;
                opacity: 0;
            }
        }

        .confetti-container {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
        }

        .confetti {
            position: absolute;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            animation: confettiFall 4s ease-in-out infinite;
        }

        @keyframes confettiFall {
            0% {
                opacity: 0;
                transform: translateY(-50px) rotate(0deg);
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                opacity: 0;
                transform: translateY(50px) rotate(360deg);
            }
        }

        .confetti:nth-child(1) { background: #FF6B9D; top: 10%; left: 15%; animation-delay: 0s; }
        .confetti:nth-child(2) { background: #FFD700; top: 20%; right: 20%; animation-delay: 0.5s; }
        .confetti:nth-child(3) { background: #FF3B5C; top: 30%; left: 25%; animation-delay: 1s; }
        .confetti:nth-child(4) { background: #FFA07A; top: 40%; right: 15%; animation-delay: 1.5s; }
        .confetti:nth-child(5) { background: #FF6B9D; top: 50%; left: 10%; animation-delay: 2s; }
        .confetti:nth-child(6) { background: #FFD700; top: 60%; right: 25%; animation-delay: 2.5s; }

        .popup {
            width: 320px;
            background: #FF3B5C;
            border-radius: 20px;
            overflow: visible;
            box-shadow: 0 0 60px rgba(255, 59, 92, 0.7),
                        0 0 120px rgba(255, 59, 92, 0.5),
                        0 20px 60px rgba(255, 59, 92, 0.5);
            position: relative;
            animation: glowPulse 2s ease-in-out infinite;
        }

        @keyframes glowPulse {
            0%, 100% {
                box-shadow: 0 0 60px rgba(255, 59, 92, 0.7),
                            0 0 120px rgba(255, 59, 92, 0.5),
                            0 20px 60px rgba(255, 59, 92, 0.5);
            }
            50% {
                box-shadow: 0 0 80px rgba(255, 59, 92, 0.9),
                            0 0 160px rgba(255, 59, 92, 0.7),
                            0 20px 60px rgba(255, 59, 92, 0.5);
            }
        }

        .balloons {
            position: absolute;
            top: -80px;
            right: 20px;
            width: 100px;
            height: 100px;
        }

        .balloon {
            position: absolute;
            width: 40px;
            height: 50px;
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            animation: balloonFloat 3s ease-in-out infinite;
        }

        .balloon::after {
            content: '';
            position: absolute;
            bottom: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 1px;
            height: 20px;
            background: rgba(255, 255, 255, 0.5);
        }

        .balloon:nth-child(1) {
            background: linear-gradient(135deg, #FF6B9D, #FF3B5C);
            left: 0;
            animation-delay: 0s;
        }

        .balloon:nth-child(2) {
            background: linear-gradient(135deg, #FFA07A, #FF6347);
            left: 30px;
            top: 10px;
            animation-delay: 0.3s;
        }

        .balloon:nth-child(3) {
            background: linear-gradient(135deg, #FFD700, #FFA500);
            left: 60px;
            top: 5px;
            animation-delay: 0.6s;
        }

        @keyframes balloonFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .badge {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(10px);
            display: inline-block;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 12px;
            color: #fff;
            font-weight: 600;
            margin: 20px 0 0 20px;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .header-section {
            padding: 10px 25px 30px;
            text-align: center;
        }

        .event-title {
            font-size: 20px;
            color: #fff;
            margin-bottom: 25px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .amount-display {
            font-size: 80px;
            font-weight: 900;
            color: #fff;
            line-height: 1;
            text-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
            animation: scaleBreath 2s ease-in-out infinite;
            margin-bottom: 10px;
        }

        @keyframes scaleBreath {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08); }
        }

        .amount-currency {
            font-size: 36px;
            vertical-align: super;
        }

        .amount-unit {
            font-size: 20px;
            margin-left: 3px;
        }

        .amount-suffix {
            font-size: 24px;
            margin-left: 5px;
        }

        .white-card {
            background: #fff;
            border-radius: 20px 20px 0 0;
            padding: 30px 20px 20px;
            margin-top: 20px;
        }

        .countdown-wrapper {
            text-align: center;
            margin-bottom: 25px;
        }

        .countdown {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 32px;
            color: #FF3B5C;
            font-weight: 800;
            font-family: 'DIN Alternate', 'Arial', sans-serif;
            margin-bottom: 8px;
        }

        .time-value {
            background: linear-gradient(135deg, #FFF0F3, #FFE5EA);
            padding: 8px 12px;
            border-radius: 8px;
            min-width: 45px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(255, 59, 92, 0.15);
        }

        .time-separator {
            color: #FF3B5C;
            font-weight: 700;
            margin: 0 2px;
        }

        .milliseconds {
            display: inline-block;
            background: linear-gradient(135deg, #FFF0F3, #FFE5EA);
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 32px;
            color: #FF3B5C;
            font-weight: 800;
            min-width: 45px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(255, 59, 92, 0.15);
        }

        .expire-text {
            font-size: 13px;
            color: #999;
            margin-top: 8px;
        }

        .claim-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #FF3B5C, #FF6B9D);
            color: #fff;
            border: none;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 8px 24px rgba(255, 59, 92, 0.4);
            transition: all 0.3s;
            letter-spacing: 2px;
            position: relative;
            overflow: hidden;
        }

        .claim-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .claim-btn:active::before {
            width: 300px;
            height: 300px;
        }

        .claim-btn:active {
            transform: scale(0.98);
        }

        .btn-text {
            position: relative;
            z-index: 1;
        }

        .close-btn {
            position: absolute;
            bottom: -60px;
            left: 50%;
            transform: translateX(-50%);
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.2);
            border: 3px solid rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            position: relative;
        }

        .close-btn:active {
            transform: translateX(-50%) scale(0.95);
        }

        .close-btn-circle {
            position: absolute;
            top: -3px;
            left: -3px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 3px solid transparent;
            border-top-color: #fff;
            animation: countdown 5s linear forwards;
        }

        @keyframes countdown {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }

        .close-btn-text {
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            color: rgba(255, 255, 255, 0.9);
            white-space: nowrap;
            font-weight: 600;
        }

        .close-icon {
            width: 20px;
            height: 20px;
            stroke: white;
            stroke-width: 3;
            position: relative;
            z-index: 1;
        }
    </style>
</head>
<body>
    <div class="overlay" onclick="closePopup()"></div>
    <div class="popup-container">
        <div class="glow-ring"></div>
        <div class="glow-ring"></div>
        <div class="glow-ring"></div>
        <div class="confetti-container">
            <div class="confetti"></div>
            <div class="confetti"></div>
            <div class="confetti"></div>
            <div class="confetti"></div>
            <div class="confetti"></div>
            <div class="confetti"></div>
        </div>
        
        <div class="popup">
            <div class="balloons">
                <div class="balloon"></div>
                <div class="balloon"></div>
                <div class="balloon"></div>
            </div>
            
            <div class="badge">趣好卖</div>
            
            <div class="header-section">
                <div class="event-title">限时红包专享</div>
                
                <div class="amount-display">
                    <span class="amount-currency">¥</span><span id="amount">5</span><span class="amount-unit">元</span>
                </div>
            </div>
            
            <div class="white-card">
                <div class="countdown-wrapper">
                    <div class="countdown">
                        <span class="time-value" id="minutes">10</span>
                        <span class="time-separator">:</span>
                        <span class="time-value" id="seconds">00</span>
                        <span class="time-separator">:</span>
                        <span class="milliseconds" id="milliseconds">00</span>
                    </div>
                    <div class="expire-text">后失效</div>
                </div>
                
                <button class="claim-btn" onclick="useCoupon()">
                    <span class="btn-text">立即领取</span>
                </button>
            </div>
        </div>
        
        <button class="close-btn" onclick="closePopup()">
            <div class="close-btn-circle"></div>
            <div class="close-btn-text"><span id="closeCountdown">5</span>s 后关闭</div>
            <svg class="close-icon" viewBox="0 0 24 24" fill="none">
                <path d="M18 6L6 18M6 6l12 12" stroke-linecap="round"/>
            </svg>
        </button>
    </div>

    <script>
        let totalMilliseconds = 10 * 60 * 1000;
        let closeCountdown = 5;

        function updateCountdown() {
            const minutes = Math.floor(totalMilliseconds / 60000);
            const seconds = Math.floor((totalMilliseconds % 60000) / 1000);
            const centiseconds = Math.floor((totalMilliseconds % 1000) / 10);

            document.getElementById('minutes').textContent = String(minutes).padStart(2, '0');
            document.getElementById('seconds').textContent = String(seconds).padStart(2, '0');
            document.getElementById('milliseconds').textContent = String(centiseconds).padStart(2, '0');

            if (totalMilliseconds > 0) {
                totalMilliseconds -= 10;
            }
        }

        function updateCloseCountdown() {
            document.getElementById('closeCountdown').textContent = closeCountdown;
            if (closeCountdown > 0) {
                closeCountdown--;
            } else {
                closePopup();
            }
        }

        setInterval(updateCountdown, 10);
        setInterval(updateCloseCountdown, 1000);
        updateCountdown();
        updateCloseCountdown();

        function closePopup() {
            document.querySelector('.popup-container').style.animation = 'none';
            document.querySelector('.popup-container').style.transform = 'translate(-50%, -50%) scale(0)';
            document.querySelector('.popup-container').style.opacity = '0';
            document.querySelector('.overlay').style.opacity = '0';
            setTimeout(() => {
                document.querySelector('.overlay').style.display = 'none';
                document.querySelector('.popup-container').style.display = 'none';
            }, 300);
        }

        function useCoupon() {
            alert('跳转到优惠券使用页面');
            closePopup();
        }
    </script>
</body>
</html>
