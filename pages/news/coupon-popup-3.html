<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>优惠券弹窗 - 限时抢购</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', 'Microsoft YaHei', sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            z-index: 999;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .popup-container {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            z-index: 1000;
            animation: zoomIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes zoomIn {
            0% { 
                transform: translate(-50%, -50%) scale(0) rotateZ(-15deg);
                opacity: 0;
            }
            100% { 
                transform: translate(-50%, -50%) scale(1) rotateZ(0deg);
                opacity: 1;
            }
        }

        .glow-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 400px;
            height: 400px;
            border-radius: 50%;
            border: 2px solid rgba(255, 8, 68, 0.3);
            pointer-events: none;
            animation: ringExpand 3s ease-out infinite;
        }

        .glow-ring:nth-child(2) {
            animation-delay: 1s;
        }

        .glow-ring:nth-child(3) {
            animation-delay: 2s;
        }

        @keyframes ringExpand {
            0% {
                width: 320px;
                height: 320px;
                opacity: 1;
            }
            100% {
                width: 520px;
                height: 520px;
                opacity: 0;
            }
        }

        .star-container {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
        }

        .star {
            position: absolute;
            width: 0;
            height: 0;
            border-left: 4px solid transparent;
            border-right: 4px solid transparent;
            border-bottom: 7px solid #FFD700;
            animation: starTwinkle 3s ease-in-out infinite;
        }

        .star::after {
            content: '';
            position: absolute;
            width: 0;
            height: 0;
            left: -4px;
            top: 3px;
            border-left: 4px solid transparent;
            border-right: 4px solid transparent;
            border-top: 7px solid #FFD700;
        }

        @keyframes starTwinkle {
            0%, 100% {
                opacity: 0;
                transform: scale(0) rotate(0deg);
            }
            50% {
                opacity: 1;
                transform: scale(1) rotate(180deg);
            }
        }

        .star:nth-child(1) { top: 15%; left: 10%; animation-delay: 0s; }
        .star:nth-child(2) { top: 25%; right: 15%; animation-delay: 0.5s; }
        .star:nth-child(3) { top: 45%; left: 20%; animation-delay: 1s; }
        .star:nth-child(4) { top: 35%; right: 10%; animation-delay: 1.5s; }
        .star:nth-child(5) { top: 65%; left: 15%; animation-delay: 2s; }
        .star:nth-child(6) { top: 55%; right: 20%; animation-delay: 2.5s; }

        .popup {
            width: 320px;
            background: #fff;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 0 60px rgba(255, 8, 68, 0.6),
                        0 0 120px rgba(255, 8, 68, 0.4),
                        0 20px 60px rgba(0, 0, 0, 0.3);
            position: relative;
            animation: glowPulse 2s ease-in-out infinite;
        }

        @keyframes glowPulse {
            0%, 100% {
                box-shadow: 0 0 60px rgba(255, 8, 68, 0.6),
                            0 0 120px rgba(255, 8, 68, 0.4),
                            0 20px 60px rgba(0, 0, 0, 0.3);
            }
            50% {
                box-shadow: 0 0 80px rgba(255, 8, 68, 0.8),
                            0 0 160px rgba(255, 8, 68, 0.6),
                            0 20px 60px rgba(0, 0, 0, 0.3);
            }
        }

        .top-banner {
            background: linear-gradient(135deg, #FF0844 0%, #FFB199 100%);
            padding: 30px 20px 25px;
            position: relative;
            overflow: hidden;
        }

        .shine-effect {
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            animation: shine 3s ease-in-out infinite;
        }

        @keyframes shine {
            to { left: 100%; }
        }

        .main-title {
            font-size: 22px;
            color: #fff;
            font-weight: 700;
            margin-bottom: 25px;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
            letter-spacing: 1px;
        }

        .amount-section {
            text-align: center;
            margin-bottom: 10px;
        }

        .amount-large {
            font-size: 72px;
            font-weight: 900;
            color: #fff;
            line-height: 1;
            text-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.06); }
        }

        .amount-currency {
            font-size: 32px;
            vertical-align: super;
        }

        .amount-unit {
            font-size: 24px;
            margin-left: 5px;
        }

        .content-section {
            padding: 30px 20px 20px;
        }

        .status-text {
            font-size: 16px;
            color: #666;
            text-align: center;
            font-weight: 500;
            margin-bottom: 20px;
        }

        .timer-box {
            background: linear-gradient(135deg, #FFF5F5, #FFE8E8);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 25px;
            text-align: center;
        }

        .timer-title {
            font-size: 13px;
            color: #999;
            margin-bottom: 15px;
        }

        .countdown {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 32px;
            color: #FF0844;
            font-weight: 800;
            font-family: 'DIN Alternate', 'Arial', sans-serif;
            margin-bottom: 8px;
        }

        .time-value {
            background: #fff;
            padding: 8px 12px;
            border-radius: 8px;
            min-width: 45px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(255, 8, 68, 0.15);
        }

        .time-separator {
            color: #FF0844;
            font-weight: 700;
            margin: 0 2px;
        }

        .milliseconds {
            display: inline-block;
            background: #fff;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 32px;
            color: #FF0844;
            font-weight: 800;
            min-width: 45px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(255, 8, 68, 0.15);
        }

        .expire-hint {
            font-size: 13px;
            color: #999;
            margin-top: 8px;
        }

        .action-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #FF0844, #FF6B9D);
            color: #fff;
            border: none;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 8px 24px rgba(255, 8, 68, 0.4);
            transition: all 0.3s;
            letter-spacing: 2px;
            position: relative;
            overflow: hidden;
        }

        .action-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .action-btn:active::before {
            width: 300px;
            height: 300px;
        }

        .action-btn:active {
            transform: scale(0.98);
        }

        .btn-text {
            position: relative;
            z-index: 1;
        }

        .close-btn {
            position: absolute;
            bottom: -60px;
            left: 50%;
            transform: translateX(-50%);
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.2);
            border: 3px solid rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            position: relative;
        }

        .close-btn:active {
            transform: translateX(-50%) scale(0.95);
        }

        .close-btn-circle {
            position: absolute;
            top: -3px;
            left: -3px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 3px solid transparent;
            border-top-color: #fff;
            animation: countdown 5s linear forwards;
        }

        @keyframes countdown {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }

        .close-btn-text {
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            color: rgba(255, 255, 255, 0.9);
            white-space: nowrap;
            font-weight: 600;
        }

        .close-icon {
            width: 20px;
            height: 20px;
            stroke: white;
            stroke-width: 3;
            position: relative;
            z-index: 1;
        }

        .sparkle {
            position: absolute;
            width: 6px;
            height: 6px;
            background: #FFD700;
            border-radius: 50%;
            box-shadow: 0 0 10px #FFD700;
            animation: sparkleFloat 3s ease-in-out infinite;
        }

        @keyframes sparkleFloat {
            0%, 100% {
                opacity: 0;
                transform: translateY(0) scale(0);
            }
            50% {
                opacity: 1;
                transform: translateY(-20px) scale(1);
            }
        }

        .sparkle:nth-child(1) { top: 20%; left: 15%; animation-delay: 0s; }
        .sparkle:nth-child(2) { top: 40%; right: 20%; animation-delay: 0.5s; }
        .sparkle:nth-child(3) { top: 60%; left: 25%; animation-delay: 1s; }
        .sparkle:nth-child(4) { top: 30%; right: 15%; animation-delay: 1.5s; }
    </style>
</head>
<body>
    <div class="overlay" onclick="closePopup()"></div>
    <div class="popup-container">
        <div class="glow-ring"></div>
        <div class="glow-ring"></div>
        <div class="glow-ring"></div>
        <div class="star-container">
            <div class="star"></div>
            <div class="star"></div>
            <div class="star"></div>
            <div class="star"></div>
            <div class="star"></div>
            <div class="star"></div>
        </div>
        
        <div class="popup">
            <div class="top-banner">
                <div class="shine-effect"></div>
                <div class="sparkle"></div>
                <div class="sparkle"></div>
                <div class="sparkle"></div>
                <div class="sparkle"></div>
                
                <div class="main-title">限时专享优惠</div>
                
                <div class="amount-section">
                    <div class="amount-large">
                        <span class="amount-currency">¥</span><span id="amount">5</span><span class="amount-unit">元</span>
                    </div>
                </div>
            </div>
            
            <div class="content-section">
                <div class="status-text">你有待领取红包</div>
                
                <div class="timer-box">
                    <div class="timer-title">距离失效还剩</div>
                    <div class="countdown">
                        <span class="time-value" id="minutes">10</span>
                        <span class="time-separator">:</span>
                        <span class="time-value" id="seconds">00</span>
                        <span class="time-separator">:</span>
                        <span class="milliseconds" id="milliseconds">00</span>
                    </div>
                    <div class="expire-hint">后失效</div>
                </div>
                
                <button class="action-btn" onclick="useCoupon()">
                    <span class="btn-text">立即使用</span>
                </button>
            </div>
        </div>
        
        <button class="close-btn" onclick="closePopup()">
            <div class="close-btn-circle"></div>
            <div class="close-btn-text"><span id="closeCountdown">5</span>s 后关闭</div>
            <svg class="close-icon" viewBox="0 0 24 24" fill="none">
                <path d="M18 6L6 18M6 6l12 12" stroke-linecap="round"/>
            </svg>
        </button>
    </div>

    <script>
        let totalMilliseconds = 10 * 60 * 1000;
        let closeCountdown = 5;

        function updateCountdown() {
            const minutes = Math.floor(totalMilliseconds / 60000);
            const seconds = Math.floor((totalMilliseconds % 60000) / 1000);
            const centiseconds = Math.floor((totalMilliseconds % 1000) / 10);

            document.getElementById('minutes').textContent = String(minutes).padStart(2, '0');
            document.getElementById('seconds').textContent = String(seconds).padStart(2, '0');
            document.getElementById('milliseconds').textContent = String(centiseconds).padStart(2, '0');

            if (totalMilliseconds > 0) {
                totalMilliseconds -= 10;
            }
        }

        function updateCloseCountdown() {
            document.getElementById('closeCountdown').textContent = closeCountdown;
            if (closeCountdown > 0) {
                closeCountdown--;
            } else {
                closePopup();
            }
        }

        setInterval(updateCountdown, 10);
        setInterval(updateCloseCountdown, 1000);
        updateCountdown();
        updateCloseCountdown();

        function closePopup() {
            document.querySelector('.popup-container').style.animation = 'none';
            document.querySelector('.popup-container').style.transform = 'translate(-50%, -50%) scale(0) rotateZ(15deg)';
            document.querySelector('.popup-container').style.opacity = '0';
            document.querySelector('.overlay').style.opacity = '0';
            setTimeout(() => {
                document.querySelector('.overlay').style.display = 'none';
                document.querySelector('.popup-container').style.display = 'none';
            }, 300);
        }

        function useCoupon() {
            alert('跳转到优惠券使用页面');
            closePopup();
        }
    </script>
</body>
</html>
