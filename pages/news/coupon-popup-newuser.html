<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>新人限时专享</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', 'Microsoft YaHei', sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            z-index: 999;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .popup-container {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            z-index: 1000;
            animation: popIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        @keyframes popIn {
            0% { 
                transform: translate(-50%, -50%) scale(0);
                opacity: 0;
            }
            100% { 
                transform: translate(-50%, -50%) scale(1);
                opacity: 1;
            }
        }

        .glow-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 420px;
            height: 420px;
            border-radius: 50%;
            border: 2px solid rgba(255, 59, 92, 0.4);
            pointer-events: none;
            animation: ringExpand 3s ease-out infinite;
        }

        .glow-ring:nth-child(2) {
            animation-delay: 1s;
        }

        .glow-ring:nth-child(3) {
            animation-delay: 2s;
        }

        @keyframes ringExpand {
            0% {
                width: 340px;
                height: 340px;
                opacity: 1;
            }
            100% {
                width: 540px;
                height: 540px;
                opacity: 0;
            }
        }

        .light-rays {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
        }

        .ray {
            position: absolute;
            width: 8px;
            height: 8px;
            background: #FFD700;
            border-radius: 50%;
            box-shadow: 0 0 20px #FFD700, 0 0 40px #FFD700;
            animation: rayFloat 4s ease-in-out infinite;
        }

        @keyframes rayFloat {
            0%, 100% {
                opacity: 0;
                transform: translateY(0) scale(0);
            }
            50% {
                opacity: 1;
                transform: translateY(-40px) scale(1);
            }
        }

        .ray:nth-child(1) { top: 15%; left: 10%; animation-delay: 0s; }
        .ray:nth-child(2) { top: 25%; right: 12%; animation-delay: 0.5s; }
        .ray:nth-child(3) { top: 45%; left: 15%; animation-delay: 1s; }
        .ray:nth-child(4) { top: 35%; right: 18%; animation-delay: 1.5s; }
        .ray:nth-child(5) { top: 65%; left: 12%; animation-delay: 2s; }
        .ray:nth-child(6) { top: 55%; right: 15%; animation-delay: 2.5s; }

        .popup {
            width: 340px;
            background: linear-gradient(135deg, #FF3B5C 0%, #FF6B6B 50%, #FF3B5C 100%);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 0 60px rgba(255, 59, 92, 0.7),
                        0 0 120px rgba(255, 59, 92, 0.5),
                        0 20px 60px rgba(0, 0, 0, 0.3);
            position: relative;
            animation: glowPulse 2s ease-in-out infinite;
        }

        @keyframes glowPulse {
            0%, 100% {
                box-shadow: 0 0 60px rgba(255, 59, 92, 0.7),
                            0 0 120px rgba(255, 59, 92, 0.5),
                            0 20px 60px rgba(0, 0, 0, 0.3);
            }
            50% {
                box-shadow: 0 0 80px rgba(255, 59, 92, 0.9),
                            0 0 160px rgba(255, 59, 92, 0.7),
                            0 20px 60px rgba(0, 0, 0, 0.3);
            }
        }

        .popup-header {
            padding: 35px 20px 25px;
            position: relative;
            overflow: hidden;
        }

        .shine-effect {
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            animation: shine 3s ease-in-out infinite;
        }

        @keyframes shine {
            to { left: 100%; }
        }

        .header-title {
            font-size: 26px;
            color: #fff;
            text-align: center;
            font-weight: 800;
            margin-bottom: 10px;
            text-shadow: 0 3px 15px rgba(0, 0, 0, 0.4);
            letter-spacing: 3px;
            position: relative;
            z-index: 1;
        }

        .header-subtitle {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.95);
            text-align: center;
            position: relative;
            z-index: 1;
            margin-bottom: 20px;
        }

        .decorative-coins {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 0;
        }

        .coin {
            position: absolute;
            width: 35px;
            height: 35px;
            animation: coinFloat 4s ease-in-out infinite;
            filter: drop-shadow(0 4px 12px rgba(255, 215, 0, 0.6));
        }

        @keyframes coinFloat {
            0%, 100% {
                opacity: 0.4;
                transform: translateY(0) rotate(0deg);
            }
            50% {
                opacity: 0.8;
                transform: translateY(-25px) rotate(180deg);
            }
        }

        .coin:nth-child(1) { top: 8%; left: 8%; animation-delay: 0s; }
        .coin:nth-child(2) { top: 18%; right: 12%; animation-delay: 0.5s; }
        .coin:nth-child(3) { top: 38%; left: 12%; animation-delay: 1s; }
        .coin:nth-child(4) { top: 28%; right: 8%; animation-delay: 1.5s; }
        .coin:nth-child(5) { top: 50%; left: 5%; animation-delay: 2s; }
        .coin:nth-child(6) { top: 45%; right: 5%; animation-delay: 2.5s; }

        .coupons-section {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(15px);
            padding: 25px 15px;
            margin: 0 15px 25px;
            border-radius: 20px;
            border: 2px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        .coupons-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .coupon-card {
            background: linear-gradient(135deg, #FFFFFF 0%, #FFF5F7 100%);
            border-radius: 16px;
            padding: 15px 8px 12px;
            text-align: center;
            box-shadow: 0 6px 20px rgba(255, 59, 92, 0.2);
            position: relative;
            overflow: hidden;
            border: 2px solid rgba(255, 107, 107, 0.3);
            transition: all 0.3s;
        }

        .coupon-card:active {
            transform: scale(0.95);
        }

        .coupon-badge {
            position: absolute;
            top: 0;
            left: 0;
            background: linear-gradient(135deg, #FF3B5C, #FF6B6B);
            color: #fff;
            font-size: 9px;
            padding: 3px 8px;
            border-radius: 0 0 10px 0;
            font-weight: 700;
            box-shadow: 0 2px 8px rgba(255, 59, 92, 0.5);
        }

        .coupon-amount {
            font-size: 34px;
            font-weight: 900;
            color: #FF3B5C;
            margin: 10px 0 5px;
            line-height: 1;
            text-shadow: 0 2px 8px rgba(255, 59, 92, 0.3);
        }

        .coupon-currency {
            font-size: 16px;
            vertical-align: super;
        }

        .coupon-unit {
            font-size: 14px;
            margin-left: 2px;
        }

        .coupon-condition {
            font-size: 11px;
            color: #999;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .coupon-btn {
            width: 100%;
            padding: 7px 4px;
            background: linear-gradient(135deg, #FF3B5C, #FF6B6B);
            color: #fff;
            border: none;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(255, 59, 92, 0.4);
            transition: all 0.3s;
            white-space: nowrap;
        }

        .coupon-btn:active {
            transform: scale(0.95);
        }

        .timer-info {
            text-align: center;
            color: #fff;
            font-size: 14px;
            margin-bottom: 0;
            font-weight: 500;
        }

        .countdown {
            display: inline-flex;
            align-items: center;
            gap: 3px;
            font-size: 22px;
            color: #fff;
            font-weight: 800;
            font-family: 'DIN Alternate', 'Arial', sans-serif;
            margin: 0 5px;
        }

        .time-value {
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(10px);
            padding: 5px 10px;
            border-radius: 8px;
            min-width: 36px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
        }

        .time-separator {
            color: #fff;
            font-weight: 800;
        }

        .milliseconds {
            display: inline-block;
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(10px);
            padding: 5px 10px;
            border-radius: 8px;
            font-size: 22px;
            color: #fff;
            font-weight: 800;
            min-width: 36px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
        }

        .main-btn {
            width: calc(100% - 30px);
            margin: 0 15px 25px;
            padding: 18px;
            background: linear-gradient(135deg, #FFFFFF, #FFF5F7);
            color: #FF3B5C;
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 50px;
            font-size: 19px;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
            transition: all 0.3s;
            letter-spacing: 3px;
        }

        .main-btn:active {
            transform: scale(0.98);
        }

        .close-btn {
            position: absolute;
            bottom: -60px;
            left: 50%;
            transform: translateX(-50%);
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.2);
            border: 3px solid rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            position: relative;
        }

        .close-btn:active {
            transform: translateX(-50%) scale(0.95);
        }

        .close-btn-circle {
            position: absolute;
            top: -3px;
            left: -3px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 3px solid transparent;
            border-top-color: #fff;
            animation: countdown 10s linear forwards;
        }

        @keyframes countdown {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .close-btn-text {
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            color: rgba(255, 255, 255, 0.9);
            white-space: nowrap;
            font-weight: 600;
        }

        .close-icon {
            width: 20px;
            height: 20px;
            stroke: white;
            stroke-width: 3;
            position: relative;
            z-index: 1;
        }
    </style>
</head>
<body>
    <div class="overlay" onclick="closePopup()"></div>
    <div class="popup-container">
        <div class="glow-ring"></div>
        <div class="glow-ring"></div>
        <div class="glow-ring"></div>
        <div class="light-rays">
            <div class="ray"></div>
            <div class="ray"></div>
            <div class="ray"></div>
            <div class="ray"></div>
            <div class="ray"></div>
            <div class="ray"></div>
        </div>
        
        <div class="popup">
            <div class="popup-header">
                <div class="shine-effect"></div>
                <div class="decorative-coins">
                    <svg class="coin" viewBox="0 0 40 40">
                        <circle cx="20" cy="20" r="18" fill="url(#coinGradient)" stroke="#FFA500" stroke-width="2"/>
                        <text x="20" y="26" text-anchor="middle" font-size="20" font-weight="bold" fill="#FF6F00">¥</text>
                        <defs>
                            <linearGradient id="coinGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:#FFD700"/>
                                <stop offset="100%" style="stop-color:#FFA500"/>
                            </linearGradient>
                        </defs>
                    </svg>
                    <svg class="coin" viewBox="0 0 40 40">
                        <circle cx="20" cy="20" r="18" fill="url(#coinGradient2)" stroke="#FFA500" stroke-width="2"/>
                        <text x="20" y="26" text-anchor="middle" font-size="20" font-weight="bold" fill="#FF6F00">¥</text>
                        <defs>
                            <linearGradient id="coinGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:#FFD700"/>
                                <stop offset="100%" style="stop-color:#FFA500"/>
                            </linearGradient>
                        </defs>
                    </svg>
                    <svg class="coin" viewBox="0 0 40 40">
                        <circle cx="20" cy="20" r="18" fill="url(#coinGradient3)" stroke="#FFA500" stroke-width="2"/>
                        <text x="20" y="26" text-anchor="middle" font-size="20" font-weight="bold" fill="#FF6F00">¥</text>
                        <defs>
                            <linearGradient id="coinGradient3" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:#FFD700"/>
                                <stop offset="100%" style="stop-color:#FFA500"/>
                            </linearGradient>
                        </defs>
                    </svg>
                    <svg class="coin" viewBox="0 0 40 40">
                        <circle cx="20" cy="20" r="18" fill="url(#coinGradient4)" stroke="#FFA500" stroke-width="2"/>
                        <text x="20" y="26" text-anchor="middle" font-size="20" font-weight="bold" fill="#FF6F00">¥</text>
                        <defs>
                            <linearGradient id="coinGradient4" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:#FFD700"/>
                                <stop offset="100%" style="stop-color:#FFA500"/>
                            </linearGradient>
                        </defs>
                    </svg>
                    <svg class="coin" viewBox="0 0 40 40">
                        <circle cx="20" cy="20" r="18" fill="url(#coinGradient5)" stroke="#FFA500" stroke-width="2"/>
                        <text x="20" y="26" text-anchor="middle" font-size="20" font-weight="bold" fill="#FF6F00">¥</text>
                        <defs>
                            <linearGradient id="coinGradient5" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:#FFD700"/>
                                <stop offset="100%" style="stop-color:#FFA500"/>
                            </linearGradient>
                        </defs>
                    </svg>
                    <svg class="coin" viewBox="0 0 40 40">
                        <circle cx="20" cy="20" r="18" fill="url(#coinGradient6)" stroke="#FFA500" stroke-width="2"/>
                        <text x="20" y="26" text-anchor="middle" font-size="20" font-weight="bold" fill="#FF6F00">¥</text>
                        <defs>
                            <linearGradient id="coinGradient6" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:#FFD700"/>
                                <stop offset="100%" style="stop-color:#FFA500"/>
                            </linearGradient>
                        </defs>
                    </svg>
                </div>
                <div class="header-title">新人限时专享</div>
                <div class="header-subtitle">现在下单锁定优惠</div>
            </div>
            
            <div class="coupons-section">
                <div class="coupons-grid">
                    <div class="coupon-card">
                        <div class="coupon-badge">新人专享</div>
                        <div class="coupon-amount">
                            <span class="coupon-currency">¥</span>3<span class="coupon-unit">元</span>
                        </div>
                        <div class="coupon-condition">满10可用</div>
                        <button class="coupon-btn" onclick="useCoupon(3)">立即领取</button>
                    </div>
                    <div class="coupon-card">
                        <div class="coupon-badge">新人专享</div>
                        <div class="coupon-amount">
                            <span class="coupon-currency">¥</span>1<span class="coupon-unit">元</span>
                        </div>
                        <div class="coupon-condition">满1可用</div>
                        <button class="coupon-btn" onclick="useCoupon(1)">立即领取</button>
                    </div>
                    <div class="coupon-card">
                        <div class="coupon-badge">新人专享</div>
                        <div class="coupon-amount">
                            <span class="coupon-currency">¥</span>5<span class="coupon-unit">元</span>
                        </div>
                        <div class="coupon-condition">满19可用</div>
                        <button class="coupon-btn" onclick="useCoupon(5)">立即领取</button>
                    </div>
                </div>
                
                <div class="timer-info">
                    <div class="countdown">
                        <span class="time-value" id="minutes">10</span>
                        <span class="time-separator">:</span>
                        <span class="time-value" id="seconds">00</span>
                        <span class="time-separator">:</span>
                        <span class="milliseconds" id="milliseconds">00</span>
                    </div>
                    后失效
                </div>
            </div>
            
            <button class="main-btn" onclick="useAllCoupons()">立即领取</button>
        </div>
        
        <button class="close-btn" onclick="closePopup()">
            <div class="close-btn-circle"></div>
            <div class="close-btn-text"><span id="closeCountdown">5</span>s 后关闭</div>
            <svg class="close-icon" viewBox="0 0 24 24" fill="none">
                <path d="M18 6L6 18M6 6l12 12" stroke-linecap="round"/>
            </svg>
        </button>
    </div>

    <script>
        let totalMilliseconds = 10 * 60 * 1000;
        let closeCountdown = 10;

        function updateCountdown() {
            const minutes = Math.floor(totalMilliseconds / 60000);
            const seconds = Math.floor((totalMilliseconds % 60000) / 1000);
            const centiseconds = Math.floor((totalMilliseconds % 1000) / 10);

            document.getElementById('minutes').textContent = String(minutes).padStart(2, '0');
            document.getElementById('seconds').textContent = String(seconds).padStart(2, '0');
            document.getElementById('milliseconds').textContent = String(centiseconds).padStart(2, '0');

            if (totalMilliseconds > 0) {
                totalMilliseconds -= 10;
            }
        }

        function updateCloseCountdown() {
            document.getElementById('closeCountdown').textContent = closeCountdown;
            if (closeCountdown > 0) {
                closeCountdown--;
            } else {
                closePopup();
            }
        }

        setInterval(updateCountdown, 10);
        setInterval(updateCloseCountdown, 1000);
        updateCountdown();
        updateCloseCountdown();

        function closePopup() {
            document.querySelector('.popup-container').style.animation = 'none';
            document.querySelector('.popup-container').style.transform = 'translate(-50%, -50%) scale(0)';
            document.querySelector('.popup-container').style.opacity = '0';
            document.querySelector('.overlay').style.opacity = '0';
            setTimeout(() => {
                document.querySelector('.overlay').style.display = 'none';
                document.querySelector('.popup-container').style.display = 'none';
            }, 300);
        }

        function useCoupon(amount) {
            alert('领取 ¥' + amount + ' 元优惠券');
        }

        function useAllCoupons() {
            alert('跳转到优惠券使用页面');
            closePopup();
        }
    </script>
</body>
</html>
