			// 是否需要上传营业执照信息（0是不需要传了，上传过）
			is_need_up_user_type_data() {
				return this.checkoutInfo && this.checkoutInfo.is_need_up_user_type_data !== undefined

			},
			isConditionMet() {
				  return (
					this.checkoutInfo.use_membership_card > 0 &&
					this.vipCard.membership_card_discount_price > 0
				  );
				},
			// 匹配 商品名称和商品规格
			processedGoodsList() {
				// 安全检查：确保数据存在且是数组
				if (!this.checkoutInfo || typeof this.checkoutInfo !== 'object' || !this.checkoutInfo.goods_list || !Array.isArray(this.checkoutInfo.goods_list) || this.checkoutInfo.goods_list.length === 0) {
					return [];
				}
				
				return this.checkoutInfo.goods_list.map(shop => {
						const {
							goods,
							goods_new
						} = shop;
						// 创建一个映射，以 goods_id 为键，值为对应的所有相关的 goods_new 项
						const goodsNewMap = new Map();
					
						goods_new.forEach((subArray, groupIndex) => {
							subArray.forEach(newItem => {
								if (!goodsNewMap.has(newItem.goods_id)) {
									goodsNewMap.set(newItem.goods_id, []);
								}
								goodsNewMap.get(newItem.goods_id).push({
									...newItem,
									group: groupIndex // 记录该项属于哪个子数组组
								});
							});
						});
					
						// 处理每个商品
						const updatedGoods = goods.map(good => {
							const goodsId = good.goods_id;
							const newItemsData = goodsNewMap.get(goodsId) || [];
					
							if (newItemsData.length > 0) {
								// 分类处理 goods_new 项为 goods_attrs 和 gifts
								const classifiedItems = {
									goods_attrs: [],
									gifts: []
								};
					
								newItemsData.forEach(newItem => {
									if (newItem.goods_attr && newItem.goods_attr.trim() !== "") {
										classifiedItems.goods_attrs.push({
											goods_attr: newItem.goods_attr.trim(),
											goods_price_format: newItem.goods_price_format,
											goods_number: newItem.goods_number,
											group: newItem.group // 保留组信息
										});
									} else {
										classifiedItems.gifts.push({
											goods_price_format: newItem.goods_price_format,
											goods_number: newItem.goods_number,
											group: newItem.group // 保留组信息
										});
									}
								});
					
								// 按组组织 goods_attrs 和 gifts
								const groupedByGroup = {};
					
								classifiedItems.goods_attrs.forEach(attr => {
									if (!groupedByGroup[attr.group]) {
										groupedByGroup[attr.group] = {
											goods_attrs: [],
											gifts: []
										};
									}
									groupedByGroup[attr.group].goods_attrs.push(attr);
								});
					
								classifiedItems.gifts.forEach(gift => {
									if (!groupedByGroup[gift.group]) {
										groupedByGroup[gift.group] = {
											goods_attrs: [],
											gifts: []
										};
									}
									groupedByGroup[gift.group].gifts.push(gift);
								});
					
								// 获取所有组别
								const groupKeys = Object.keys(groupedByGroup);
					
								// 将 groupedByGroup 转换为数组形式，便于模板展示
								const newItems = groupKeys.map(groupKey => ({
									group: `分组 ${parseInt(groupKey) + 1}`, // 组别名称
									goods_attrs: groupedByGroup[groupKey].goods_attrs,
									gifts: groupedByGroup[groupKey].gifts
								}));
					
								return {
									...good,
									newItems: newItems.length > 0 ? newItems : {
										goods_attrs: [],
										gifts: []
									}
								};
							} else {
								// 没有对应的 goods_new 项，标记为赠品
								return {
									...good,
									newItems: {
										goods_attrs: [],
										gifts: [{
											goods_price_format: "0.00",
											goods_number: 1,
											group: "无" // 可选
										}]
									}
								};
							}
						});
					
						return {
							...shop,
							goods: updatedGoods
						};
					});
			},
			// 过滤 服务
			consignee_address() {
				if (this.checkoutInfo.consignee) {
					return this.checkoutInfo.consignee.province_name + this.checkoutInfo.consignee.city_name + this
						.checkoutInfo.consignee.district_name + this.checkoutInfo.consignee.street_name + this.checkoutInfo

				} else {
					return ''

			cart_id() {
				let rec_ids = []
				if (this.checkoutInfo.goods_list) {
					this.checkoutInfo.goods_list.forEach((v) => {
						v.goods.forEach((res) => {

			couponsList() {

			},
			// 获取已选储值卡的余额总值（用于显示）
			selectedValueCardBalance() {
				// 【关键修复】当弹窗打开时，使用临时状态 tempValueCardId；关闭时，使用实际状态 valueCardObject.valueCardId
				const activeCardId = this.valueCardObject.valueCardBase ? this.tempValueCardId : this.valueCardObject.valueCardId;
				
				if (!activeCardId || activeCardId <= 0) {
					return '';
				}
				if (!this.checkoutInfo || !this.checkoutInfo.value_card || !Array.isArray(this.checkoutInfo.value_card)) {
					return '';
				}
				// 查找已选中的储值卡
				const selectedCard = this.checkoutInfo.value_card.find(card => Number(card.vid) === Number(activeCardId));
				if (selectedCard) {
					// 返回格式化后的余额（使用 card_money 余额，而不是 vc_value 面额）
					const balance = Number(selectedCard.card_money || 0) || 0;
					return balance > 0 ? this.currency + this.formatCurrencyValue(balance) : '';
				}
				return '';
			},
			payment_method() {
				return this.checkoutInfo.payment_list ? this.checkoutInfo.payment_list : ''
			},
			total: {
				get() {
					return this.checkoutInfo && this.checkoutInfo.total ? this.checkoutInfo.total : ''
				},
				set(val) {}
			},
			
			amountPrice : {
				get() {
					// 积分兑换场景仍沿用后端返回的积分值
					if (this.total && this.rec_type == 4) {
						this.price = this.total.exchange_integral;
						this.currency = '';
						return this.price;
					}

					// 优先使用 checkoutInfo.total.amount，其次 this.total.amount
					const totalObj = this.checkoutInfo && this.checkoutInfo.total
						? this.checkoutInfo.total
						: (this.total || null);
					const rawAmount = totalObj && totalObj.amount !== undefined
						? Number(totalObj.amount || 0)
						: 0;

					// 统一做一次精度处理
					if (this.moneyPrecision) {
						return this.moneyPrecision(rawAmount);
					}
					return Number(rawAmount.toFixed ? rawAmount.toFixed(2) : rawAmount);
				},
				set(val) {
					const num = Number(val || 0);
					if (this.checkoutInfo && this.checkoutInfo.total) {
						this.$set(this.checkoutInfo.total, 'amount', num);
					} else if (this.total) {
						this.$set(this.total, 'amount', num);
					}
				}
			},
			
			payableAmount() {
				return this.moneyPrecision(parseFloat(this.amountPrice) || 0);
			},
			amountPriceFormated() {
				const value = this.payableAmount;
				return value > 0 ? value.toFixed(2) : '0.00';
			},
			shipping() {
				let arr = []
				if (this.checkoutInfo.goods_list) {
					this.checkoutInfo.goods_list.forEach((v) => {
						arr.push(v.shipping.default_shipping)
					})
				}
				return arr
			},
			shippingFee() {
				let shippingFeePrice = 0

				if (this.shipping_fee && this.store_id == 0) {
					this.shipping_fee.forEach(v => {
						shippingFeePrice += Number(v)
					})
				}
				return shippingFeePrice.toFixed(2)
			},
			rateFee() {
				let ratePrice = 0
				if (this.rate_price && this.store_id == 0) {
					this.rate_price.forEach(v => {
						ratePrice += Number(v)
					})
				}
				return Number(parseFloat(ratePrice).toFixed(2));
			},
			surplusSelf: {
				get() {
					// 【修复】确保与 balancePaymentActive 同步
					// 如果 balancePaymentActive 为 true，但 use_surplus_val 为 0，同步更新
					if (this.balancePaymentActive && this.use_surplus_val === 0) {
						this.$nextTick(() => {
							this.use_surplus_val = 1;
						});
					}
					// 如果 balancePaymentActive 为 false，但 use_surplus_val 不为 0，同步更新
					if (!this.balancePaymentActive && this.use_surplus_val !== 0) {
						this.$nextTick(() => {
							this.use_surplus_val = 0;
						});
					}
					return this.balancePaymentActive && this.use_surplus_val !== 0
				},
				set(val) {
					this.use_surplus_val = val == true ? 1 : 0
					// 【修复】同步 balancePaymentActive
					if (val && !this.balancePaymentActive) {
						this.balancePaymentActive = true;
					} else if (!val && this.balancePaymentActive) {
						this.balancePaymentActive = false;
					}
				}
			},
			creditSelf: {
				get() {
					// 【修复】计算属性的 getter 应该是纯函数，不能有副作用
					// 直接返回 use_credit_val 的状态，不进行任何状态修改
					return this.use_credit_val === 1
				},
				set(val) {
					this.use_credit_val = val === true ? 1 : 0
				}
			},
			integralSelf() {
				return this.use_integral_val == 0 ? false : true
			},
			integralList() {
				if (this.checkoutInfo && Array.isArray(this.checkoutInfo.integral)) {
					return this.checkoutInfo.integral;
				}
				return [];
			},
			integralInfo() {
				const list = this.integralList;
				if (list.length > 0 && list[0]) {
					return list[0];
				}
				return {
					integral: 0,
					integral_money_formated: ''
				};
			},
			integral() {

			},
			wechatPayDisplayText() {
				const payable = this.payableAmount;

					return '未使用';

			storeInfo() {

			},
			listShow() {

			},
			invoiceValue() {

				return this.invoice.invoiceType == 2 ? ['商品明细'] : this.checkoutInfo.invoice_content
			},
			valuecardBg() {

			},

			},

			},

			vipCard() {

			},
			//优惠券按店铺分割
			shopCouponList() {
				let dataArr = [];

				if (this.couponsList.length > 0) {
					this.couponsList.map((mapItem) => {
						if (dataArr.length == 0) {
							dataArr.push({
								ru_id: mapItem.ru_id,
								list: [mapItem]
							})
						} else {
							let res = dataArr.some((item) => {
								//判断相同的店铺，有就添加到当前项
								if (item.ru_id == mapItem.ru_id) {
									item.list.push(mapItem)
									return true
								}
							})
							if (!res) {
								//如果没找相同的部门添加一个新对象
								dataArr.push({
									ru_id: mapItem.ru_id,
									list: [mapItem]
								})
							}
						}
					})
				}
				return dataArr
			},
			
			// 店铺维度优惠券结构重组
			// shopCouponList() {
			//     let dataArr = [];
			//     this.couponsList.forEach(coupon => {
			//         // 使用find代替some以提升性能
			//         const existShop = dataArr.find(item => item.ru_id === coupon.ru_id);
			//         existShop ? existShop.list.push(coupon) 
			//                  : dataArr.push({ ru_id: coupon.ru_id, list: [coupon] });
			//     });
			//     return dataArr;
			// },
			cardCount: function() {
				if (this.valueCartInfo.card_list) {
					if (this.currTab == 0) {
						return this.valueCartInfo.use_card_count || 0
					} else {
						return this.valueCartInfo.not_use_card_count || 0

				}
			}
		},
		methods: {
			collectCurrentPaymentOption() {
				if (!this.pay_id) {
					return null;
				}
				const matched = Array.isArray(this.payment_method) && this.payment_method.find(item => item.pay_id === this.pay_id);
				if (matched) {
					return {
						pay_id: matched.pay_id,
						pay_name: matched.pay_name,
						pay_code: matched.pay_code,
						use_list: matched.use_list || {}
					};
				}
				return {
					pay_id: this.pay_id,
					pay_name: this.pay_name,
					pay_code: this.pay_code,
					use_list: {}
				};
			},
			lockBalanceToggle(reason = '') {
				this.balanceToggleDisabled = true;
				this.balanceToggleDisabledReason = reason || '已自动选择支付方式';
				this.balancePaymentActive = false;
				this.use_surplus_val = 0;
				this.balance_money = 0;
			},
			unlockBalanceToggle() {
				this.balanceToggleDisabled = false;
				this.balanceToggleDisabledReason = '';
			},
			lockCreditToggle(reason = '') {
				this.creditToggleDisabled = true;
				this.creditToggleDisabledReason = reason || '已自动选择支付方式';
				this.use_credit_val = 0;
				this.surplus_credit_line = 0;
			},
			unlockCreditToggle() {
				this.creditToggleDisabled = false;
				this.creditToggleDisabledReason = '';
			},
			rememberLastNonBalancePayment(option) {
				if (!option || option.pay_name === this.balancePaymentLabel) {
					return;
				}
				this.lastNonBalancePayment = {
					pay_id: option.pay_id,
					pay_name: option.pay_name,
					pay_code: option.pay_code,
					use_list: option.use_list || {}
				};
			},
			getBalancePaymentOption() {
				if (!Array.isArray(this.payment_method) || this.payment_method.length === 0) {
					return null;
				}
				return this.payment_method.find(item =>
					item.pay_name === this.balancePaymentLabel || item.pay_id === 11
				) || null;
			},
			findFirstNonBalancePayment() {
				if (!Array.isArray(this.payment_method) || this.payment_method.length === 0) {
					return null;
				}
				return this.payment_method.find(item => item.pay_name !== this.balancePaymentLabel) || null;
			},
			getFallbackPaymentOption() {
				if (this.lastNonBalancePayment) {
					return this.lastNonBalancePayment;
				}
				return this.findFirstNonBalancePayment();
			},
			initializeShopGoodsCollapsed(list = null) {
				const source = Array.isArray(list) ? list : this.processedGoodsList || [];
				if (!Array.isArray(source)) {
					this.shopGoodsCollapsed = [];
					return;
				}
				const nextState = source.map((_, idx) => {
					if (typeof this.shopGoodsCollapsed[idx] === 'boolean') {
						return this.shopGoodsCollapsed[idx];
					}
					return true;
				});
				this.shopGoodsCollapsed = nextState;
			},
			isShopGoodsCollapsed(index) {
				if (!Array.isArray(this.shopGoodsCollapsed)) {
					return true;
				}
				const state = this.shopGoodsCollapsed[index];
				return typeof state === 'boolean' ? state : true;
			},
			getShopGoodsForDisplay(goods, index) {
				const filtered = this.filteredItems(goods);
				const collapsed = this.isShopGoodsCollapsed(index);
				if (collapsed && filtered.length > this.visibleGoodsLimit) {
					return filtered.slice(0, this.visibleGoodsLimit);
				}
				return filtered;
			},
			hasMoreGoods(item) {
				if (!item || !Array.isArray(item.goods)) {
					return false;
				}
				const filtered = this.filteredItems(item.goods);
				return filtered.length > this.visibleGoodsLimit;
			},
			toggleShopGoods(index) {
				const current = this.isShopGoodsCollapsed(index);
				this.$set(this.shopGoodsCollapsed, index, !current);
			},
			toggleBalancePayment(enabled, options = {}) {
				const {
					silent = false,
					userTriggered = false
				} = options;

				const prevState = {
					balancePaymentActive: this.balancePaymentActive,
					use_surplus_val: this.use_surplus_val,
					use_credit_val: this.use_credit_val,
					balance_money: this.balance_money,
					surplus_credit_line: this.surplus_credit_line,
					balance_money_available: this.balance_money_available,
					surplus_credit_line_available: this.surplus_credit_line_available,
					pay_id: this.pay_id,
					pay_name: this.pay_name,
					pay_code: this.pay_code,
					submit_pay_id: this.submit_pay_id,
					submit_pay_code: this.submit_pay_code,
					payDisplayName: this.payDisplayName,
					princeType: this.princeType,
					payment_info: {
						...this.payment_info
					}
				};

				if (enabled && this.userDisabledBalancePayment && !userTriggered) {
					return false;
				}


				if (enabled) {
					const balanceOption = this.getBalancePaymentOption();
					if (!balanceOption) {
						if (!silent) {
							uni.showToast({
								title: this.$t ? this.$t('lang.payment_method_not_installed') : '暂无可用支付方式',
								icon: 'none'
							});
						}
						return false;
					}

					if (!prevState.balancePaymentActive && this.pay_id) {
						const currentOption = this.collectCurrentPaymentOption();
						if (currentOption) {
							this.rememberLastNonBalancePayment(currentOption);
						}
					}

					this.balance_money_available = balanceOption.use_list && balanceOption.use_list.money ?
						Number(balanceOption.use_list.money) : 0;
					this.surplus_credit_line_available = balanceOption.use_list && balanceOption.use_list.surplus_credit_line ?
						Number(balanceOption.use_list.surplus_credit_line) : 0;

					this.balancePaymentActive = true;
					this.use_surplus_val = 1;
					this.balance_money = this.balance_money_available;
					this.surplus_credit_line = this.use_credit_val === 1 ? this.surplus_credit_line_available : 0;

					const success = this.applyBalancePaymentState({
						silent
					});

					if (!success) {
						this.balancePaymentActive = prevState.balancePaymentActive;
						this.use_surplus_val = prevState.use_surplus_val;
						this.use_credit_val = prevState.use_credit_val;
						this.balance_money = prevState.balance_money;
						this.surplus_credit_line = prevState.surplus_credit_line;
						this.balance_money_available = prevState.balance_money_available;
						this.surplus_credit_line_available = prevState.surplus_credit_line_available;
						this.pay_id = prevState.pay_id;
						this.pay_name = prevState.pay_name;
						this.pay_code = prevState.pay_code;
						this.submit_pay_id = prevState.submit_pay_id;
						this.submit_pay_code = prevState.submit_pay_code;
						this.payDisplayName = prevState.payDisplayName;
						this.princeType = prevState.princeType;
						this.payment_info = {
							...prevState.payment_info
						};
						return false;
					}

					// 【关键修复】余额/信用付开启成功后，调用后端 changesurplus 接口同步金额
					// 使用 surplusvValHandle 统一处理 total.surplus、surplus_formated 和 amount
					try {
						this.surplusvValHandle();
					} catch (err) {
						// 静默处理错误
					}

					return true;
				}

				this.balancePaymentActive = false;
				this.use_surplus_val = 0;
				this.balance_money = 0;
				this.use_credit_val = 0; // 【关键修复】关闭余额时，同时关闭信用付，确保状态一致
				this.surplus_credit_line = 0;

				if (!prevState.balancePaymentActive) {
					return true;
				}

				const fallbackOption = this.getFallbackPaymentOption();
				if (!fallbackOption) {
					if (!silent) {
						uni.showToast({
							title: this.$t ? this.$t('lang.payment_method_not_installed') : '暂无其他支付方式',
							icon: 'none'
						});
					}
					this.balancePaymentActive = prevState.balancePaymentActive;
					this.use_surplus_val = prevState.use_surplus_val;
					this.use_credit_val = prevState.use_credit_val;
					this.balance_money = prevState.balance_money;
					this.surplus_credit_line = prevState.surplus_credit_line;
					this.pay_id = prevState.pay_id;
					this.pay_name = prevState.pay_name;
					this.pay_code = prevState.pay_code;
					this.submit_pay_id = prevState.submit_pay_id;
					this.submit_pay_code = prevState.submit_pay_code;
					this.payDisplayName = prevState.payDisplayName;
					this.princeType = prevState.princeType;
					this.payment_info = {
						...prevState.payment_info
					};
					return false;
				}

				this.pay_id = fallbackOption.pay_id;
				this.pay_name = fallbackOption.pay_name;
				this.pay_code = fallbackOption.pay_code;
				this.submit_pay_id = fallbackOption.pay_id;
				this.submit_pay_code = fallbackOption.pay_code;
				this.payDisplayName = fallbackOption.pay_name;
				
				// 【关键修复】计算正确的原始金额（商品价格 + 运费 - 优惠券），不使用this.total.amount（可能是旧值）
				const latestTotal = this.checkoutInfo && this.checkoutInfo.total ? this.checkoutInfo.total : this.total;
				const goodsPrice = latestTotal && latestTotal.goods_price ? Number(latestTotal.goods_price) : 0;
				const shippingFee = this.shippingFee ? Number(this.shippingFee) : 0;
				const couponsMoney = Number(this.couponsObject && this.couponsObject.couponsMoney ? this.couponsObject.couponsMoney : 0);
				const resetAmountSource = this.moneyPrecision(goodsPrice + shippingFee - couponsMoney);
				
				this.resetPaymentStatus(resetAmountSource);
				this.princeType = false;
				
				// 【关键修复】关闭余额时，调用后端 changesurplus 接口获取关闭后的价格
				// 因为 balance_money 已设为 0，surplusvValHandle 会传递 surplus: 0 给后端
				// 使用 $nextTick 确保状态更新后再调用，避免传递错误的参数
				this.$nextTick(() => {
					try {
						this.surplusvValHandle();
					} catch (err) {
						// 静默处理错误
					}
				});
				
				return true;
			},
			applyBalancePaymentState(options = {}) {
				const {
					silent = false
				} = options;

				const prevState = {
					pay_id: this.pay_id,
					pay_name: this.pay_name,
					pay_code: this.pay_code,
					submit_pay_id: this.submit_pay_id,
					submit_pay_code: this.submit_pay_code,
					payDisplayName: this.payDisplayName,
					princeType: this.princeType,
					payment_info: {
						...this.payment_info
					}
				};

				const balanceOption = this.getBalancePaymentOption();
				if (!balanceOption) {
					return false;
				}

				const balanceLabel = this.use_credit_val === 1 ? this.balancePaymentLabel : '余额';

				// 【关键修复】按照优先级顺序计算：储值卡 → 余额 → 先用后付
				// 1. 先计算应付款（商品金额 + 运费 - 优惠券 - 折扣 - 红包 - 积分）
				// 【关键】计算只用商品金额 goods_price，不用 total.amount（total.amount 仅用于展示）
				let baseAmount = 0;
				const latestTotalForApply = this.checkoutInfo && this.checkoutInfo.total ? this.checkoutInfo.total : this.total;
				const goodsPrice = this.moneyPrecision(parseFloat(latestTotalForApply && latestTotalForApply.goods_price ? latestTotalForApply.goods_price : 0) || 0);
				if (goodsPrice > 0) {
					baseAmount = goodsPrice;
				} else if (this.price && this.price > 0) {
					baseAmount = this.moneyPrecision(parseFloat(this.price) || 0);
				}
				const shippingFee = this.shippingFee ? Number(this.shippingFee) : 0;
				const couponsMoney = Number(this.couponsObject && this.couponsObject.couponsMoney ? this.couponsObject.couponsMoney : 0);
				const discount = Number(latestTotalForApply && latestTotalForApply.discount) || 0;
				const bonusMoney = Number(latestTotalForApply && latestTotalForApply.bonus_money) || Number(this.bonusObject && this.bonusObject.bonusMoney) || 0;
				const integralMoney = Number(latestTotalForApply && latestTotalForApply.integral_money) || 0;
				let totalAmount = baseAmount + shippingFee - couponsMoney - discount - bonusMoney - integralMoney;
				if (totalAmount < 0) {
					totalAmount = 0;
				}
				totalAmount = this.moneyPrecision(totalAmount);
				
				// 2. 计算储值卡扣款（优先级最高，优先后端返回值）
				const valueCardMoney = this.getValueCardMoney();
				const amountAfterValueCard = this.moneyPrecision(Math.max(0, totalAmount - valueCardMoney));
				
				// 3. 基于（应付款 - 储值卡扣款）计算余额和先用后付扣款
				let originalPrice = amountAfterValueCard;
				let remainingAfterCredit = 0;
				// 【修复】确保在按钮状态正确时才计算 payment_info
				if (this.total && this.total.amount !== undefined) {
					// 只有在 balancePaymentActive 为 true 时才计算
					if (this.balancePaymentActive) {
					remainingAfterCredit = this.calculateBalanceCreditPayment(originalPrice);
				} else {
						// 如果按钮关闭，重置 payment_info
						this.resetPaymentStatus(originalPrice);
						remainingAfterCredit = originalPrice;
					}
				} else {
					// 如果 total.amount 为 undefined，重置 payment_info
					this.resetPaymentStatus(0);
					remainingAfterCredit = 0;
				}

				const fallbackOption = this.getFallbackPaymentOption();

				if (remainingAfterCredit > 0) {
					if (!fallbackOption) {
						if (!silent) {
							uni.showToast({
								title: this.$t ? this.$t('lang.payment_method_not_installed') : '暂无其他支付方式',
								icon: 'none'
							});
						}
						this.pay_id = prevState.pay_id;
						this.pay_name = prevState.pay_name;
						this.pay_code = prevState.pay_code;
						this.submit_pay_id = prevState.submit_pay_id;
						this.submit_pay_code = prevState.submit_pay_code;
						this.payDisplayName = prevState.payDisplayName;
						this.princeType = prevState.princeType;
						this.payment_info = {
							...prevState.payment_info
						};
						return false;
					}

					this.pay_id = fallbackOption.pay_id;
					this.pay_name = fallbackOption.pay_name;
					this.pay_code = fallbackOption.pay_code;
					this.submit_pay_id = fallbackOption.pay_id;
					this.submit_pay_code = fallbackOption.pay_code;
					this.payDisplayName = `${fallbackOption.pay_name}`;
					this.rememberLastNonBalancePayment(fallbackOption);
				} else {
					this.pay_id = balanceOption.pay_id;
					this.pay_name = balanceOption.pay_name;
					this.pay_code = balanceOption.pay_code;
					this.submit_pay_id = balanceOption.pay_id;
					this.submit_pay_code = balanceOption.pay_code;
					this.payDisplayName = balanceLabel;
				}

				this.princeType = !!(this.checkoutInfo.surplus_credit_line_tip && this.payment_info.used_credit > 0);
				return true;
			},
			toggleCreditPayment(enabled, options = {}) {
				const {
					silent = false,
					userTriggered = false
				} = options;

				const prevState = {
					use_credit_val: this.use_credit_val,
					surplus_credit_line: this.surplus_credit_line,
					pay_id: this.pay_id,
					pay_name: this.pay_name,
					pay_code: this.pay_code,
					submit_pay_id: this.submit_pay_id,
					submit_pay_code: this.submit_pay_code,
					payDisplayName: this.payDisplayName,
					princeType: this.princeType,
					payment_info: {
						...this.payment_info
					}
				};

				if (enabled && this.userDisabledCreditPayment && !userTriggered) {
					return false;
				}


				if (enabled) {
					// 如果余额值大于0，用后付需要跟随余额开启；如果余额值小于等于0，用后付可以独立开启
					if (!this.balancePaymentActive && this.balance_money_available > 0) {
						if (!silent) {
							uni.showToast({
								title: '请先开启余额',
								icon: 'none'
							});
						}
						return false;
					}

					if (this.surplus_credit_line_available <= 0) {
						if (!silent) {
							uni.showToast({
								title: this.$t ? this.$t('lang.payment_method_not_installed') : '暂无可用额度',
								icon: 'none'
							});
						}
						return false;
					}

					this.use_credit_val = 1;
					// 【关键修复】移除设置surplus_credit_line的初始值，让applyBalancePaymentState和surplusvValHandle来计算正确的值
					// this.surplus_credit_line = this.surplus_credit_line_available;

					const success = this.applyBalancePaymentState({
						silent
					});

					if (!success) {
						this.use_credit_val = prevState.use_credit_val;
						this.surplus_credit_line = prevState.surplus_credit_line;
						this.pay_id = prevState.pay_id;
						this.pay_name = prevState.pay_name;
						this.pay_code = prevState.pay_code;
						this.submit_pay_id = prevState.submit_pay_id;
						this.submit_pay_code = prevState.submit_pay_code;
						this.payDisplayName = prevState.payDisplayName;
						this.princeType = prevState.princeType;
						this.payment_info = {
							...prevState.payment_info
						};
						return false;
					}

					// 【关键修复】先用后付开启成功后，调用后端 changesurplus 接口同步金额
					// 使用 surplusvValHandle 统一处理 total.surplus、surplus_formated 和 amount
					// 参数会根据 balancePaymentActive 和实际使用的余额/信用付金额自动传递
					try {
						this.surplusvValHandle();
					} catch (err) {
						// 静默处理错误
					}

					return true;
				}

				this.use_credit_val = 0;
				this.surplus_credit_line = 0;

				if (!this.balancePaymentActive) {
					// 【关键修复】如果余额未开启，关闭信用付时不需要再次调用接口
					// 因为关闭余额时（toggleBalancePayment）已经调用过 surplusvValHandle 了
					// 避免重复调用导致传递错误的参数
					return true;
				}

				const success = this.applyBalancePaymentState({
					silent
				});

				if (!success) {
					this.use_credit_val = prevState.use_credit_val;
					this.surplus_credit_line = prevState.surplus_credit_line;
					this.pay_id = prevState.pay_id;
					this.pay_name = prevState.pay_name;
					this.pay_code = prevState.pay_code;
					this.submit_pay_id = prevState.submit_pay_id;
					this.submit_pay_code = prevState.submit_pay_code;
					this.payDisplayName = prevState.payDisplayName;
					this.princeType = prevState.princeType;
					this.payment_info = {
						...prevState.payment_info
					};
					return false;
				}

				// 【关键修复】关闭信用付时，调用后端 changesurplus 接口获取关闭后的价格
				// 因为 surplus_credit_line 已设为 0，但 balance_money 可能还在使用
				// surplusvValHandle 会根据当前 balance_money 传递正确的 surplus 值
				try {
					this.surplusvValHandle();
				} catch (err) {
					// 静默处理错误
				}

				return true;
			},
			ensurePaymentPriority() {
				if (!this.total || this.total === '') {
					return;
				}

				// 【关键】计算只用商品金额 goods_price，不用 total.amount（total.amount 仅用于展示）
				const latestTotalForPriority = this.checkoutInfo && this.checkoutInfo.total ? this.checkoutInfo.total : this.total;
				const goodsPricePriority = this.moneyPrecision(parseFloat(latestTotalForPriority && latestTotalForPriority.goods_price ? latestTotalForPriority.goods_price : 0) || 0);
				let baseAmount = goodsPricePriority > 0 ? goodsPricePriority : (this.price && this.price > 0 ? this.moneyPrecision(parseFloat(this.price) || 0) : 0);
				const shippingFee = this.shippingFee ? Number(this.shippingFee) : 0;
				const couponsMoney = Number(this.couponsObject && this.couponsObject.couponsMoney ? this.couponsObject.couponsMoney : 0);
				const discountPriority = Number(latestTotalForPriority && latestTotalForPriority.discount) || 0;
				const bonusMoneyPriority = Number(latestTotalForPriority && latestTotalForPriority.bonus_money) || Number(this.bonusObject && this.bonusObject.bonusMoney) || 0;
				const integralMoneyPriority = Number(latestTotalForPriority && latestTotalForPriority.integral_money) || 0;
				let amountBeforeValueCard = baseAmount + shippingFee - couponsMoney - discountPriority - bonusMoneyPriority - integralMoneyPriority;
				if (amountBeforeValueCard < 0) {
					amountBeforeValueCard = 0;
				}
				amountBeforeValueCard = this.moneyPrecision(amountBeforeValueCard);
				
				const selectedCardId = Number(this.valueCardObject && this.valueCardObject.valueCardId ? this.valueCardObject.valueCardId : 0);
				const hasValueCardSelected = selectedCardId > 0;
				
				// 储值卡扣款：优先后端返回值
				let valueCardMoney = 0;
				if (hasValueCardSelected) {
					valueCardMoney = this.getValueCardMoney();
					// 同步展示（若后端有返回则已在接口回调中赋值）
					if (this.valueCardObject.valueCardMoney !== valueCardMoney) {
						this.valueCardObject.valueCardMoney = valueCardMoney;
						this.valueCardObject.valueCardContent = this.currency + this.formatCurrencyValue(valueCardMoney);
					}
				}
				
				// 【关键修复】计算剩余需要支付的金额（应付款 - 储值卡扣款）
				// 这是余额和先用后付需要支付的金额
				let amountDue = amountBeforeValueCard - valueCardMoney;
				if (amountDue < 0) {
					amountDue = 0;
				}
				amountDue = this.moneyPrecision(amountDue);
				const hasValueCardList = this.valueCartInfo && Array.isArray(this.valueCartInfo.card_list) && this.valueCartInfo.card_list.length > 0;
				const canUseBalance = this.checkoutInfo && this.checkoutInfo.use_surplus > 0;
				const valueCardDataReady = this.valueCardLoaded || hasValueCardSelected;
				const allowAutoBalance = !this.userDisabledBalancePayment;
				const allowAutoCredit = !this.userDisabledCreditPayment;
				
			// 【优化】即使 prioritySelectingValueCard 为 true（正在等待 changecard API），也先显示按钮
			// 这样可以避免用户看到明显的等待时间，按钮会先显示为关闭状态，等计算完成后再开启
			if (!valueCardDataReady) {
				return;
			}
			
			// 【优化】如果正在等待 changecard API，先显示按钮（关闭状态），不阻塞显示
			// 等 changecard 返回后，会再次调用 ensurePaymentPriority，此时再根据计算结果开启按钮
			if (this.prioritySelectingValueCard) {
				// 先显示按钮，但保持关闭状态
				this.initializingPaymentToggles = false;
				return;
			}

			// 【关键修复】如果用户明确取消了储值卡，不再自动应用
			// 【关键修复】selectedCardId 应该考虑 tempValueCardId（当弹窗打开时）或 valueCardObject.valueCardId（当弹窗关闭时）
			const actualSelectedCardId = this.valueCardObject.valueCardBase ? this.tempValueCardId : selectedCardId;
			if (!hasValueCardSelected && hasValueCardList && actualSelectedCardId <= 0 && !this.prioritySelectingValueCard && !this.userValueCardCancelled) {
				const bestCard = this.findBestValueCard(amountDue);
				// 【关键修复】比较时也应该考虑 tempValueCardId
				const currentCardId = this.valueCardObject.valueCardBase ? this.tempValueCardId : this.valueCardObject.valueCardId;
				if (bestCard && currentCardId !== bestCard.vid) {
					this.pendingValueCardApplyId = Number(bestCard.vid) || 0;
					this.prioritySelectingValueCard = true;
					this.tryApplyPendingValueCard();
					return;
				}
			}

			this.unlockBalanceToggle();
			this.unlockCreditToggle();

			// 【关键修复】优先检查储值卡是否完全覆盖，如果完全覆盖，直接处理并返回，不进行余额/信用付的自动开启判断
			// 这样可以避免余额按钮先开启再关闭的闪烁问题
			if (hasValueCardSelected && amountDue <= 0) {
				if (this.balancePaymentActive) {
					this.toggleCreditPayment(false, {
						silent: true
					});
					this.toggleBalancePayment(false, {
						silent: true
					});
				}
				this.lockBalanceToggle('已使用储值卡完成支付');
				this.lockCreditToggle('已使用储值卡完成支付');
				this.$nextTick(() => {
					this.surplusSelf = false;
					this.creditSelf = false;
					this.balanceSwitchVersion++;
					this.creditSwitchVersion++;
				});
				this.autoPriorityApplied = true;
				this.initializingPaymentToggles = false;
				return;
			}

			// 【修复】智能判断是否应该自动开启（只有在储值卡不能完全覆盖时才计算）
			// 如果价格满足条件（amountDue > 0 且有可用余额/信用付），即使 userBalanceModified 为 true，也应该考虑自动开启
				// 但需要检查是否真的满足条件
				const shouldAutoBalance = allowAutoBalance && (!this.userBalanceModified || 
					(amountDue > 0 && this.balance_money_available > 0 && !this.balancePaymentActive));
				const shouldAutoCredit = allowAutoCredit && (!this.userCreditModified || 
					(amountDue > 0 && this.surplus_credit_line_available > 0 && this.use_credit_val !== 1 && 
						(this.balancePaymentActive || this.balance_money_available <= 0)));

			// 【修复】提前返回逻辑：即使 shouldAutoCredit 为 false，如果余额已开启或有剩余金额，也应该继续检查信用付
			// 只有在完全不需要处理余额和信用付的情况下才提前返回
			// 如果余额值大于0，用后付需要跟随余额开启；如果余额值小于等于0，用后付可以独立启用
			const canUseCreditIndependently = this.balance_money_available <= 0;
			const needsBalanceCheck = shouldAutoBalance && canUseBalance && amountDue > 0 && !this.balancePaymentActive;
			const needsCreditCheck = allowAutoCredit && (this.balancePaymentActive || canUseCreditIndependently) && amountDue > 0 && this.surplus_credit_line_available > 0;
			
			if (this.autoPriorityApplied && !needsBalanceCheck && !needsCreditCheck && !shouldAutoCredit) {
					return;
				}

				if (shouldAutoBalance && canUseBalance && amountDue > 0 && !this.balancePaymentActive) {
					const success = this.toggleBalancePayment(true, {
						silent: true
					});
					if (!success) {
						this.autoPriorityApplied = true;
						return;
					}
				}

				// 【修复】确保 payment_info 的计算与按钮状态同步
				// 如果 balancePaymentActive 为 true，无论 shouldAutoBalance 如何，都需要计算 payment_info
				if (this.balancePaymentActive) {
					// 确保 use_surplus_val 与 balancePaymentActive 同步
					if (this.use_surplus_val === 0) {
						this.use_surplus_val = 1;
					}
					const applyResult = this.applyBalancePaymentState({
						silent: true
					});
				} else {
					// 【修复】如果按钮关闭，确保 payment_info 被重置
					if (this.payment_info && (this.payment_info.used_balance > 0 || this.payment_info.used_credit > 0)) {
						const resetAmountSource = this.total && this.total.amount !== undefined ? this.total.amount : (this.payment_info.original_price || 0);
						this.resetPaymentStatus(resetAmountSource);
					}
				}

				const remainingAfterBalance = this.moneyPrecision(
					this.payment_info && this.payment_info.remaining_debt !== undefined ? this.payment_info.remaining_debt : amountDue
				);

			// 【修复】即使 shouldAutoCredit 为 false，如果余额已开启或有剩余金额，也应该考虑自动开启信用付
			const shouldAutoEnableCredit = allowAutoCredit && (this.balancePaymentActive || canUseCreditIndependently) && 
				(shouldAutoCredit || ((this.balancePaymentActive || canUseCreditIndependently) && remainingAfterBalance > 0 && this.surplus_credit_line_available > 0));

				// 【修复】确保信用付状态与 payment_info 同步
				if (shouldAutoEnableCredit) {
					if (remainingAfterBalance > 0 && this.surplus_credit_line_available > 0) {
						if (this.use_credit_val !== 1) {
						// 【关键修复】即使 userCreditModified 为 true，如果价格满足条件，也应该自动开启
						// 重置 userCreditModified 标记，允许自动开启（支持独立使用信用付的情况）
						if (this.userCreditModified && (this.balancePaymentActive || canUseCreditIndependently) && remainingAfterBalance > 0) {
							this.userCreditModified = false;
						}
							const creditSuccess = this.toggleCreditPayment(true, {
								silent: true
							});
							if (creditSuccess) {
								// 【修复】确保 use_credit_val 与按钮状态同步
								// toggleCreditPayment 已经设置了 use_credit_val = 1，这里确保同步
								if (this.use_credit_val !== 1) {
									this.use_credit_val = 1;
								}
								// 【关键修复】移除applyBalancePaymentState调用，因为toggleCreditPayment已经通过surplusvValHandle更新了所有必要的值
								// 再次调用applyBalancePaymentState会覆盖surplusvValHandle计算出的正确值
								// this.applyBalancePaymentState({
								// 	silent: true
								// });
								// 【关键修复】确保 initializingPaymentToggles 为 false，否则开关会被强制显示为 false
								this.initializingPaymentToggles = false;
								// 【关键修复】直接设置 creditSelf = true，确保UI状态同步
								this.creditSelf = true;
								// 【关键修复】通过 $nextTick 确保视图更新
								this.$nextTick(() => {
									// 强制触发组件重新渲染
									this.creditSwitchVersion++;
								this.$forceUpdate();
							});
							}
						} else if (this.use_credit_val === 1) {
							// 【修复】如果 use_credit_val 已经是 1，但 payment_info 未更新，重新计算
							this.applyBalancePaymentState({
								silent: true
							});
						}
					} else if (this.use_credit_val === 1 && remainingAfterBalance <= 0) {
						// 【关键修复】如果剩余金额为 0，需要判断是否是因为余额+信用付完全覆盖了金额
						// 如果是完全覆盖（payment_info.used_credit > 0），说明信用付正在使用，不应该关闭
						// 只有在余额单独覆盖全部金额时（payment_info.used_credit === 0），才关闭信用付
						const isCreditBeingUsed = this.payment_info && this.payment_info.used_credit > 0;
						
						if (!isCreditBeingUsed) {
							// 余额单独覆盖全部金额，关闭信用付
						this.toggleCreditPayment(false, {
								silent: true
							});
							this.use_credit_val = 0;
						}
					}
			} else if (allowAutoCredit && (this.balancePaymentActive || canUseCreditIndependently) && remainingAfterBalance > 0 && this.surplus_credit_line_available > 0) {
				// 【关键修复】即使 shouldAutoEnableCredit 为 false，如果余额已开启或可以独立使用信用付且有剩余金额，也应该检查是否需要开启信用付
				// 这种情况通常是因为 userCreditModified 为 true，但价格满足条件，应该自动开启
					if (this.use_credit_val !== 1) {
						// 重置 userCreditModified 标记，允许自动开启
						this.userCreditModified = false;
						const creditSuccess = this.toggleCreditPayment(true, {
							silent: true
						});
						if (creditSuccess) {
							// 【修复】确保 use_credit_val 与按钮状态同步
							// toggleCreditPayment 已经设置了 use_credit_val = 1，这里确保同步
							if (this.use_credit_val !== 1) {
								this.use_credit_val = 1;
							}
							this.applyBalancePaymentState({
								silent: true
							});
							// 【关键修复】确保 initializingPaymentToggles 为 false，否则开关会被强制显示为 false
							this.initializingPaymentToggles = false;
							// 【关键修复】直接设置 creditSelf = true，确保UI状态同步
							this.creditSelf = true;
							// 【关键修复】通过 $nextTick 确保视图更新
							this.$nextTick(() => {
								// 强制触发组件重新渲染
								this.creditSwitchVersion++;
								this.$forceUpdate();
							});
						}
					} else if (this.use_credit_val === 1) {
						// 重新计算 payment_info，确保与按钮状态同步
						this.applyBalancePaymentState({
							silent: true
						});
					}
				} else if (this.use_credit_val === 1 && this.balancePaymentActive) {
					// 【修复】如果 use_credit_val 为 1，但剩余金额为 0 或没有可用额度，需要检查是否需要更新 payment_info
					if (remainingAfterBalance > 0 && this.surplus_credit_line_available > 0) {
						// 重新计算 payment_info，确保与按钮状态同步
						this.applyBalancePaymentState({
							silent: true
						});
					}
				}

				// 【关键修复】只有在余额开启且余额值大于0，且余额单独覆盖全部金额时（信用付未使用），才禁用信用付按钮
				// 如果余额+信用付完全覆盖金额（payment_info.used_credit > 0），不应该禁用信用付按钮
				const isCreditBeingUsed = this.payment_info && this.payment_info.used_credit > 0;
				const shouldDisableCredit = this.balancePaymentActive && 
					this.balance_money_available > 0 && 
					remainingAfterBalance <= 0 && 
					!isCreditBeingUsed; // 只有在信用付未使用时才禁用
				
				if (shouldDisableCredit) {
					this.creditToggleDisabled = true;
					this.creditToggleDisabledReason = '已选择支付';
					this.$nextTick(() => {
						this.creditSelf = false;
						this.creditSwitchVersion++;
					});
				} else {
					this.creditToggleDisabled = false;
					this.creditToggleDisabledReason = '';
				}

				this.autoPriorityApplied = true;
				this.initializingPaymentToggles = false;
				
				// 如果有保存的支付状态，在数据准备好后恢复
				this.restoreSavedPaymentState();
			},
			restoreSavedPaymentState() {
				if (!this.savedPaymentState) {
					return;
				}
				
				// 确保数据已准备好
				if (!this.total || !this.valueCardLoaded) {
					// 延迟重试
					this.$nextTick(() => {
						setTimeout(() => {
							this.restoreSavedPaymentState();
						}, 200);
					});
					return;
				}
				
				const saved = this.savedPaymentState;
				
				// 恢复储值卡：优先后端 total.card_money，否则前端计算
				if (saved.valueCardId > 0) {
					this.valueCardObject.valueCardId = saved.valueCardId;
					const cardMoney = this.getValueCardMoney();
					this.valueCardObject.valueCardMoney = cardMoney;
					if (cardMoney > 0) {
						this.valueCardObject.valueCardContent = this.currency + this.formatCurrencyValue(cardMoney);
					} else {
						this.valueCardObject.valueCardContent = this.$t('lang.no_use_value_card');
					}
				}
				
				// 恢复余额/用后付状态
				if (saved.balancePaymentActive || saved.use_surplus_val > 0 || saved.use_credit_val > 0) {
					// 先恢复基础数据
					this.balance_money = saved.balance_money || 0;
					this.surplus_credit_line = saved.surplus_credit_line || 0;
					
					// 如果之前开启了余额/用后付，重新应用
					if (saved.balancePaymentActive) {
						this.use_surplus_val = saved.use_surplus_val || 0;
						this.use_credit_val = saved.use_credit_val || 0;
						
						// 重新应用支付状态
						const success = this.toggleBalancePayment(true, { silent: true });
						if (success && saved.use_credit_val > 0) {
							this.toggleCreditPayment(true, { silent: true });
						}
						
					}
				}
				
				// 清除保存的状态，避免重复恢复
				this.savedPaymentState = null;

			  formatCurrencyValue(value) {

			  // 储值卡扣款金额：优先使用后端返回值（total.card_money），无返回或未选卡时用前端计算兜底
			  getValueCardMoney() {
			    const total = this.checkoutInfo && this.checkoutInfo.total ? this.checkoutInfo.total : this.total;
			    const currentCardId = Number(this.valueCardObject && this.valueCardObject.valueCardId ? this.valueCardObject.valueCardId : 0);
			    const backendCardId = Number(total && total.value_card_id ? total.value_card_id : 0);
			    if (currentCardId > 0 && backendCardId === currentCardId && total && total.card_money != null && total.card_money !== '') {
			      return this.moneyPrecision(Number(total.card_money) || 0);
			    }
			    return this.calculateValueCardMoney();
			  },
			  // 前端计算储值卡扣款（仅在后端未返回时兜底）
			  calculateValueCardMoney() {
			    if (!this.valueCardObject || !this.valueCardObject.valueCardId || this.valueCardObject.valueCardId <= 0) {
			      return 0;
			    }
			    return this.calculateValueCardMoneyByCardId(this.valueCardObject.valueCardId);
			  },
			  // 【关键修复】基于指定的 cardId 计算储值卡扣款金额
			  // 用于在用户关闭弹窗后，基于已确认的 checkoutInfo.total.value_card_id 计算
			  // 而不是基于弹窗中临时修改的 valueCardObject.valueCardId
			  calculateValueCardMoneyByCardId(cardId) {
			    const targetCardId = Number(cardId) || 0;
			    if (targetCardId <= 0) {
			      return 0;
			    }
			    
			    // 计算实际需要支付的金额（商品金额 + 运费 - 优惠券 - 折扣 - 红包 - 积分），只用商品金额不用 total.amount
			    const latestTotalForValueCard = this.checkoutInfo && this.checkoutInfo.total ? this.checkoutInfo.total : this.total;
			    const goodsPriceVC = this.moneyPrecision(parseFloat(latestTotalForValueCard && latestTotalForValueCard.goods_price ? latestTotalForValueCard.goods_price : 0) || 0);
			    let baseAmount = goodsPriceVC > 0 ? goodsPriceVC : (this.price && this.price > 0 ? this.moneyPrecision(parseFloat(this.price) || 0) : 0);
			    const shippingFee = this.shippingFee ? Number(this.shippingFee) : 0;
			    const couponsMoney = Number(this.couponsObject && this.couponsObject.couponsMoney ? this.couponsObject.couponsMoney : 0);
			    const discountVC = Number(latestTotalForValueCard && latestTotalForValueCard.discount) || 0;
			    const bonusMoneyVC = Number(latestTotalForValueCard && latestTotalForValueCard.bonus_money) || Number(this.bonusObject && this.bonusObject.bonusMoney) || 0;
			    const integralMoneyVC = Number(latestTotalForValueCard && latestTotalForValueCard.integral_money) || 0;
			    let amountBeforeValueCard = baseAmount + shippingFee - couponsMoney - discountVC - bonusMoneyVC - integralMoneyVC;
			    if (amountBeforeValueCard < 0) {
			      amountBeforeValueCard = 0;
			    }
			    amountBeforeValueCard = this.moneyPrecision(amountBeforeValueCard);
			    
			    // 获取储值卡可用余额
			    let valueCardAvailableBalance = 0;
			    if (this.checkoutInfo && this.checkoutInfo.value_card) {
			      const selectedCard = this.checkoutInfo.value_card.find(card => Number(card.vid) === targetCardId);
			      if (selectedCard) {
			        valueCardAvailableBalance = Number(selectedCard.card_money || 0);
			      }
			    }
			    
			    // 如果储值卡余额足够，使用实际需要支付的金额作为扣款金额
			    // 如果储值卡余额不足，使用储值卡可用余额
			    const actualValueCardMoney = valueCardAvailableBalance >= amountBeforeValueCard ? amountBeforeValueCard : valueCardAvailableBalance;
			    const finalValueCardMoney = this.moneyPrecision(actualValueCardMoney);
			    
			    return finalValueCardMoney;
			  },
			  // 在方法中应用精度处理
			  // 【关键修复】priceStr 应该是（应付款 - 储值卡扣款），确保按照优先级顺序计算
			  calculateBalanceCreditPayment(priceStr) {
			    // priceStr 已经是扣除储值卡后的金额
			    const originalPrice = this.moneyPrecision(parseFloat(priceStr) || 0);
			    
			    // 只有在余额/先用后付开启时才计算
			    if (!this.balancePaymentActive) {
			      this.payment_info = {
			        original_price: originalPrice,
			        used_balance: 0,
			        used_credit: 0,
			        remaining_debt: originalPrice,
			        adjusted_price: originalPrice
			      };
			      return originalPrice;
			    }
			    
			    const availableBalance = this.moneyPrecision(Math.max(this.balance_money_available, 0));
			    const availableCredit = this.moneyPrecision(Math.max(this.surplus_credit_line_available, 0));

			    // 先使用余额（优先级：余额 → 先用后付）
			    const usedBalance = Math.min(availableBalance, originalPrice);
			    const remainingAfterBalance = this.moneyPrecision(originalPrice - usedBalance);

			    // 再使用先用后付（基于剩余金额）
			    // 【关键修复】如果payment_info.used_credit已存在且正确，优先使用它（避免覆盖surplusvValHandle计算的值）
			    let usedCredit = 0;
			    if (this.use_credit_val === 1) {
					if (this.payment_info && this.payment_info.used_credit && Number(this.payment_info.used_credit) > 0) {
						// 如果payment_info.used_credit已存在，检查它是否合理（不超过可用额度和剩余金额）
						const existingCredit = Number(this.payment_info.used_credit);
						if (existingCredit <= availableCredit && existingCredit <= remainingAfterBalance) {
							usedCredit = this.moneyPrecision(existingCredit);
						} else {
							// 如果已存在的值不合理，重新计算
							usedCredit = this.moneyPrecision(Math.min(availableCredit, remainingAfterBalance));
						}
					} else {
						// 如果不存在，重新计算
						usedCredit = this.moneyPrecision(Math.min(availableCredit, remainingAfterBalance));
					}
				}
			    const remainingAfterCredit = this.moneyPrecision(remainingAfterBalance - usedCredit);

			    this.pay_yue_full = false;
			    this.pay_yue_credit = false;
			    this.pay_surplus = false;
			    this.pay_no = false;

			    // 更新余额和先用后付的实际使用金额
			    this.balance_money = this.moneyPrecision(usedBalance);
			    this.surplus_credit_line = this.use_credit_val === 1 ? this.moneyPrecision(usedCredit) : 0;
			    
			    this.payment_info = {
			      original_price: originalPrice,
			      used_balance: this.moneyPrecision(usedBalance),
			      used_credit: this.moneyPrecision(usedCredit),
			      remaining_debt: remainingAfterCredit,
			      adjusted_price: remainingAfterCredit
			    };

			    if (remainingAfterCredit === 0) {
			      if (usedBalance > 0 && usedCredit > 0) {
			        this.pay_yue_credit = true;
			      } else if (usedBalance > 0) {
			        this.pay_yue_full = true;
			      } else if (usedCredit > 0) {
			        this.pay_surplus = true;
			      }
			    } else {
			      if (usedBalance > 0 || usedCredit > 0) {
			        this.pay_yue_credit = true;
			      }
			    }

			    return remainingAfterCredit;
			  },

			  resetPaymentStatus(originalPrice) {
			    let safePrice = this.moneyPrecision(parseFloat(originalPrice) || 0);
			    
// 【关键修复】如果originalPrice是0或无效，使用与 applyBalancePaymentState 一致的公式：应付款（含折扣/红包/积分）- 储值卡
			    if (safePrice === 0 || safePrice < 0.01) {
					const latestTotal = this.checkoutInfo && this.checkoutInfo.total ? this.checkoutInfo.total : this.total;
					const goodsPrice = latestTotal && latestTotal.goods_price ? Number(latestTotal.goods_price) : 0;
					const shippingFee = this.shippingFee ? Number(this.shippingFee) : 0;
					const couponsMoney = Number(this.couponsObject && this.couponsObject.couponsMoney ? this.couponsObject.couponsMoney : 0);
					const discount = Number(latestTotal && latestTotal.discount) || 0;
					const bonusMoney = Number(latestTotal && latestTotal.bonus_money) || Number(this.bonusObject && this.bonusObject.bonusMoney) || 0;
					const integralMoney = Number(latestTotal && latestTotal.integral_money) || 0;
					const totalAmountReset = this.moneyPrecision(Math.max(0, goodsPrice + shippingFee - couponsMoney - discount - bonusMoney - integralMoney));
					const valueCardMoneyReset = this.getValueCardMoney();
					const calculatedPrice = this.moneyPrecision(Math.max(0, totalAmountReset - valueCardMoneyReset));
					if (calculatedPrice > 0) {
						safePrice = calculatedPrice;
					}
			    }
			    
			    this.pay_yue_full = false;
			    this.pay_yue_credit = false;
			    this.pay_surplus = false;
			    this.pay_no = false;

			    this.payment_info = {
			      original_price: safePrice,
			      used_balance: 0,
			      used_credit: 0,
			      remaining_debt: safePrice,
			      adjusted_price: safePrice
			    };
			  },

			async valueCardLoad(skipEnsurePaymentPriority = false) {
				if (this.valueCardLoading) {
					return;
				}
				this.valueCardLoadCallCount += 1;

				const now = Date.now();
				const checkoutReady =
					this.checkoutInfo &&
					this.checkoutInfo.total &&
					Array.isArray(this.checkoutInfo.total.rec_list) &&
					this.checkoutInfo.total.rec_list.length > 0;
				if (!checkoutReady) {
					if (this.checkoutInfoLoadedAt) {
						this.scheduleValueCardLoadRetry('checkout info not ready');
					}
					return;
				}

				this.resetValueCardLoadRetry();
				this.valueCardLoading = true;

				let i = this.currTab;

				if (this.cartList.length == 0) this.cartList = this.tabs.map(() => []);
				if (this.cartPaginated.length == 0) this.cartPaginated = this.tabs.map(() => 1);
				if (this.cartScrollTop.length == 0) this.cartScrollTop = this.tabs.map(() => 0);

				let page = this.cartList[i].length / this.size;

				page = Math.ceil(page) + 1

				try {
					const requestPayload = {
						page: page,
						size: this.size,
						rec_id: this.checkoutInfo.total.rec_list.join(),
						use_type: i == 0 ? 1 : 0
					};
					const {
						data
					} = await this.$store.dispatch('getValueCard', {
						...requestPayload
					});

					const {
						card_list
					} = data;

					if (!this.checkoutInfoLoadedAt) {
						this.checkoutInfoLoadedAt = Date.now();
					}

					this.valueCartInfo = data;
					const useCardCount = data && typeof data.use_card_count !== 'undefined' ? data.use_card_count : null;
					const notUseCardCount = data && typeof data.not_use_card_count !== 'undefined' ? data.not_use_card_count : null;
					if (card_list) {
						this.$set(this.cartPaginated, i, card_list.length < this.size ? 0 : 1);

						this.$set(this.cartList, i, [...this.cartList[i], ...card_list]);

						this.shopEmpty = this.cartList[i].length == 0;
						this.loadmoreStatus = card_list.length < this.size ? '没有更多了' : '加载中...';
					};

					const selectedCardId = Number(this.valueCardObject && this.valueCardObject.valueCardId ? this.valueCardObject.valueCardId : 0);
					this.applyDefaultValueCard();
					this.autoPriorityApplied = false;
				} catch (error) {
				} finally {
					this.valueCardLoading = false;
					this.resetValueCardLoadRetry();
					if (this.valueCartInfo && this.valueCartInfo.card_list && this.valueCartInfo.card_list.length > 0) {
						this.autoPriorityApplied = false;

			mergeValueCardData(data = {}, tag = '') {
				// 【关键修复】获取旧的 total 对象，用于保留其他接口返回的字段
				const oldTotal = (this.checkoutInfo && this.checkoutInfo.total) || this.total || {};
				
				// 从接口返回的数据开始合并（后端返回为扁平结构，free_shipping_fee 等在 data 顶层）
				const merged = { ...(data || {}) };
				const responseHasCard = this.hasValidValueCard(merged);

				if (responseHasCard) {
					this.persistValueCardFromResponse(merged, `merge:${tag}`);
					// 【关键修复】即使有储值卡，也要保留旧字段（coupons_money、integral、bonus_money 等）
					// 【核心修复】也需要进行字段过滤，避免用 0 覆盖其他接口设置的有效值
					// 继续执行下面的字段过滤逻辑，不要直接返回
				}

				// 【关键修复】检查接口是否明确返回了 value_card_id: 0（表示用户取消了储值卡）
				// 如果接口返回 value_card_id: 0，说明用户明确取消了储值卡，接口返回的 amount 已经是取消后的正确金额
				// 不应该使用 fallback 逻辑来调整 amount，应该直接使用接口返回的 amount
				const responseValueCardId = Number(merged.value_card_id || 0);
				const responseCardMoney = Number(merged.card_money || 0);
				const isExplicitlyCancelled = responseValueCardId === 0 && responseCardMoney === 0 && merged.amount !== undefined;

				const fallback = this.getPersistedValueCard(tag);
				const totalRef = this.total || {};
				if (fallback) {
					const hadValueCard = this.hasValidValueCard(merged);
					
					// 【关键修复】如果用户明确取消了储值卡，不使用 fallback 的储值卡信息
					if (!isExplicitlyCancelled) {
						merged.value_card_id = fallback.value_card_id;
						merged.card_money = fallback.card_money;
						merged.card_money_formated = fallback.card_money_formated;
						merged.card_formated = merged.card_formated || fallback.card_money_formated;
					} else {
						// 用户明确取消了储值卡，设置为 0
						merged.value_card_id = 0;
						merged.card_money = 0;
						merged.card_money_formated = '0.00';
						merged.card_formated = merged.card_formated || '0.00';
					}
					
					merged.vc_dis = merged.vc_dis || fallback.vc_dis || totalRef.vc_dis;
					merged.vc_dis_money = merged.vc_dis_money || fallback.vc_dis_money || totalRef.vc_dis_money;
					
					// 【关键修复】如果用户明确取消了储值卡，直接使用接口返回的 amount，不再调整
					if (isExplicitlyCancelled) {
						// 接口返回的 amount 已经是取消储值卡后的正确金额，直接使用
						// 不需要再减去 fallback.card_money
					} else if (!hadValueCard && fallback.card_money > 0) {
						// 如果接口没有返回储值卡信息但我们需要补回，需要调整amount
						const currentAmount = this.moneyPrecision(Number(merged.amount) || 0);
						if (currentAmount > 0) {
							// 接口返回的amount可能已经包含了其他扣款（如优惠券），需要再减去储值卡金额
							merged.amount = this.moneyPrecision(Math.max(0, currentAmount - fallback.card_money));
						} else if (fallback.amount_after_card !== null && fallback.amount_after_card !== undefined) {
							merged.amount = fallback.amount_after_card;
						}
					} else if ((merged.amount === undefined || merged.amount === null || isNaN(Number(merged.amount)))) {
						if (fallback.amount_after_card !== null && fallback.amount_after_card !== undefined) {
							merged.amount = fallback.amount_after_card;
						} else if (this.amountPrice !== undefined && this.amountPrice !== null) {
							merged.amount = this.amountPrice;
						}
					}
				}
				
				// 【关键修复】合并旧字段，确保不会丢失其他接口返回的字段（coupons_money、integral、bonus_money 等）
				// 【核心修复】根据接口类型（tag）决定保留哪些字段，避免不同接口互相覆盖
				// - submitValuecard: 只更新储值卡相关字段
				// - submitCoupons: 只更新优惠券相关字段
				// - 其他接口: 更新对应字段
				let filteredMerged = {};
				
				if (tag === 'submitValuecard') {
					// 储值卡接口：只保留储值卡相关字段，不覆盖 coupons_money、integral、bonus_money 等
					const valueCardFields = [
						'value_card_id', 'card_money', 'card_money_formated', 'card_formated',
						'vc_dis', 'vc_dis_money', 'vc_dis_money_formated',
						'amount', 'amount_formated',  // amount 是通用字段，需要更新
						'goods_price', 'goods_price_formated', 'market_price', 'market_price_formated',
						'bonus_goods_price', 'saving', 'saving_formated',
						'dis_amount', 'dis_amount_formated', 'discount', 'discount_formated',
						'goods_number', 'presale_price', 'real_goods_count', 'virtual_goods_count', 'seller_goods_count',
						'need_inv', 'inv_type', 'inv_payee', 'inv_content', 'tax', 'tax_formated',
						'rec_list', 'consignee', 'is_kj', 'free_shipping_fee', 'free_shipping_fee_formated',
						'coupons_count', 'ru_id', 'youhuijia', 'membership_card_buy_money', 'membership_card_buy_money_formated',
						'membership_card_discount_price', 'membership_card_discount_price_formated',
						'success_type', 'ru_shipping_fee_list', 'shopping_fee', 'shopping_fee_formated',
						'order_membership_card_id', 'seller_amount', 'bonus_money', 'bonus_money_formated', 'bonus_id'
					];
					valueCardFields.forEach(field => {
						if (merged.hasOwnProperty(field)) {
							filteredMerged[field] = merged[field];
						}
					});
				} else if (tag === 'submitCoupons') {
					// 优惠券接口：只保留优惠券相关字段，不覆盖 card_money、integral、bonus_money 等
					const couponFields = [
						'coupons_money', 'coupons_money_formated', 'coupons_id', 'coupons_count',
						'amount', 'amount_formated',  // amount 是通用字段，需要更新
						'goods_price', 'goods_price_formated', 'market_price', 'market_price_formated',
						'bonus_goods_price', 'saving', 'saving_formated',
						'dis_amount', 'dis_amount_formated', 'discount', 'discount_formated',
						'goods_number', 'presale_price', 'real_goods_count', 'virtual_goods_count', 'seller_goods_count',
						'need_inv', 'inv_type', 'inv_payee', 'inv_content', 'tax', 'tax_formated',
						'rec_list', 'consignee', 'is_kj', 'free_shipping_fee', 'free_shipping_fee_formated',
						'ru_id', 'youhuijia', 'membership_card_buy_money', 'membership_card_buy_money_formated',
						'membership_card_discount_price', 'membership_card_discount_price_formated',
						'success_type', 'ru_shipping_fee_list', 'shopping_fee', 'shopping_fee_formated',
						'order_membership_card_id', 'seller_amount', 'dis_type'
					];
					couponFields.forEach(field => {
						if (merged.hasOwnProperty(field)) {
							filteredMerged[field] = merged[field];
						}
					});
				} else {
					// 其他接口：保留所有字段（保持原有逻辑）
					filteredMerged = merged;
				}
				
				const result = {
					...oldTotal,      // 保留所有旧字段（包括 coupons_money、integral、bonus_money、surplus 等）
					...filteredMerged // 只覆盖当前接口应该更新的字段
				};
				return result;
			},
			hasValidValueCard(source) {
				if (!source) return false;
				const id = Number(source.value_card_id) || 0;
				const money = Number(source.card_money) || 0;
				return id > 0 && money > 0;
			},
			getPersistedValueCard(tag = '') {
				const candidates = [
					this.lastPersistedValueCard,
					this.total,
					this.valueCardObject ? {
						value_card_id: this.valueCardObject.valueCardId,
						card_money: this.valueCardObject.valueCardMoney,
						card_money_formated: this.valueCardObject.valueCardContent,
						vc_dis: this.valueCardObject.vc_dis,
						vc_dis_money: this.valueCardObject.vc_dis_money,
						amount: this.amountPrice
					} : null
				];

				for (const candidate of candidates) {
					if (candidate && this.hasValidValueCard(candidate)) {
						const formatted = candidate.card_money_formated ||
							candidate.card_formated ||
							`${this.currency}${this.formatCurrencyValue(candidate.card_money)}`;
						const amountAfter = candidate.amount_after_card !== undefined
							? candidate.amount_after_card
							: (candidate.amount !== undefined ? candidate.amount : null);
						return {
							value_card_id: Number(candidate.value_card_id),
							card_money: Number(candidate.card_money),
							card_money_formated: formatted,
							amount_after_card: amountAfter !== null ? Number(amountAfter) : null,
							vc_dis: candidate.vc_dis,
							vc_dis_money: candidate.vc_dis_money
						};
					}
				}
				return null;
			},
			persistValueCardFromResponse(data = {}, tag = '') {
				if (!this.hasValidValueCard(data)) {
					return false;
				}
				const cardMoney = data.card_money != null && data.card_money !== '' ? this.moneyPrecision(Number(data.card_money) || 0) : this.getValueCardMoney();
				this.lastPersistedValueCard = {
					value_card_id: Number(data.value_card_id) || 0,
					card_money: cardMoney,
					card_money_formated: cardMoney > 0 ? 
						(data.card_money_formated || data.card_formated || `${this.currency}${this.formatCurrencyValue(cardMoney)}`) : 
						(data.card_money_formated || data.card_formated || ''),
					amount_after_card: data.amount !== undefined ? Number(data.amount) : null,
					vc_dis: data.vc_dis,
					vc_dis_money: data.vc_dis_money
				};
				return true;
			},
			clearPersistedValueCard(tag = '') {
				this.lastPersistedValueCard = {
					value_card_id: 0,
					card_money: 0,
					card_money_formated: '',
					amount_after_card: null,
					vc_dis: 1,
					vc_dis_money: 0
				};
			},
			seedPersistedValueCardFromTotal(tag = '') {
				if (this.checkoutInfo && this.checkoutInfo.total) {
					this.persistValueCardFromResponse(this.checkoutInfo.total, tag);
				}
			},
		//默认加载
		checkoutDefault() {
			var that = this

			// 生成版本号
			const version = incrementVersion();

			this.checkoutLoadingClosed = false; // 重置标志，表示 order info loading 还未关闭
			this.orderInfoLoadingActive = true; // 标记 order info loading 正在显示
			this.currentCheckoutPromise = null; // 重置 Promise
			uni.showLoading({
				title: this.$t('lang.loading')
			});
			
		// 根据 is_all_check 决定 cat_rec_id 的值
		// 全选时 cat_rec_id 传空，非全选时传递实际的商品ID列表
		// 【修复】优先使用 reckon_cartgoods 的结果（URL 或 storage），作为唯一可信来源；checkoutInfo.total.rec_list 仅作兜底
		const fromBackendRecList = this.checkoutInfo && this.checkoutInfo.total && Array.isArray(this.checkoutInfo.total.rec_list) && this.checkoutInfo.total.rec_list.length > 0
			? this.checkoutInfo.total.rec_list.join(',')
			: '';
		const fromUrlOrStorage = this.cat_rec_id_from_url || (() => {
			const raw = uni.getStorageSync('cat_rec_id');
			if (raw == null || raw === '') return '';
			// 购物车写入的是 [[rec_id1],[rec_id2],...]，后端需要逗号分隔字符串，统一转成字符串
			if (Array.isArray(raw)) {
				const flat = raw.flatMap(item => Array.isArray(item) ? item : [item]);
				return flat.filter(Boolean).join(',');
			}
			if (typeof raw === 'string') return raw;
			return String(raw);
		})();
		const catRecIdValue = this.is_all_check == 1 ? '' : (fromUrlOrStorage || fromBackendRecList || 0);
		
		// 准备店铺ID参数
		const ruIdValue = this.ru_ids || 0;
			if (uni.getStorageSync('isyong') == 1) {
			if (this.store_id > 0) {
			
				checkoutPromise = this.$store.dispatch('setShoppingCheckout', {
					rec_type: this.rec_type,
					store_id: this.store_id,
					app_version: version,
					leader_id: uni.getStorageSync('leader_id') ? uni.getStorageSync('leader_id') : 0,
					cat_rec_id: catRecIdValue,
					is_all_check: this.is_all_check,
					ru_id: ruIdValue
				})
			} else {
				
				checkoutPromise = this.$store.dispatch('setShoppingCheckout', {
					rec_type: this.rec_type,
					type_id: this.type_id,
					team_id: this.team_id,
					app_version: version,
					leader_id: uni.getStorageSync('leader_id') ? uni.getStorageSync('leader_id') : 0,
					cat_rec_id: catRecIdValue,
					is_all_check: this.is_all_check,
					ru_id: ruIdValue
				})
			}
			} else {
				if (this.store_id > 0) {
				checkoutPromise = this.$store.dispatch('setShoppingCheckout', {
						rec_type: this.rec_type,
						store_id: this.store_id,
						app_version: version,
						leader_id: uni.getStorageSync('leader_id') ? uni.getStorageSync('leader_id') : 0,
						cat_rec_id: catRecIdValue,
						is_all_check: this.is_all_check,
						ru_id: ruIdValue
					})
				} else {
				checkoutPromise = this.$store.dispatch('setShoppingCheckout', {
						rec_type: this.rec_type,
						type_id: this.type_id,
						team_id: this.team_id,
						app_version: version,
						leader_id: uni.getStorageSync('leader_id') ? uni.getStorageSync('leader_id') : 0,
						cat_rec_id: catRecIdValue,
						is_all_check: this.is_all_check,
						ru_id: ruIdValue
					})
				}
			}
			// 确保 loading 只在 order info 接口真正返回数据或失败时才关闭
			// 如果 checkoutPromise 为 null，说明没有调用接口，不应该关闭 loading
			if (checkoutPromise) {
				// 保存 Promise，供其他方法等待完成
				this.currentCheckoutPromise = Promise.resolve(checkoutPromise);
				// 确保 checkoutPromise 是 Promise
				const promise = Promise.resolve(checkoutPromise);
				promise.then((result) => {
					// 请求成功，接口真正返回数据后关闭 loading
					if (!this.checkoutLoadingClosed && this.orderInfoLoadingActive) {
						this.checkoutLoadingClosed = true;
						this.orderInfoLoadingActive = false;
						uni.hideLoading();
					}
					
					// 【关键修复】检查商品列表（rec_list）是否变化，如果变化则清空优惠券状态
					// 确保更换商品后，不会使用旧的优惠券ID
					if (this.checkoutInfo && this.checkoutInfo.total && this.checkoutInfo.total.rec_list) {
						const currentRecList = this.checkoutInfo.total.rec_list;
						const currentRecListStr = JSON.stringify(currentRecList.sort());
						const lastRecListStr = this.lastRecList ? JSON.stringify(this.lastRecList.sort()) : null;
						
						// 如果 rec_list 变化了，清空优惠券相关状态
						if (lastRecListStr !== null && currentRecListStr !== lastRecListStr) {
							this.couponsObject.couponsIdArr = [];
							this.couponsObject.couponsMoney = 0;
							this.couponsObject.couponsContent = this.$t('lang.no_use_coupons');
							// 【关键修复】清空 couponsId 数组，shopCouponList watch 会在需要时重新初始化
							this.couponsObject.couponsId = [];
							this.defaultSelectedCoupon.ids = [];
							this.defaultSelectedCoupon.money = 0;
						}
						
						// 【关键修复】检查 orderinfo 返回的 total.coupons_id
						// 如果 total.coupons_id 存在且不为空，说明后端已自动应用优惠券，需要同步到前端
						// 如果 total.coupons_id 为空或为 0，则使用 coupons_list 中的数据自动选择优惠券
						const backendCouponsId = this.checkoutInfo.total.coupons_id;
						const hasBackendCoupons = backendCouponsId && 
						                            ((Array.isArray(backendCouponsId) && backendCouponsId.length > 0) || 
						                             (typeof backendCouponsId === 'number' && backendCouponsId > 0));
						
						if (hasBackendCoupons) {
							// 后端已返回优惠券ID，同步后端状态到前端
							const backendCouponsIds = Array.isArray(backendCouponsId) 
								? backendCouponsId.map(id => Number(id))
								: [Number(backendCouponsId)];
							const currentCouponsIds = (this.couponsObject.couponsIdArr || []).map(id => Number(id));
							
							// 检查后端返回的优惠券ID是否与前端当前选中的一致
							const isSameIds = backendCouponsIds.length === currentCouponsIds.length &&
							                  backendCouponsIds.every((id) => currentCouponsIds.includes(id)) &&
							                  currentCouponsIds.every((id) => backendCouponsIds.includes(id));
							
							if (!isSameIds) {
								// 同步后端返回的优惠券ID到前端
								this.couponsObject.couponsIdArr = [...backendCouponsIds];
								
								// 同步优惠券金额
								if (this.checkoutInfo.total.coupons_money > 0) {

									this.couponsObject.couponsContent = this.checkoutInfo.total.coupons_money_formated || this.$t('lang.no_use_coupons');
								} else {
									// 【关键修复】如果 coupons_money = 0，需要检查是否有免邮券
									// 构造一个包含必要字段的对象，用于 updateCouponsContent 函数
									const normalizedData = {

										free_shipping_fee: this.checkoutInfo.total.free_shipping_fee || 0,
										coupons_id: backendCouponsIds

								// 更新 defaultSelectedCoupon
								this.defaultSelectedCoupon.ids = [...backendCouponsIds];
								this.defaultSelectedCoupon.money = Number(this.checkoutInfo.total.coupons_money) || 0;
								
								// 同步到 couponsId 数组（根据 shopCouponList 和 couponsList 的结构来匹配）
								// 需要根据优惠券的 ru_id 来匹配店铺
								if (this.shopCouponList && Array.isArray(this.shopCouponList) && this.couponsList && Array.isArray(this.couponsList)) {
									// 创建一个映射：uc_id -> { ru_id, cou_money }
									const couponMap = new Map();
									this.couponsList.forEach(coupon => {
										if (coupon.uc_id && backendCouponsIds.includes(Number(coupon.uc_id))) {
											couponMap.set(Number(coupon.uc_id), {
												ru_id: coupon.ru_id,
												cou_money: coupon.cou_money || ''
											});

									});
									
									// 重新初始化 couponsId 数组
									this.couponsObject.couponsId = [];
									this.shopCouponList.forEach((shop, index) => {
										// 查找该店铺对应的优惠券ID（根据 ru_id 匹配）
										let shopCouponId = '';
										let shopCouponMoney = '';
										
										// 遍历后端返回的优惠券ID，找到属于该店铺的优惠券
										for (const ucId of backendCouponsIds) {
											const couponInfo = couponMap.get(ucId);
											if (couponInfo && couponInfo.ru_id == shop.ru_id) {
												shopCouponId = ucId;
												shopCouponMoney = couponInfo.cou_money;
												break; // 每个店铺只取第一个匹配的优惠券
											}
										}
										
										this.couponsObject.couponsId[index] = {
											uc_id: shopCouponId,
											cou_money: shopCouponMoney
										};
									});
								}
							}
						} else {
							// 后端没有返回优惠券ID（为空或为0），需要从 coupons_list 中自动选择
							// 【关键修复】在 checkoutDefault 完成后执行自动选择，确保使用的是最新的 order info 数据
							// 使用 $nextTick 确保 shopCouponList 计算属性已更新
							this.$nextTick(() => {
								// 检查是否已经有选中的优惠券，避免重复选择
								const hasSelectedCoupons = this.couponsObject.couponsIdArr && this.couponsObject.couponsIdArr.length > 0;
								
								if (!hasSelectedCoupons) {

									let couponListToUse = [];
									
									if (this.shopCouponList && Array.isArray(this.shopCouponList) && this.shopCouponList.length > 0) {
										// 使用 shopCouponList（已经按店铺分组）
										couponListToUse = this.shopCouponList;
									} else if (this.couponsList && Array.isArray(this.couponsList) && this.couponsList.length > 0) {
										// shopCouponList 为空，但 coupons_list 有数据，手动按店铺分组
										
										let dataArr = [];
										this.couponsList.forEach((mapItem) => {
											if (dataArr.length == 0) {
												dataArr.push({
													ru_id: mapItem.ru_id,
													list: [mapItem]
												});
											} else {
												let res = dataArr.some((item) => {
													// 判断相同的店铺，有就添加到当前项
													if (item.ru_id == mapItem.ru_id) {
														item.list.push(mapItem);
														return true;
													}
												});
												if (!res) {
													// 如果没找相同的店铺，添加一个新对象
													dataArr.push({
														ru_id: mapItem.ru_id,
														list: [mapItem]
													});
												}
											}
										});
										couponListToUse = dataArr;
									}
									
									// 如果有可用的优惠券列表，执行自动选择
									if (couponListToUse.length > 0) {
										// 【关键修复】确保 couponsId 数组长度与店铺数量一致
										// 如果 couponsId 数组长度不够，需要先初始化
										if (!this.couponsObject.couponsId || this.couponsObject.couponsId.length < couponListToUse.length) {
											this.couponsObject.couponsId = [];
											couponListToUse.forEach(() => {
												this.couponsObject.couponsId.push({
													uc_id: '',
													cou_money: ''
												});
											});
										}
										
										couponListToUse.forEach((shop, index) => {
											if (shop.list && shop.list.length > 0) {
												// 精准计算最大面额优惠券
												let maxCoupon = shop.list.reduce((max, current) => {
													const currentMoney = parseFloat(current.cou_money) || 0;
													const maxMoney = parseFloat(max.cou_money) || 0;
													return currentMoney > maxMoney ? current : max;
												}, shop.list[0]); // 明确指定初始值
												
												// 执行优惠券选中操作
												if (maxCoupon) {
													this.couponValClick(
														maxCoupon.uc_id,
														maxCoupon.cou_money,
														index
													);
												}
											}
										});
										
										// 异步提交提升稳定性，确保优惠券选中后再调用 submitCoupons 更新总金额
										setTimeout(() => {
											// 【关键修复】标记这是初始化时自动选择优惠券
											this.isInitializingCoupons = true;
											this.submitCoupons();
										}, 100);
									}
								}
							});
						}
						
						// 更新 lastRecList
						this.lastRecList = [...currentRecList];
						// 【修复】用后端返回的 rec_list 覆盖并持久化，刷新后再次请求 orderinfo 时仍传这批 rec_id，避免传成默认 10 条
						const recListStr = currentRecList.join(',');
						this.cat_rec_id_from_url = recListStr;
						uni.setStorageSync('cat_rec_id', recListStr);
					}
					
					// 【核心修复】在 checkoutDefault 完成后，按顺序执行初始化接口
					// 顺序：优惠券 → 储值卡 → 余额先用后付 → 积分 → 红包
					this.$nextTick(() => {
						this.executeInitializationAPIsInOrder().then(() => {
							// 【关键修复】如果没有余额/信用付，executeInitializationAPIsInOrder 中的 surplusvValHandlePromise
							// 会直接返回（因为 surplusAmount === 0），不会调用接口获取包含运费的金额
							// 所以需要在这里手动调用一次，确保金额包含运费
							if (!this.balancePaymentActive && this.use_surplus_val === 0 && this.use_credit_val === 0) {
								// 没有余额/信用付，需要调用接口获取包含运费的金额
								this.surplusvValHandle();
							}
						}).catch((error) => {
							// 静默处理错误，避免影响主流程
							console.error('[executeInitializationAPIsInOrder] 执行失败:', error);
						});
					});
					
					// 清除 Promise 引用
					this.currentCheckoutPromise = null;
				}).catch((error) => {
					// 请求失败，接口失败后关闭 loading
					if (!this.checkoutLoadingClosed && this.orderInfoLoadingActive) {
						this.checkoutLoadingClosed = true;
						this.orderInfoLoadingActive = false;
						uni.hideLoading();
					}
					// 清除 Promise 引用
					this.currentCheckoutPromise = null;
					
					// 双重判断：如果 status === 'failed' 且 errors.code === 6652，清除 cat_rec_id 缓存
					// 数据结构: {"status":"failed","errors":{"code":6652,"message":"提交失败，请重试"}}
					if (error && error.status === 'failed' && error.errors && error.errors.code === 6652) {
						// 异常情况：清除缓存中的 cat_rec_id 值
						uni.removeStorageSync('cat_rec_id');
					}
					// 如果 status === 'failed' 但 errors.code 不是 6652，则不清除 cat_rec_id
					
					// 获取错误信息，使用 errors.message
					let errorMessage = '提交失败，请重试';
					if (error && error.errors && error.errors.message) {
						errorMessage = error.errors.message;
					}
					
					// 使用自定义 toast 显示错误信息
					if (this.$refs && this.$refs.customToast) {
						this.$refs.customToast.showToast({
							title: errorMessage,
							icon: 'none',
							duration: 2000
						});
						
						// 延迟返回上一级，确保 toast 显示
						setTimeout(() => {
							uni.navigateBack({
								delta: 1
							});
						}, 500);
					} else {
						// 如果自定义 toast 不可用，使用默认 toast
						uni.showToast({
							title: errorMessage,
							icon: 'none',
							duration: 2000
						});
						setTimeout(() => {
							uni.navigateBack({
								delta: 1
							});
						}, 500);
					}
				}); }
			},
			// 【核心修复】按顺序执行初始化接口，避免数据覆盖问题
			// 顺序：优惠券 → 储值卡 → 余额先用后付 → 积分 → 红包
			// 每个接口等待上一个接口完成并更新状态后，再执行下一个
			// 如果某个接口返回 error（status === 'failed'），阻断后续执行
			async executeInitializationAPIsInOrder() {
				try {
					// 1. 优惠券接口
					if (this.couponsObject && this.couponsObject.couponsIdArr && this.couponsObject.couponsIdArr.length > 0) {
						const couponResult = await this.submitCouponsPromise();
						if (couponResult && couponResult.status === 'failed') {
							return;
						}
					}

					// 2. 储值卡接口
					if (this.valueCardObject && this.valueCardObject.valueCardId && this.valueCardObject.valueCardId > 0) {
						const valueCardResult = await this.submitValuecardPromise();
						if (valueCardResult && valueCardResult.status === 'failed') {
							return;
						}
					}
					
					// 3. 余额先用后付接口
					if (this.balancePaymentActive || (this.use_surplus_val > 0 || this.use_credit_val > 0)) {
						const surplusResult = await this.surplusvValHandlePromise();
						if (surplusResult && surplusResult.status === 'failed') {
							return;
						}
					}
					
					// 4. 积分接口
					if (this.use_integral_val && this.use_integral_val > 0) {
						const integralResult = await this.integralSelfHandlePromise();
						if (integralResult && integralResult.status === 'failed') {
							return;
						}
					}
					
					// 5. 红包接口
					if (this.bonusObject && this.bonusObject.bonusId && this.bonusObject.bonusId > 0) {
						const bonusResult = await this.submitBonusPromise();
						if (bonusResult && bonusResult.status === 'failed') {
							return;
						}
					}
				} catch (error) {
					console.error('[executeInitializationAPIsInOrder] 执行过程中出错:', error);
				}
			},

						} else if (this.invoice.inv_mobile == '') {

								title: '请填写手机号码',

							})
							return false
						} else {
							this.showBase = false

							uni.showToast({
								title: this.$t('lang.fill_in_company_name'),
								icon: 'none'
							});
							return false
						} else if (this.invoice.company_tid == '') {
							uni.showToast({
								title: this.$t('lang.fill_in_taxpayer_id_number'),
								icon: 'none'
							});

			getChangetax() {
				uni.request({
					url: this.websiteUrl + '/api/trade/changetax',
					method: 'POST',
					data: {
						total: this.total,
						inv_content: this.invoice.invoiceConent
					},
					header: {
						'Content-Type': 'application/json',
						'token': uni.getStorageSync('token'),
						'X-Client-Hash': uni.getStorageSync('client_hash')
					},
					success: ({
						data: {
							data
						}
					}) => {
						const normalized = this.mergeValueCardData(data, 'getChangetax');
						this.$store.dispatch('setCheckoutTotal', normalized)
						this.amountPrice = normalized.amount
						this.ratePrice = normalized.rate_price
						this.getType = false
						// 储值卡扣款以后端返回的 card_money 为准
					if (normalized.value_card_id > 0 && !this.userValueCardCancelled) {
						const cardMoney = this.moneyPrecision(Number(normalized.card_money) || 0);
						this.valueCardObject.valueCardMoney = cardMoney;
						if (cardMoney > 0) {
							this.valueCardObject.valueCardContent = normalized.card_money_formated || (this.currency + this.formatCurrencyValue(cardMoney));
							this.userValueCardCancelled = false;
						} else {
							this.valueCardObject.valueCardContent = this.$t('lang.no_use_value_card');
						}
						this.valueCardObject.valueCardId = normalized.value_card_id;
					} else {
						if (this.userValueCardCancelled) {
							this.valueCardObject.valueCardId = 0;
						}
						this.valueCardObject.valueCardMoney = 0;
						this.valueCardObject.valueCardContent = this.$t('lang.no_use_value_card');
					}
					this.persistValueCardFromResponse(normalized, 'getChangetax');

						// 【关键修复】使用统一的辅助函数处理优惠券显示逻辑
						this.updateCouponsContent(normalized)

						if (normalized.bonus_money > 0) {
							this.bonusObject.bonusContent = normalized.bonus_money_formated
						} else {
							this.bonusObject.bonusContent = this.$t('lang.no_use_bonus')
						}

						this.total.integral_money = normalized.integral_money
						this.ensurePaymentPriority();

						if (!this.balancePaymentActive) {
							this.use_surplus_val = 0
							this.use_credit_val = 0
						}
					}
				})
			},
