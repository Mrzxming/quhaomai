			//红包确认
			submitBonus() {
				// 【关键修复】直接使用 checkoutInfo.total 而不是 this.total，确保获取最新的值（包括 coupons_money、integral 等）
				const latestTotal = this.checkoutInfo && this.checkoutInfo.total ? this.checkoutInfo.total : this.total;
				uni.request({
					url: this.websiteUrl + '/api/trade/changebon',
					method: 'POST',
					data: {
						bonus_id: this.bonusObject.bonusId,
						total: latestTotal,
						shipping_id: this.shipping_id,
						// 【关键修复】如果有优惠券并且使用的情况，传递已选中的优惠券ID
						uc_id: (this.couponsObject.couponsIdArr && this.couponsObject.couponsIdArr.length > 0) ? this.couponsObject.couponsIdArr : []
					},
					header: {
						'Content-Type': 'application/json',
						'token': uni.getStorageSync('token'),
						'X-Client-Hash': uni.getStorageSync('client_hash')
					},
					success: ({
						data: {
							data
						}
					}) => {
						const normalized = this.mergeValueCardData(data, 'submitBonus');
						this.$store.dispatch('setCheckoutTotal', normalized)
						if (normalized.bonus_money > 0) {
							this.bonusObject.bonusContent = normalized.bonus_money_formated
						} else {
							this.bonusObject.bonusContent = this.$t('lang.no_use_bonus')
						}
						this.total.bonus_money = normalized.bonus_money
						this.amountPrice = normalized.amount
						this.bonusObject.bonusMoney = normalized.bonus_money
					// 储值卡扣款以后端返回的 card_money 为准
					if (normalized.value_card_id > 0 && !this.userValueCardCancelled) {
						const cardMoney = this.moneyPrecision(Number(normalized.card_money) || 0);
						this.valueCardObject.valueCardMoney = cardMoney;
						if (cardMoney > 0) {
							this.valueCardObject.valueCardContent = normalized.card_money_formated || (this.currency + this.formatCurrencyValue(cardMoney));
							this.userValueCardCancelled = false;
						} else {
							this.valueCardObject.valueCardContent = this.$t('lang.no_use_value_card');
						}
						this.valueCardObject.vc_dis_money = normalized.vc_dis_money || this.valueCardObject.vc_dis_money;
						this.valueCardObject.vc_dis = normalized.vc_dis || this.valueCardObject.vc_dis;
						this.valueCardObject.valueCardId = normalized.value_card_id;
					} else {
						if (this.userValueCardCancelled) {
							this.valueCardObject.valueCardId = 0;
						}
						this.valueCardObject.valueCardMoney = 0;
						this.valueCardObject.valueCardContent = this.$t('lang.no_use_value_card');
					}
					this.persistValueCardFromResponse(normalized, 'submitBonus');
						this.ensurePaymentPriority();
						// 【与储值卡一致】红包切换/取消后，若余额/先用后付已开启，重新计算 先用后付 金额
						if (this.balancePaymentActive) {
							this.surplusvValHandle();
						}
					},
					fail: () => {
						// 【关键修复】只有在 order info loading 已关闭时才关闭 loading
						// 如果 order info loading 还在显示，不关闭它（让它继续显示）
						if (this.checkoutLoadingClosed || !this.orderInfoLoadingActive) {
							uni.hideLoading();
						}
					},
					complete: () => {
						// 【关键修复】只有在 order info loading 已关闭时才关闭 loading
						// 如果 order info loading 还在显示，不关闭它（让它继续显示）
						if (this.checkoutLoadingClosed || !this.orderInfoLoadingActive) {
							uni.hideLoading();
						}
					}
				})
				this.bonusObject.bonusBase = false
				this.surplus_status = false
			},
			//优惠券选择
			couponsActive(id) {
				if (this.couponsObject.couponsId != id) {
					this.couponsObject.couponsId = id
				} else {
					this.couponsObject.couponsId = 0
				}
			},
			updateCouponsContent(normalized, backendCouponsIds = null) {
				// 1. 优先检查是否有金额优惠券
				if (normalized.coupons_money > 0) {
					this.couponsObject.couponsContent = normalized.coupons_money_formated
					return;
				}
				
				// 2. 检查是否有免邮费用（商品有邮费时，免邮券会返回免邮费用）
				if (normalized.free_shipping_fee > 0) {
					this.couponsObject.couponsContent = '免邮券';
					return;
				}
				
				// 3. 如果 free_shipping_fee = 0，需要检查是否选中了免邮券（商品全部包邮的情况）
				// 检查接口返回的 coupons_id 数组，如果有值说明优惠券已应用
				const couponsIdsFromBackend = backendCouponsIds !== null ? backendCouponsIds : (normalized.coupons_id || []);
				const hasBackendCoupons = Array.isArray(couponsIdsFromBackend) && couponsIdsFromBackend.length > 0;
				
				// 检查前端选中的优惠券ID数组
				const frontendCouponsIds = this.couponsObject.couponsIdArr || [];
				const hasFrontendCoupons = Array.isArray(frontendCouponsIds) && frontendCouponsIds.length > 0;
				
				// 如果接口返回了优惠券ID或前端选中了优惠券，需要进一步判断是否包含免邮券
				if (hasBackendCoupons || hasFrontendCoupons) {
					// 获取要检查的优惠券ID数组（优先使用接口返回的，否则使用前端选中的）
					const couponsIdsToCheck = hasBackendCoupons ? couponsIdsFromBackend.map(id => Number(id)) : frontendCouponsIds.map(id => Number(id));
					
					// 检查 couponsList 中是否有免邮券（cou_type = 5）
					let hasFreeShippingCoupon = false;
					if (this.couponsList && Array.isArray(this.couponsList) && this.couponsList.length > 0) {
						hasFreeShippingCoupon = this.couponsList.some(coupon => {
							const ucId = Number(coupon.uc_id);
							const couType = Number(coupon.cou_type || 0);
							// 检查是否在选中的优惠券ID中，且是免邮券类型（cou_type = 5）
							return couponsIdsToCheck.includes(ucId) && couType === 5;
						});
					}
					
					// 如果选中了免邮券，即使 free_shipping_fee = 0（商品全部包邮），也显示"免邮券"
					if (hasFreeShippingCoupon) {
						this.couponsObject.couponsContent = '免邮券';
					} else {
						// 如果选中了其他类型的优惠券，但金额为0，显示"未选择优惠券"
						this.couponsObject.couponsContent = this.$t('lang.no_use_coupons')
					}
				} else {
					// 没有选中任何优惠券
					this.couponsObject.couponsContent = this.$t('lang.no_use_coupons')
				}
			},
			//优惠券确定
			submitCoupons(uc_id) {
				// 【关键修复】确保 checkoutDefault 已完成，使用最新的 total 和 shipping_id
				// 如果 checkoutDefault 还在进行中，等待它完成后再调用优惠券接口
				const waitForCheckoutDefault = () => {
					if (this.currentCheckoutPromise && this.orderInfoLoadingActive && !this.checkoutLoadingClosed) {
						return this.currentCheckoutPromise.then(() => {
							// 等待一个微任务，确保 checkoutInfo 和 shipping_id 已更新
							return new Promise(resolve => {
								this.$nextTick(() => {
									setTimeout(resolve, 100);
								});
							});
						}).catch((error) => {
							return Promise.resolve();
						});
					}
					return Promise.resolve();
				};
				
					// 执行等待逻辑，然后调用接口
				waitForCheckoutDefault().then(() => {
					// 确保使用最新的 total 和 shipping_id
					const latestTotal = this.checkoutInfo && this.checkoutInfo.total ? this.checkoutInfo.total : this.total;
					const latestShippingId = this.shipping_id && this.shipping_id.length > 0 ? this.shipping_id : [];
					
					// 【关键修复】在使用余额 / 信用付时，确保将最新的余额金额同步到 total.surplus / total.surplus_formated
					// 后端 /api/trade/changecou 会直接使用 total.surplus 计算金额，如果这里始终是 0，就会导致后端忽略余额
					let totalForRequest = { ...latestTotal };
					try {
						// 1. 计算当前实际使用的余额金额（优先使用 balance_money，其次 payment_info.used_balance）
						const actualBalanceAmount = this.balance_money > 0
							? Number(this.balance_money)
							: (this.payment_info && Number(this.payment_info.used_balance) > 0
								? Number(this.payment_info.used_balance)
								: 0);
						
						// 2. 只有在余额开关开启且实际金额 > 0 时，才覆盖 total.surplus；否则保持后端原值（通常为 0）
						if (this.balancePaymentActive && actualBalanceAmount > 0) {
							const preciseBalance = this.moneyPrecision
								? this.moneyPrecision(actualBalanceAmount)
								: Number(actualBalanceAmount.toFixed(2));
							
							totalForRequest.surplus = preciseBalance;
							
							// 如果后端已经给了格式化字段，就尽量复用；否则本地格式化一个，避免传空字符串
							if (!totalForRequest.surplus_formated || Number(totalForRequest.surplus_formated) === 0) {
								const currencySymbol = this.currency || '¥';
								const formatFn = this.formatCurrencyValue || (v => Number(v).toFixed(2));
								totalForRequest.surplus_formated = `${currencySymbol}${formatFn(preciseBalance)}`;
							}
						}
					} catch (e) {
						totalForRequest = { ...latestTotal };
					}
					
					// 【关键修复】获取当前要提交的优惠券ID数组
					// 必须基于当前弹窗中实际选中的优惠券（couponsId），而不是使用可能过期的 couponsIdArr
					let currentCouponIds = []
					if (uc_id) {
						// 如果传入了 uc_id 参数，直接使用
						currentCouponIds = [uc_id]
					} else {
						// 如果没有传入 uc_id，从 couponsId 中重新计算当前选中的优惠券ID
						// 这样可以确保使用的是当前弹窗中实际选中的优惠券，而不是上一次的值
						currentCouponIds = []
						if (this.couponsObject.couponsId && Array.isArray(this.couponsObject.couponsId)) {
							// 【关键修复】只提取有效的 uc_id，并且确保 uc_id 不为空字符串
							this.couponsObject.couponsId.forEach(v => {
								if (v && v.uc_id && v.uc_id !== '' && v.uc_id !== 0) {
									currentCouponIds.push(v.uc_id)
								}
							})
						}
						
						// 【关键修复】额外检查：如果 currentCouponIds 为空，但 couponsIdArr 不为空
						// 说明 couponsId 可能没有正确更新，强制使用空数组，避免使用旧的优惠券ID
						if (currentCouponIds.length === 0 && this.couponsObject.couponsIdArr && this.couponsObject.couponsIdArr.length > 0) {
							currentCouponIds = [];
						}
					}
					
					// 检查是否与当前已应用的优惠券相同（避免重复调用接口）
					// 注意：这里比较的是 total.coupons_id（接口返回的已应用优惠券ID）和 couponsObject.couponsMoney（当前UI状态的优惠券金额）
					// 只有当优惠券ID和金额都完全相同时，才跳过接口调用
					if (this.couponsObject.couponsMoney > 0 && currentCouponIds.length > 0) {
						// 获取当前要提交的优惠券金额
						const currentCouponMoney = this.couponsObject.couponsMoney > 0 ? this.couponsObject.couponsMoney : 0
						
						// 检查优惠券ID是否相同（从接口返回的 coupons_id 字段获取）
						const currentTotalCouponsIds = (latestTotal.coupons_id || []).map(id => Number(id))
						const currentCouponIdsNum = currentCouponIds.map(id => Number(id))
						const isSameIds = currentCouponIdsNum.length === currentTotalCouponsIds.length &&
						                  currentCouponIdsNum.every((id) => currentTotalCouponsIds.includes(id)) &&
						                  currentTotalCouponsIds.every((id) => currentCouponIdsNum.includes(id))
						
						// 检查金额是否相同（允许小数点误差）
						const isSameMoney = Math.abs(Number(currentCouponMoney) - Number(this.defaultSelectedCoupon.money)) < 0.01
						
						if (isSameIds && isSameMoney) {
							// 直接关闭弹窗
							this.couponsObject.couponsBase = false
							return;
						}
					}
					
					// 【关键修复】更新 couponsIdArr 为当前选中的优惠券ID数组
					// 确保 couponsIdArr 与当前弹窗中实际选中的优惠券一致
					this.couponsObject.couponsIdArr = [...currentCouponIds]
					
					// 如果传入了 uc_id 参数，更新 couponsId[0]
					if (uc_id) {
						if (!this.couponsObject.couponsId[0]) {
							this.couponsObject.couponsId[0] = {
								uc_id: '',
								cou_money: ''
							}
						}
						this.couponsObject.couponsId[0].uc_id = uc_id;
						this.couponsObject.couponsId[0].cou_money = '';
					}
					
					// 【关键修复】优惠券接口使用独立的 loading，不影响 order info 的 loading
					// 如果 order info loading 还在显示，不关闭它，直接显示优惠券的 loading（会覆盖）
					// 在 complete 中，如果 order info loading 还在显示，就不关闭 loading
					uni.showLoading({
						title: '价格计算中~~'
					});
					uni.request({
						url: this.websiteUrl + '/api/trade/changecou',
						method: 'POST',
						data: {
							uc_id: currentCouponIds, // 【关键修复】使用重新计算的 currentCouponIds，而不是可能过期的 couponsIdArr
							total: latestTotal,
							shipping_id: latestShippingId
					},
					header: {
						'Content-Type': 'application/json',
						'token': uni.getStorageSync('token'),
						'X-Client-Hash': uni.getStorageSync('client_hash')
					},
					success: ({
						data: {
							data
						}
					}) => {
					const normalized = this.mergeValueCardData(data, 'submitCoupons');
					this.$store.dispatch('setCheckoutTotal', normalized)
					
					// 【关键修复】使用统一的辅助函数处理优惠券显示逻辑
					this.updateCouponsContent(normalized)

					var that = this
					// 使用 $set 确保响应式更新
					if (that.checkoutInfo && that.checkoutInfo.total) {
						// 【关键修复】直接使用后端返回的 coupons_money（可能是字符串 "50.00" 或数字），确保传递给后续接口
						// 后端返回的值直接使用，不做转换，因为后续接口需要这个值
						const couponsMoney = normalized.coupons_money !== undefined && normalized.coupons_money !== null 
							? normalized.coupons_money 
							: 0;
						that.$set(that.checkoutInfo.total, 'coupons_money', couponsMoney);
						
						// 同时更新 coupons_money_formated
						if (normalized.coupons_money_formated) {
							that.$set(that.checkoutInfo.total, 'coupons_money_formated', normalized.coupons_money_formated);
						} else if (couponsMoney > 0) {
							// 如果没有格式化字段，但 coupons_money > 0，生成一个格式化字符串
							const formattedValue = typeof couponsMoney === 'string' ? couponsMoney : Number(couponsMoney).toFixed(2);
							that.$set(that.checkoutInfo.total, 'coupons_money_formated', that.currency + formattedValue);
						} else {
							that.$set(that.checkoutInfo.total, 'coupons_money_formated', '0.00');
						}
						
						// 【关键修复】同时更新 coupons_id，确保后续接口能获取到正确的优惠券ID
						if (normalized.coupons_id !== undefined) {
							that.$set(that.checkoutInfo.total, 'coupons_id', normalized.coupons_id);
						}
						
						// 【修复免邮券显示问题】明确更新 free_shipping_fee 和 free_shipping_fee_formated
						if (normalized.free_shipping_fee !== undefined) {
							that.$set(that.checkoutInfo.total, 'free_shipping_fee', normalized.free_shipping_fee);
						}
						if (normalized.free_shipping_fee_formated) {
							that.$set(that.checkoutInfo.total, 'free_shipping_fee_formated', normalized.free_shipping_fee_formated);
						} else if (normalized.free_shipping_fee > 0) {
							// 如果没有格式化字段，但 free_shipping_fee > 0，生成一个格式化字符串
							const formattedValue = typeof normalized.free_shipping_fee === 'string' 
								? normalized.free_shipping_fee 
								: Number(normalized.free_shipping_fee).toFixed(2);
							that.$set(that.checkoutInfo.total, 'free_shipping_fee_formated', that.currency + formattedValue);
						}
						
						// 【关键修复】完全使用后端返回的 amount，不再使用 goods_price 或其他计算值
						// 后端返回的 normalized.amount 已经包含了所有扣款（优惠券、折扣、储值卡、余额、信用付等）
						// 直接使用接口返回的 amount 更新 total.amount 和 amountPrice
						const finalAmount = normalized.amount ? Number(normalized.amount) : 
						                 (that.checkoutInfo && that.checkoutInfo.total && that.checkoutInfo.total.amount ? Number(that.checkoutInfo.total.amount) : 0);
						that.$set(that.checkoutInfo.total, 'amount', finalAmount);
						// 【关键修复】直接使用后端返回的 amount 更新应付金额
						that.amountPrice = finalAmount;
						// 重置初始化标志（如果存在）
						if (that.isInitializingCoupons) {
							that.isInitializingCoupons = false;
						}
					}
					that.couponsObject.couponsMoney = normalized.coupons_money || 0
						
						// 接口返回后，更新默认选中的优惠券ID和金额（用于下次判断是否相同）
						// 注意：每次接口返回后都要更新，而不是只在初始化时更新
						if (normalized.coupons_money > 0) {
							that.defaultSelectedCoupon.ids = [...(that.couponsObject.couponsIdArr || [])]
							that.defaultSelectedCoupon.money = Number(normalized.coupons_money) || 0
						} else {
							// 取消优惠券时，清空默认选中记录
							that.defaultSelectedCoupon.ids = []
							that.defaultSelectedCoupon.money = 0
						}
					// 储值卡扣款以后端返回的 card_money 为准
					if (normalized.value_card_id > 0 && !that.userValueCardCancelled) {
						const cardMoney = that.moneyPrecision(Number(normalized.card_money) || 0);
						that.valueCardObject.valueCardMoney = cardMoney;
						if (cardMoney > 0) {
							that.valueCardObject.valueCardContent = normalized.card_money_formated || (that.currency + that.formatCurrencyValue(cardMoney));
							that.userValueCardCancelled = false;
						} else {
							that.valueCardObject.valueCardContent = that.$t('lang.no_use_value_card');
						}
						that.valueCardObject.vc_dis_money = normalized.vc_dis_money || that.valueCardObject.vc_dis_money;
						that.valueCardObject.vc_dis = normalized.vc_dis || that.valueCardObject.vc_dis;
						that.valueCardObject.valueCardId = normalized.value_card_id;
					} else {
						if (that.userValueCardCancelled) {
							that.valueCardObject.valueCardId = 0;
						}
						that.valueCardObject.valueCardMoney = 0;
						that.valueCardObject.valueCardContent = that.$t('lang.no_use_value_card');
					}
						this.persistValueCardFromResponse(normalized, 'submitCoupons');
						this.ensurePaymentPriority();
							this.getType = true
					},
					fail: () => {
						// 【关键修复】只有在 order info loading 已关闭时才关闭 loading
						// 如果 order info loading 还在显示，不关闭它（让它继续显示）
						if (this.checkoutLoadingClosed || !this.orderInfoLoadingActive) {
							uni.hideLoading();
						}
					},
					complete: () => {
						// 【关键修复】只有在 order info loading 已关闭时才关闭 loading
						// 如果 order info loading 还在显示，不关闭它（让它继续显示）
						if (this.checkoutLoadingClosed || !this.orderInfoLoadingActive) {
							uni.hideLoading();
						}
					}
				});
				this.couponsObject.couponsBase = false
				this.surplus_status = false
				}); // 关闭 waitForCheckoutDefault().then() 回调
			},
			// 【核心修复】Promise 版本的接口调用方法，用于顺序执行
			// 优惠券接口 Promise 版本
			submitCouponsPromise() {
				return new Promise((resolve, reject) => {
					const latestTotal = this.checkoutInfo && this.checkoutInfo.total ? this.checkoutInfo.total : this.total;
					const latestShippingId = this.shipping_id && this.shipping_id.length > 0 ? this.shipping_id : [];
					const currentCouponIds = this.couponsObject.couponsIdArr || [];
					
					if (currentCouponIds.length === 0) {
						resolve({ status: 'success', skip: true });
						return;
					}
					
					uni.request({
						url: this.websiteUrl + '/api/trade/changecou',
						method: 'POST',
						data: {
							uc_id: currentCouponIds,
							total: latestTotal,
							shipping_id: latestShippingId
						},
						header: {
							'Content-Type': 'application/json',
							'token': uni.getStorageSync('token'),
							'X-Client-Hash': uni.getStorageSync('client_hash')
						},
						success: ({ data: { data, status } }) => {
							if (status === 'failed') {
								reject({ status: 'failed', data });
								return;
							}
							const normalized = this.mergeValueCardData(data, 'submitCoupons');
							this.$store.dispatch('setCheckoutTotal', normalized);
							this.updateCouponsContent(normalized);
							if (this.checkoutInfo && this.checkoutInfo.total) {
								this.$set(this.checkoutInfo.total, 'coupons_money', normalized.coupons_money || 0);
								this.$set(this.checkoutInfo.total, 'coupons_id', normalized.coupons_id);
								this.$set(this.checkoutInfo.total, 'amount', normalized.amount);
							}
							this.amountPrice = normalized.amount;
							this.couponsObject.couponsMoney = normalized.coupons_money || 0;
							this.defaultSelectedCoupon.ids = [...currentCouponIds];
							this.defaultSelectedCoupon.money = Number(normalized.coupons_money) || 0;
							resolve({ status: 'success', data: normalized });
						},
						fail: (error) => {
							reject({ status: 'failed', error });
						}
					});
				});
			},
			// 储值卡接口 Promise 版本
			submitValuecardPromise() {
				return new Promise((resolve, reject) => {
					const latestTotal = this.checkoutInfo && this.checkoutInfo.total ? this.checkoutInfo.total : this.total;
					const vid = this.valueCardObject.valueCardId || 0;
					
					if (vid === 0) {
						resolve({ status: 'success', skip: true });

					}
					
				uni.request({

					method: 'POST',
					data: {
						vid: vid,
						total: latestTotal,
						shipping_id: this.shipping_id,
						// 【关键修复】如果有优惠券并且使用的情况，传递已选中的优惠券ID
						uc_id: (this.couponsObject.couponsIdArr && this.couponsObject.couponsIdArr.length > 0) ? this.couponsObject.couponsIdArr : []
					},
						header: {
							'Content-Type': 'application/json',
							'token': uni.getStorageSync('token'),
							'X-Client-Hash': uni.getStorageSync('client_hash')
						},
						success: ({ data: { data, status } }) => {

								reject({ status: 'failed', data });
								return;
							}
							const normalized = this.mergeValueCardData(data, 'submitValuecard');
							this.$store.dispatch('setCheckoutTotal', normalized);
							this.amountPrice = normalized.amount;
							if (data.card_money > 0) {
								this.valueCardObject.valueCardContent = data.card_formated;
								this.userValueCardCancelled = false;
							} else {
								this.valueCardObject.valueCardContent = this.$t('lang.no_use_value_card');
							}
							this.valueCardObject.vc_dis = data.vc_dis;
							this.valueCardObject.valueCardId = normalized.value_card_id;
							resolve({ status: 'success', data: normalized });
						},
						fail: (error) => {
							reject({ status: 'failed', error });
						}
					});
				});
			},
			// 余额先用后付接口 Promise 版本（与 surplusvValHandle 同一套计算逻辑，不依赖 surplus_credit_line 已赋值）
			surplusvValHandlePromise() {
				return new Promise((resolve, reject) => {
					let balanceAmount = 0;
					if (this.balancePaymentActive && this.use_surplus_val === 1) {
						if (this.payment_info && this.payment_info.used_balance && Number(this.payment_info.used_balance) > 0) {
							balanceAmount = Number(this.payment_info.used_balance);
						} else if (this.balance_money && Number(this.balance_money) > 0) {
							balanceAmount = Number(this.balance_money);
						}
					}
					let creditAmount = 0;
					if (this.use_credit_val === 1) {
						const latestTotal = this.checkoutInfo && this.checkoutInfo.total ? this.checkoutInfo.total : this.total;
						const goodsPrice = latestTotal && latestTotal.goods_price ? Number(latestTotal.goods_price) : 0;
						const shippingFee = this.shippingFee ? Number(this.shippingFee) : 0;
						const couponsMoney = Number(this.couponsObject && this.couponsObject.couponsMoney ? this.couponsObject.couponsMoney : 0);
						const discount = Number(latestTotal && latestTotal.discount) || 0;
						const bonusMoney = Number(latestTotal && latestTotal.bonus_money) || Number(this.bonusObject && this.bonusObject.bonusMoney) || 0;
						const integralMoney = Number(latestTotal && latestTotal.integral_money) || 0;
						const valueCardMoney = this.getValueCardMoney();
						const amountAfterValueCard = this.moneyPrecision(Math.max(0, goodsPrice + shippingFee - couponsMoney - discount - bonusMoney - integralMoney - valueCardMoney));
						const remainingAfterBalance = this.moneyPrecision(Math.max(0, amountAfterValueCard - balanceAmount));
						const availableCredit = this.moneyPrecision(Math.max(this.surplus_credit_line_available || 0, 0));
						if (remainingAfterBalance > 0 && availableCredit > 0) {
							creditAmount = this.moneyPrecision(Math.min(availableCredit, remainingAfterBalance));
						}
					}
					const surplusAmount = this.moneyPrecision(balanceAmount + creditAmount);
					
					if (surplusAmount === 0) {
						resolve({ status: 'success', skip: true });
						return;
					}
					
				const latestTotal = this.checkoutInfo && this.checkoutInfo.total ? this.checkoutInfo.total : this.total;
				
				// 【关键修复】深拷贝total对象，避免修改原始对象，并确保 card 字段正确传递
				const totalForRequest = JSON.parse(JSON.stringify(latestTotal));
				totalForRequest.surplus = surplusAmount;
				totalForRequest.surplus_formated = this.currency + this.formatCurrencyValue(surplusAmount);
				
				// 【关键修复】确保 card 字段正确传递：设置为当前选中储值卡的余额
				// 获取当前选中储值卡的余额
				const activeCardId = this.valueCardObject.valueCardBase ? this.tempValueCardId : this.valueCardObject.valueCardId;
				if (activeCardId > 0 && this.checkoutInfo && this.checkoutInfo.value_card) {
					const selectedCard = this.checkoutInfo.value_card.find(card => Number(card.vid) === Number(activeCardId));
					if (selectedCard) {
						const cardBalance = Number(selectedCard.card_money || 0);
						totalForRequest.card = this.moneyPrecision(cardBalance);
					}
				}

				// free_shipping_fee 以后端计算接口（changecou/changecard/changesurplus/积分等）返回值为准，不从前端 formated 反推
				
				uni.request({
					url: this.websiteUrl + '/api/trade/changesurplus',
					method: 'POST',
					data: {
						total: totalForRequest,
						surplus: surplusAmount,
						shipping_id: this.shipping_id,
						// 【关键修复】如果有优惠券并且使用的情况，传递已选中的优惠券ID
						uc_id: (this.couponsObject.couponsIdArr && this.couponsObject.couponsIdArr.length > 0) ? this.couponsObject.couponsIdArr : []
					},
						header: {
							'Content-Type': 'application/json',
							'token': uni.getStorageSync('token'),
							'X-Client-Hash': uni.getStorageSync('client_hash')
						},
						success: (res) => {
							const { data, status } = res.data;
							if (status === 'failed') {
								reject({ status: 'failed', data });
								return;
							}
							const normalized = this.mergeValueCardData(data, 'changesurplus');
							this.$store.dispatch('setCheckoutTotal', normalized);
							this.amountPrice = normalized.amount;
							this.total.surplus = normalized.surplus;
							this.total.surplus_formated = normalized.surplus_formated;
							this.surplus = normalized.surplus;
							resolve({ status: 'success', data: normalized });
						},
						fail: (error) => {
							reject({ status: 'failed', error });
						}
					});
				});
			},

			// 红包接口 Promise 版本
			submitBonusPromise() {
				return new Promise((resolve, reject) => {
					const bonusId = this.bonusObject.bonusId || 0;
					
					if (bonusId === 0) {
						resolve({ status: 'success', skip: true });
						return;
					}
					
					const latestTotal = this.checkoutInfo && this.checkoutInfo.total ? this.checkoutInfo.total : this.total;
					
					uni.request({
						url: this.websiteUrl + '/api/trade/changebon',
						method: 'POST',
						data: {
							bonus_id: bonusId,
							total: latestTotal,
							shipping_id: this.shipping_id
						},
						header: {
							'Content-Type': 'application/json',
							'token': uni.getStorageSync('token'),
							'X-Client-Hash': uni.getStorageSync('client_hash')
						},
						success: ({ data: { data, status } }) => {
							if (status === 'failed') {
								reject({ status: 'failed', data });
								return;
							}
							const normalized = this.mergeValueCardData(data, 'submitBonus');
							this.$store.dispatch('setCheckoutTotal', normalized);
							this.amountPrice = normalized.amount;
							this.total.bonus_money = normalized.bonus_money;
							this.bonusObject.bonusMoney = normalized.bonus_money;
							if (normalized.bonus_money > 0) {
								this.bonusObject.bonusContent = normalized.bonus_money_formated;
							} else {
								this.bonusObject.bonusContent = this.$t('lang.no_use_bonus');
							}
							resolve({ status: 'success', data: normalized });
						},
						fail: (error) => {
							reject({ status: 'failed', error });
						}
					});
				});
			},
			//储值卡选择
			valueCardActive(id) {
				// 【关键修复】在弹窗中切换选中时，只更新临时状态 tempValueCardId，不更新实际状态 valueCardObject.valueCardId
				// 只有点击确定后，才会将 tempValueCardId 同步到 valueCardObject.valueCardId
				if (this.tempValueCardId != id) {
					this.tempValueCardId = id
					// 用户重新选择了储值卡，清除取消标记
					this.userValueCardCancelled = false
				} else {
					this.tempValueCardId = 0
					// 用户取消了储值卡，设置取消标记
					this.userValueCardCancelled = true
				}
			},
			//储值卡确认
			submitValuecard() {
				// 【关键修复】使用临时状态 tempValueCardId 作为请求参数
				// 【关键修复】直接使用 checkoutInfo.total 而不是 this.total，确保获取最新的值（包括 coupons_money、integral 等）
				const latestTotal = this.checkoutInfo && this.checkoutInfo.total ? this.checkoutInfo.total : this.total;

				// 【关键修复】深拷贝total对象，避免修改原始对象，并确保 card 字段正确传递
				const totalForRequest = JSON.parse(JSON.stringify(latestTotal));

				// 【关键修复】动态设置 card 字段为当前选中储值卡的余额，而不是依赖 checkoutInfo.total.card 的值
				// 获取当前选中储值卡的余额
				const activeCardId = this.valueCardObject.valueCardBase ? this.tempValueCardId : this.valueCardObject.valueCardId;
				if (activeCardId > 0 && this.checkoutInfo && this.checkoutInfo.value_card) {
					const selectedCard = this.checkoutInfo.value_card.find(card => Number(card.vid) === Number(activeCardId));
					if (selectedCard) {
						const cardBalance = Number(selectedCard.card_money || 0);
						totalForRequest.card = this.moneyPrecision(cardBalance);
					}
				}

				// free_shipping_fee 以后端计算接口返回值为准，不从前端 formated 反推

				const payload = {
					vid: this.tempValueCardId,
					total: totalForRequest,
					shipping_id: this.shipping_id,
					// 【关键修复】如果有优惠券并且使用的情况，传递已选中的优惠券ID
					uc_id: (this.couponsObject.couponsIdArr && this.couponsObject.couponsIdArr.length > 0) ? this.couponsObject.couponsIdArr : []
				};
				uni.request({
					url: this.websiteUrl + '/api/trade/changecard',
					method: 'POST',
					data: payload,
					header: {
						'Content-Type': 'application/json',
						'token': uni.getStorageSync('token'),
						'X-Client-Hash': uni.getStorageSync('client_hash')
					},
					success: ({
						data: {
							data
						}
					}) => {
						// 【关键修复】完全使用后端返回的 amount，不再保留原来的金额
						// 后端返回的 data.amount 已经包含了所有扣款（储值卡、优惠券、折扣、余额等）
						// 直接使用接口返回的 data，不再替换 amount
						const normalized = this.mergeValueCardData(data, 'submitValuecard');
						this.$store.dispatch('setCheckoutTotal', normalized);
						
						// 【关键修复】直接使用后端返回的 amount 更新总金额
						this.amountPrice = normalized.amount;

					if (data.card_money > 0) {
						this.valueCardObject.valueCardContent = data.card_formated
						// 用户成功使用了储值卡，清除取消标记
						this.userValueCardCancelled = false
					} else {
						this.valueCardObject.valueCardContent = this.$t('lang.no_use_value_card')
						// 用户取消了储值卡（金额为0），设置取消标记
						if (data.value_card_id == 0 || this.valueCardObject.valueCardId == 0) {
							this.userValueCardCancelled = true
						}
					}

					this.valueCardObject.vc_dis = data.vc_dis

					// 储值卡扣款以后端返回的 card_money 为准
					if (normalized.value_card_id > 0 && !this.userValueCardCancelled) {
						const cardMoney = this.moneyPrecision(Number(normalized.card_money) || 0);
						this.valueCardObject.valueCardMoney = cardMoney;
						if (cardMoney > 0) {
							this.valueCardObject.valueCardContent = normalized.card_money_formated || (this.currency + this.formatCurrencyValue(cardMoney));
							this.userValueCardCancelled = false;
						} else {
							this.valueCardObject.valueCardContent = this.$t('lang.no_use_value_card');
						}
						this.valueCardObject.valueCardId = normalized.value_card_id;
					} else {
						if (this.userValueCardCancelled) {
							this.valueCardObject.valueCardId = 0;
						}
						this.valueCardObject.valueCardMoney = 0;
						this.valueCardObject.valueCardContent = this.$t('lang.no_use_value_card');
					}
					this.valueCardObject.vc_dis_money = normalized.vc_dis_money || this.valueCardObject.vc_dis_money;
					this.valueCardObject.vc_dis = normalized.vc_dis || this.valueCardObject.vc_dis;
					// 同步临时状态到实际状态
					this.tempValueCardId = data.value_card_id
					// 如果接口返回 value_card_id = 0，说明用户取消了，设置取消标记
					if (data.value_card_id == 0) {
						this.userValueCardCancelled = true
					}
					this.getType = false
					this.prioritySelectingValueCard = false
					this.autoPriorityApplied = false
						if (!this.persistValueCardFromResponse(data, 'submitValuecard success')) {
							this.clearPersistedValueCard('submitValuecard cleared');
						}
						this.$nextTick(() => {
							this.ensurePaymentPriority();
							// 【方案1】储值卡切换/关闭后，若余额/先用后付已开启，重新计算 先用后付 金额
							if (this.balancePaymentActive) {
								this.surplusvValHandle();
							}
						});
					},
					fail: (error) => {
						this.prioritySelectingValueCard = false
						this.$nextTick(() => {
							this.ensurePaymentPriority();
						});
					}
				})

				this.valueCardObject.valueCardBase = false
				this.surplus_status = false
			},
			
			
			
			  // 自动选择储值卡
			  autoSelectValueCard(currentPrice) {
			    // 确保有储值卡数据且当前没有选中任何储值卡
			    const selectedCardId = Number(this.valueCardObject && this.valueCardObject.valueCardId ? this.valueCardObject.valueCardId : 0);
			    if (this.valueCartInfo.card_list && this.valueCartInfo.card_list.length > 0 && selectedCardId <= 0) {
			      
			      // 将价格转换为数字类型进行比较
			      const price = Number(currentPrice);
			      
			      // 查找可用的储值卡，按面值从大到小排序
			      const availableCards = this.valueCartInfo.card_list
			        .filter(card => {
			          const cardMoney = Number(card.use_card_money);
			          return cardMoney > 0 && cardMoney <= price;
			        })
			        .sort((a, b) => Number(b.use_card_money) - Number(a.use_card_money));
			      
			      // 如果有合适的储值卡，选择面值最大的那个
			      if (availableCards.length > 0) {
			        const bestCard = availableCards[0];
			        this.valueCardObject.valueCardId = bestCard.vid;
			        // 【关键修复】如果弹窗打开，同时更新临时状态
			        if (this.valueCardObject.valueCardBase) {
			          this.tempValueCardId = bestCard.vid;
			        }
			        
			        // 自动提交储值卡选择
			        this.submitSelectedValueCard();
			      } else {
			        // 如果没有合适的储值卡，可以选择面值最小的（可选）
			        this.selectSmallestValueCard(price);
			      }
			    }
			  },
			  findBestValueCard(currentPrice) {
			    if (!this.valueCartInfo || !Array.isArray(this.valueCartInfo.card_list)) {
			      return null;
			    }

			    const price = Number(currentPrice);
			    if (isNaN(price) || price <= 0) {
			      return null;
			    }

			    const positiveCards = this.valueCartInfo.card_list
			      .filter(card => Number(card.use_card_money) > 0);

			    if (positiveCards.length === 0) {
			      return null;
			    }

			    const coveringCards = positiveCards
			      .filter(card => Number(card.use_card_money) >= price)
			      .sort((a, b) => Number(a.use_card_money) - Number(b.use_card_money));

			    if (coveringCards.length > 0) {
			      return coveringCards[0];
			    }

			    const usableCards = positiveCards
			      .filter(card => Number(card.use_card_money) <= price)
			      .sort((a, b) => Number(b.use_card_money) - Number(a.use_card_money));

			    if (usableCards.length > 0) {
			      return usableCards[0];
			    }

			    return positiveCards
			      .sort((a, b) => Number(a.use_card_money) - Number(b.use_card_money))[0] || null;
			  },
			  
			  // 选择面值最小的储值卡（当没有完全覆盖的储值卡时）
			  selectSmallestValueCard(currentPrice) {
			    const availableCards = this.valueCartInfo.card_list
			      .filter(card => Number(card.use_card_money) > 0)
			      .sort((a, b) => Number(a.use_card_money) - Number(b.use_card_money));
			    
			    if (availableCards.length > 0) {
			      const smallestCard = availableCards[0];
			      this.valueCardObject.valueCardId = smallestCard.vid;
			      // 【关键修复】如果弹窗打开，同时更新临时状态
			      if (this.valueCardObject.valueCardBase) {
			        this.tempValueCardId = smallestCard.vid;
			      }
			      
			      // 自动提交储值卡选择
			      this.submitSelectedValueCard();
			    }
			  },
			  
			  // 提交选中的储值卡
			  submitSelectedValueCard() {
			    if (this.valueCardObject.valueCardId && this.valueCardObject.valueCardId !== 0) {
			      // 延迟执行，确保数据更新完成
			      setTimeout(() => {
			        this.submitValuecard();
			      }, 100);
			    }
			  },
			  applyDefaultValueCard() {
			    const list = this.valueCartInfo && this.valueCartInfo.card_list ? this.valueCartInfo.card_list : [];
			    if (!list.length) {
			      return;
			    }

			    // 【关键修复】如果用户明确取消了储值卡，不再自动应用
			    if (this.userValueCardCancelled) {
			      return;
			    }

			    const selectedId = Number(this.valueCardObject && this.valueCardObject.valueCardId ? this.valueCardObject.valueCardId : 0);
			    if (selectedId > 0) {
			      return;
			    }
			    // 选卡时用「扣储值卡前应付款」计算，不用 total.amount
			    const latestTotalAuto = this.checkoutInfo && this.checkoutInfo.total ? this.checkoutInfo.total : this.total;
			    const goodsPriceAuto = this.moneyPrecision(parseFloat(latestTotalAuto && latestTotalAuto.goods_price ? latestTotalAuto.goods_price : 0) || 0);
			    const baseAuto = goodsPriceAuto > 0 ? goodsPriceAuto : (this.price && this.price > 0 ? this.moneyPrecision(parseFloat(this.price) || 0) : 0);
			    const shippingAuto = this.shippingFee ? Number(this.shippingFee) : 0;
			    const couponsAuto = Number(this.couponsObject && this.couponsObject.couponsMoney ? this.couponsObject.couponsMoney : 0);
			    const discountAuto = Number(latestTotalAuto && latestTotalAuto.discount) || 0;
			    const bonusAuto = Number(latestTotalAuto && latestTotalAuto.bonus_money) || Number(this.bonusObject && this.bonusObject.bonusMoney) || 0;
			    const integralAuto = Number(latestTotalAuto && latestTotalAuto.integral_money) || 0;
			    const amountDue = this.moneyPrecision(Math.max(0, baseAuto + shippingAuto - couponsAuto - discountAuto - bonusAuto - integralAuto));
			    let bestCard = this.findBestValueCard(amountDue);

			    if (!bestCard) {
			      bestCard = list[0];
			    }

			    if (bestCard && bestCard.vid) {
			      this.valueCardObject.valueCardId = Number(bestCard.vid) || 0;
			      // 【关键修复】如果弹窗打开，同时更新临时状态
			      if (this.valueCardObject.valueCardBase) {
			        this.tempValueCardId = Number(bestCard.vid) || 0;
			      }
			      this.valueCardObject.valueCardMoney = 0;
			      this.valueCardObject.valueCardContent = this.$t ? this.$t('lang.loading') : '加载中...';
			      this.pendingValueCardApplyId = Number(bestCard.vid) || 0;
			      this.tryApplyPendingValueCard();
			    }
			  },
			  clearValueCardApplyTimer() {
			    if (this.valueCardApplyTimer) {
			      clearTimeout(this.valueCardApplyTimer);
			      this.valueCardApplyTimer = null;
			    }
			  },
			  clearValueCardLoadRetry() {
			    if (this.valueCardLoadRetryTimer) {
			      clearTimeout(this.valueCardLoadRetryTimer);
			      this.valueCardLoadRetryTimer = null;
			    }
			  },
			  resetValueCardLoadRetry() {
			    this.clearValueCardLoadRetry();
			    this.valueCardLoadRetryAttempts = 0;
			  },
			  scheduleValueCardLoadRetry(reason = '') {
			    const maxAttempts = 30;
			    if (!this.pageActive) {
			      return;
			    }
			    if (this.valueCardLoadRetryAttempts >= maxAttempts) {
			      return;
			    }
			    this.valueCardLoadRetryAttempts += 1;
			    this.clearValueCardLoadRetry();
			    this.valueCardLoadRetryTimer = setTimeout(() => {
			      this.valueCardLoad();
			    }, 200);
			  },
			  isShippingReady() {
			    if (this.store_id > 0) {
			      return true;
			    }
			    if (Array.isArray(this.shipping_id) && this.shipping_id.length > 0) {
			      return true;
			    }
			    if (!Array.isArray(this.shipping_id) && this.shipping_id) {
			      return true;
			    }
			    if (this.checkoutInfo && this.checkoutInfo.total) {
			      if (Number(this.checkoutInfo.total.real_goods_count || 0) === 0) {
			        return true;
			      }
			    }
			    return false;
			  },
			  tryApplyPendingValueCard(retry = true) {
			    if (!this.pendingValueCardApplyId) {
			      return;
			    }
			    if (!this.pageActive) {
			      this.pendingValueCardApplyId = 0;
			      this.valueCardApplyAttempts = 0;
			      this.prioritySelectingValueCard = false;
			      return;
			    }
			    if (!this.isShippingReady()) {
			      if (retry) {
			        if (this.valueCardApplyAttempts >= this.maxValueCardApplyAttempts) {
			          this.pendingValueCardApplyId = 0;
			          this.prioritySelectingValueCard = false;
			          return;
			        }
			        this.valueCardApplyAttempts += 1;
			        this.clearValueCardApplyTimer();
			        this.valueCardApplyTimer = setTimeout(() => {
			          this.tryApplyPendingValueCard();
			        }, 120);
			      }
			      return;
			    }

			    this.clearValueCardApplyTimer();
			    this.valueCardApplyAttempts = 0;
			    const targetId = this.pendingValueCardApplyId;
			    this.pendingValueCardApplyId = 0;
			    if (targetId > 0) {
			      this.prioritySelectingValueCard = true;
			      this.valueCardObject.valueCardId = targetId;
			      // 【关键修复】无论弹窗是否打开，都同步更新临时状态，确保显示正确
			      this.tempValueCardId = targetId;
			      this.submitSelectedValueCard();
			    }
			  },
			
			
			//运费展开
			feeHandle(val, id, item) {

				this.pop_shipping_fee = item.shipping.default_shipping.shipping_fee
				let ru_id = 0
				let rec_ids = ''

			//余额/先用后付开关
			balanceToggleChange(e) {
				const enabled = e.detail.value === true;
				const previousState = this.balancePaymentActive;
				
				// #ifdef MP-WEIXIN
				// 微信小程序兼容性处理：即使 disabled=true，change 事件仍可能触发
				// 需要在方法开始处立即检查并同步重置状态，确保开关不会显示为开启
				if (this.balanceToggleDisabled) {
					const message = this.balanceToggleDisabledReason || '已自动选择支付方式';
					uni.showToast({
						title: message,
						icon: 'none'
					});
					// 立即同步重置状态，不使用 $nextTick，确保立即生效
					this.use_surplus_val = 0;
					this.surplusSelf = false;
					this.balanceSwitchVersion++;
					// 强制更新视图，确保开关状态立即恢复
					this.$forceUpdate();
					return;
				}
				// #endif
				
				// #ifndef MP-WEIXIN
				// APP 和 H5：disabled 状态下不会触发 change 事件，但保留检查以防万一
				if (this.balanceToggleDisabled) {
					const message = this.balanceToggleDisabledReason || '已自动选择支付方式';
					uni.showToast({
						title: message,
						icon: 'none'
					});
					this.use_surplus_val = 0;
					this.$nextTick(() => {
						this.surplusSelf = false;
						this.balanceSwitchVersion++;
					});
					return;
				}
				// #endif
				
				if (this.initializingPaymentToggles) {
					this.use_surplus_val = 0;
					this.$nextTick(() => {
						this.surplusSelf = false;
						this.balanceSwitchVersion++;
					});
					return;
				}
				
				const selectedCardId = Number(this.valueCardObject && this.valueCardObject.valueCardId ? this.valueCardObject.valueCardId : 0);
				const valueCardMoney = Number(this.valueCardObject && this.valueCardObject.valueCardMoney ? this.valueCardObject.valueCardMoney : 0);
				const hasValueCardSelected = selectedCardId > 0 && valueCardMoney > 0;
				const amountDue = this.moneyPrecision(parseFloat(this.total && this.total.amount !== undefined ? this.total.amount : 0) || 0);
				if (hasValueCardSelected && amountDue <= 0 && enabled) {
					uni.showToast({
						title: '已使用储值卡完成支付',
						icon: 'none'
					});
					this.use_surplus_val = 0;
					this.$nextTick(() => {
						this.surplusSelf = false;
						this.balanceSwitchVersion++;
					});
					return;
				}
				this.userBalanceModified = true;
				this.userDisabledBalancePayment = !enabled;
				this.autoPriorityApplied = true;
				const success = this.toggleBalancePayment(enabled, { userTriggered: true });
				if (!success) {
					this.$nextTick(() => {
						this.use_surplus_val = enabled ? 0 : 1;
					});
					return;
				}
				if (!enabled) {
					if (this.use_credit_val === 1) {
						this.toggleCreditPayment(false, {
							silent: true
						});
					}
					this.use_credit_val = 0;
					this.surplus_credit_line = 0;
					this.userCreditModified = true;
					this.userDisabledCreditPayment = !enabled;
					this.creditToggleDisabled = false;
					this.creditToggleDisabledReason = '';
				} else {
					this.balanceToggleDisabled = false;
					this.balanceToggleDisabledReason = '';
				}
			},
			creditToggleChange(e) {
				const enabled = e.detail ? e.detail.value === true : e;
				const previousState = this.use_credit_val === 1;
				
				// #ifdef MP-WEIXIN
				// 微信小程序兼容性处理：即使 disabled=true，change 事件仍可能触发
				// 需要在方法开始处立即检查并同步重置状态，确保开关不会显示为开启
				if (this.creditToggleDisabled) {
					const message = this.creditToggleDisabledReason || '已自动选择支付方式';
					uni.showToast({
						title: message,
						icon: 'none'
					});
					// 立即同步重置状态，不使用 $nextTick，确保立即生效
					this.use_credit_val = 0;
						this.creditSelf = false;
						this.creditSwitchVersion++;
					// 强制更新视图，确保开关状态立即恢复
					this.$forceUpdate();
					return;
				}
				// #endif
				
				// #ifndef MP-WEIXIN
				// APP 和 H5：disabled 状态下不会触发 change 事件，但保留检查以防万一
				if (this.creditToggleDisabled) {
					const message = this.creditToggleDisabledReason || '已自动选择支付方式';
					uni.showToast({
						title: message,
						icon: 'none'
					});
					this.use_credit_val = 0;
					this.$nextTick(() => {
						this.creditSelf = false;
						this.creditSwitchVersion++;
					});
					return;
				}
				// #endif
				
				if (this.initializingPaymentToggles) {
					this.use_credit_val = 0;
					this.$nextTick(() => {
						this.creditSelf = false;
						this.creditSwitchVersion++;
					});
					return;
				}
			// 【修复】在检查前，先确保 payment_info 是最新的（特别是取消储值卡后）
			// 【关键修复】无论余额是否开启，都应该先更新 payment_info，确保基于最新的储值卡状态计算
			// 如果余额开启，调用 applyBalancePaymentState 更新 payment_info
			// 如果余额未开启，也需要更新 payment_info，因为取消储值卡后，剩余金额可能变化
			// 【关键修复】关闭弹窗时不应该计算，只有用户点击确定时才更新计算
			// 因此，在 creditToggleChange 中，应该基于已确认的 checkoutInfo.total.value_card_id 来计算
			// 而不是基于弹窗中临时修改的 valueCardObject.valueCardId
			if (this.balancePaymentActive) {
				this.applyBalancePaymentState({ silent: true });
			} else {
				// 【修复】余额未开启时，也需要更新 payment_info；计算只用商品金额，不用 total.amount
				const latestTotal = this.checkoutInfo && this.checkoutInfo.total ? this.checkoutInfo.total : this.total;
				const goodsPrice = this.moneyPrecision(parseFloat(latestTotal && latestTotal.goods_price ? latestTotal.goods_price : 0) || 0);
				const baseAmount = goodsPrice > 0 ? goodsPrice : (this.price && this.price > 0 ? this.moneyPrecision(parseFloat(this.price) || 0) : 0);
				const shippingFee = this.shippingFee ? Number(this.shippingFee) : 0;
				const couponsMoney = Number(this.couponsObject && this.couponsObject.couponsMoney ? this.couponsObject.couponsMoney : 0);
				const discount = Number(latestTotal && latestTotal.discount) || 0;
				const bonusMoney = Number(latestTotal && latestTotal.bonus_money) || Number(this.bonusObject && this.bonusObject.bonusMoney) || 0;
				const integralMoney = Number(latestTotal && latestTotal.integral_money) || 0;
				const confirmedValueCardId = Number(this.checkoutInfo && this.checkoutInfo.total && this.checkoutInfo.total.value_card_id ? this.checkoutInfo.total.value_card_id : 0);
				const valueCardMoney = this.calculateValueCardMoneyByCardId(confirmedValueCardId);
				const totalAmount = this.moneyPrecision(Math.max(0, baseAmount + shippingFee - couponsMoney - discount - bonusMoney - integralMoney - valueCardMoney));
				this.resetPaymentStatus(totalAmount);
				}
				const remainingAfterBalance = this.moneyPrecision(this.payment_info && this.payment_info.remaining_debt !== undefined ? this.payment_info.remaining_debt : 0);
				const alreadyCoveredByBalance = this.balancePaymentActive && remainingAfterBalance <= 0;
				if (alreadyCoveredByBalance && enabled) {
					uni.showToast({
						title: '储值卡/余额已完成支付',
						icon: 'none'
					});
					this.use_credit_val = 0;
					this.surplus_credit_line = 0;
					this.$nextTick(() => {
						this.creditSelf = false;
						this.creditSwitchVersion++;
					});
					return;
				}
				this.userCreditModified = true;
				this.userDisabledCreditPayment = !enabled;
				this.autoPriorityApplied = true;
				// 如果余额值大于0，用后付需要跟随余额开启；如果余额值小于等于0，用后付可以独立开启
				if (!this.balancePaymentActive && this.balance_money_available > 0) {
					if (enabled) {
						this.use_credit_val = 0;
						this.surplus_credit_line = 0;
						uni.showToast({
							title: '请先使用余额',
							icon: 'none'
						});
						this.$nextTick(() => {
							this.creditSelf = false;
							this.creditSwitchVersion++;
						});
					} else {
						this.use_credit_val = 0;
						this.surplus_credit_line = 0;
					}
					return;
				}
				const success = this.toggleCreditPayment(enabled, { userTriggered: true });
				if (!success) {
					this.$nextTick(() => {
						this.use_credit_val = enabled ? 0 : 1;
					});
				}
			},
			//选择支付方式（仅用于弹窗选择，余额/用后付已通过顶部开关控制）
			payment_method_select(id, name, code, useList, options = {}) {
				// 禁止从弹窗选择余额/用后付
				if (id == 11 || name === this.balancePaymentLabel) {
					uni.showToast({
						title: '请使用顶部"余额/先用后付"开关切换',
						icon: 'none',
						duration: 2000
					});
					return;
				}

				// 记录当前选择的支付方式
				const paymentOption = {
					pay_id: id,
					pay_name: name,
					pay_code: code,
					use_list: useList || {}
				};

				// 更新支付方式
				this.pay_id = paymentOption.pay_id;
				this.pay_name = paymentOption.pay_name;
				this.pay_code = paymentOption.pay_code;
				this.submit_pay_id = paymentOption.pay_id;
				this.submit_pay_code = paymentOption.pay_code;
				this.payDisplayName = paymentOption.pay_name;
				this.balancePaymentActive = false;
				this.use_surplus_val = 0; // 【修复】与balancePaymentActive严格同步
				this.balance_money = 0;
				this.surplus_credit_line = 0;
				this.use_credit_val = 0; // 【修复】与信用付状态严格同步
				this.princeType = false;

				// 记录非余额支付方式，以便顶部开关关闭时恢复
				this.rememberLastNonBalancePayment(paymentOption);

				// 重置支付状态
				const resetAmountSource = this.total && this.total.amount !== undefined ? this.total.amount :
					this.payment_info.original_price || 0;
				const resetAmount = this.moneyPrecision(parseFloat(resetAmountSource) || 0);
				this.resetPaymentStatus(resetAmount);
				this.pay_yue_full = false;
				this.pay_yue_credit = false;
				this.pay_surplus = false;
				this.pay_no = false;

				// 关闭弹窗
				this.handelClose('payment');
			},
			//使用余额（与当前余额/信用付逻辑联动，统一走 changesurplus 接口）
			surplusvValHandle(e) {
				// 【关键修复】防止重复调用，如果已经有请求在进行中，标记需要重试，等当前请求完成后再用最新状态发一次
				if (this.surplusvValHandlePending) {
					console.log('[surplusvValHandle] 请求正在进行中，标记完成后重试');
					this.surplusvValHandleNeedsRetry = true;
					return;
				}
				
				// 设置标志，防止重复调用
				this.surplusvValHandlePending = true;
				
				// 【关键修复】记录当前开关状态，用于调试
				console.log('[surplusvValHandle] 当前开关状态 - balancePaymentActive:', this.balancePaymentActive, 'use_surplus_val:', this.use_surplus_val, 'use_credit_val:', this.use_credit_val);
				
				// 1. 计算当前应提交给后端的余额和信用付总和
				// 【关键修复】surplus 参数是余额和信用付共用的，需要计算两者的总和
				// 根据余额和信用付的开关状态，分别获取实际使用的金额，然后计算总和
				// 【重要】必须严格按照开关状态判断，关闭时强制为 0，不使用任何缓存值
				let balanceAmount = 0; // 余额实际使用金额
				let creditAmount = 0;  // 信用付实际使用金额
				
				// 计算余额金额：根据余额开关状态（balancePaymentActive 和 use_surplus_val）
				// 【关键修复】必须同时检查 balancePaymentActive 和 use_surplus_val，确保只有在两个条件都满足时才计算余额金额
				// 关闭时强制为 0，不使用任何缓存值
				if (this.balancePaymentActive && this.use_surplus_val === 1) {
					// 优先使用 payment_info.used_balance（如果已计算），否则使用 balance_money
					if (this.payment_info && this.payment_info.used_balance && Number(this.payment_info.used_balance) > 0) {
						balanceAmount = Number(this.payment_info.used_balance);
					} else if (this.balance_money && Number(this.balance_money) > 0) {
						balanceAmount = Number(this.balance_money);
					} else {
						// 【关键修复】如果 balance_money 为 0，不应该使用 this.surplus（可能是旧值），应该为 0
						balanceAmount = 0;
					}
				} else {
					// 【关键修复】余额开关关闭时（balancePaymentActive 为 false 或 use_surplus_val 不为 1），强制余额金额为 0，不使用任何缓存值
					balanceAmount = 0;
				}
				
				// 计算信用付金额：根据信用付开关状态（use_credit_val === 1）
				// 【关键】顺序：储值卡 → 余额 → 先用后付。基数 = 应付款 - 折扣 - 红包 - 积分 - 储值卡，再扣余额后的剩余才用信用付
				if (this.use_credit_val === 1) {
					const latestTotal = this.checkoutInfo && this.checkoutInfo.total ? this.checkoutInfo.total : this.total;
					const goodsPrice = latestTotal && latestTotal.goods_price ? Number(latestTotal.goods_price) : 0;
					const shippingFee = this.shippingFee ? Number(this.shippingFee) : 0;
					const couponsMoney = Number(this.couponsObject && this.couponsObject.couponsMoney ? this.couponsObject.couponsMoney : 0);
					const discount = Number(latestTotal && latestTotal.discount) || 0;
					const bonusMoney = Number(latestTotal && latestTotal.bonus_money) || Number(this.bonusObject && this.bonusObject.bonusMoney) || 0;
					const integralMoney = Number(latestTotal && latestTotal.integral_money) || 0;
					const valueCardMoney = this.getValueCardMoney();
					// 应付款（商品+运费-优惠券-折扣-红包-积分）- 储值卡 = 余额和先用后付的基数（与 applyBalancePaymentState 顺序一致）
					const amountAfterValueCard = this.moneyPrecision(Math.max(0, goodsPrice + shippingFee - couponsMoney - discount - bonusMoney - integralMoney - valueCardMoney));
					// 扣除余额后的剩余，再用信用付覆盖
					const remainingAfterBalance = this.moneyPrecision(Math.max(0, amountAfterValueCard - balanceAmount));
					const availableCredit = this.moneyPrecision(Math.max(this.surplus_credit_line_available || 0, 0));
					
					if (remainingAfterBalance > 0 && availableCredit > 0) {
						creditAmount = this.moneyPrecision(Math.min(availableCredit, remainingAfterBalance));
					} else {
						creditAmount = 0;
					}
				} else {
					// 【关键修复】信用付开关关闭时（use_credit_val !== 1），强制信用付金额为 0，不使用任何缓存值
					creditAmount = 0;
				}
				
				// 计算总和：余额 + 信用付
				const surplusAmount = this.moneyPrecision(balanceAmount + creditAmount);
				
				// 【关键修复】记录计算出的值，用于调试
				console.log('[surplusvValHandle] 计算出的值 - balanceAmount:', balanceAmount, 'creditAmount:', creditAmount, 'surplusAmount:', surplusAmount);
				
				// 【关键修复】同步更新本地状态，确保后续计算使用正确的值
				this.surplus = surplusAmount;
				// 同步更新surplus_credit_line，避免后续计算使用旧值
				if (this.use_credit_val === 1) {
					this.surplus_credit_line = this.moneyPrecision(creditAmount);
					// 同步更新payment_info.used_credit
					if (this.payment_info) {
						if (!this.payment_info.used_credit || this.payment_info.used_credit !== creditAmount) {
							this.$set(this.payment_info, 'used_credit', this.moneyPrecision(creditAmount));
						}
					}
				} else {
					this.surplus_credit_line = 0;
				}

			// 2. 选择要传递给后端的 total（优先使用 checkoutInfo.total）
			const latestTotal = this.checkoutInfo && this.checkoutInfo.total ? this.checkoutInfo.total : this.total;
			
			// 【关键修复】深拷贝total对象，避免修改原始对象，并更新surplus值为计算出的总和
			const totalForRequest = JSON.parse(JSON.stringify(latestTotal));
			totalForRequest.surplus = surplusAmount;
			totalForRequest.surplus_formated = this.currency + this.formatCurrencyValue(surplusAmount);
			
			// 【关键修复】确保 card 字段正确传递：设置为当前选中储值卡的余额
			// 获取当前选中储值卡的余额
			const activeCardId = this.valueCardObject.valueCardBase ? this.tempValueCardId : this.valueCardObject.valueCardId;
			if (activeCardId > 0 && this.checkoutInfo && this.checkoutInfo.value_card) {
				const selectedCard = this.checkoutInfo.value_card.find(card => Number(card.vid) === Number(activeCardId));
				if (selectedCard) {
					const cardBalance = Number(selectedCard.card_money || 0);
					totalForRequest.card = this.moneyPrecision(cardBalance);
				}
			}

			// free_shipping_fee 以后端计算接口返回值为准，不从前端 formated 反推
				
			uni.request({
				url: this.websiteUrl + '/api/trade/changesurplus',
				method: 'POST',
				data: {
					total: totalForRequest,
					surplus: surplusAmount,
					shipping_id: this.shipping_id,
					// 【关键修复】如果有优惠券并且使用的情况，传递已选中的优惠券ID
					uc_id: (this.couponsObject.couponsIdArr && this.couponsObject.couponsIdArr.length > 0) ? this.couponsObject.couponsIdArr : []
				},
				header: {
					'Content-Type': 'application/json',
					'token': uni.getStorageSync('token'),
					'X-Client-Hash': uni.getStorageSync('client_hash')
				},
				success: (res) => {
					const normalized = this.mergeValueCardData(res.data.data, 'changesurplus');
						
						// 【关键修复】先直接更新checkoutInfo.total.amount，确保响应式更新
						if (this.checkoutInfo && this.checkoutInfo.total) {
							this.$set(this.checkoutInfo.total, 'amount', normalized.amount);
						}
						
						// 【关键修复】更新payment_info.remaining_debt，确保模板条件判断正确
						// remaining_debt应该是扣除余额和信用付后的剩余应付金额，即normalized.amount
						// 使用$nextTick确保在store更新后更新，避免被覆盖
						this.$store.dispatch('setCheckoutTotal', normalized).then(() => {
							if (this.payment_info) {
								const updatedRemainingDebt = this.moneyPrecision(parseFloat(normalized.amount) || 0);
								this.$set(this.payment_info, 'remaining_debt', updatedRemainingDebt);
								// 强制触发UI更新
								this.$forceUpdate();
							}
						});

						if (normalized.card_money > 0) {
							this.valueCardObject.valueCardContent = normalized.card_formated
						} else {
							this.valueCardObject.valueCardContent = this.$t('lang.no_use_value_card')
						}

						this.amountPrice = normalized.amount
						// 储值卡扣款以后端返回的 card_money 为准
						if (normalized.value_card_id > 0) {
							const cardMoney = this.moneyPrecision(Number(normalized.card_money) || 0);
							this.valueCardObject.valueCardMoney = cardMoney;
							if (cardMoney > 0) {
								this.valueCardObject.valueCardContent = normalized.card_money_formated || (this.currency + this.formatCurrencyValue(cardMoney));
							} else {
								this.valueCardObject.valueCardContent = this.$t('lang.no_use_value_card');
							}
							this.valueCardObject.valueCardId = normalized.value_card_id;
						} else {
							this.valueCardObject.valueCardMoney = 0;
							this.valueCardObject.valueCardContent = this.$t('lang.no_use_value_card');
						}
						this.total.surplus = normalized.surplus
						this.total.surplus_formated = normalized.surplus_formated
						this.surplus = normalized.surplus
						this.surplus_status = true
						this.getType = false	

						this.valueCardObject.vc_dis = normalized.vc_dis
						this.valueCardObject.valueCardId = normalized.value_card_id
						this.persistValueCardFromResponse(normalized, 'changesurplus');
						
						// 【关键修复】清除标志，允许下次调用；若曾因 pending 被跳过，用当前状态再发一次（解决关闭再开启先用后付仍传 46 的问题）
						this.surplusvValHandlePending = false;
						if (this.surplusvValHandleNeedsRetry) {
							this.surplusvValHandleNeedsRetry = false;
							this.$nextTick(() => this.surplusvValHandle());
						}
					},
					fail: (res) => {
						uni.hideLoading();
						this.surplusvValHandlePending = false;
						if (this.surplusvValHandleNeedsRetry) {
							this.surplusvValHandleNeedsRetry = false;
							this.$nextTick(() => this.surplusvValHandle());
						}
					}
				})
			},
			//是否使用积分
			integralSelfHandle(e) {
				this.use_integral_val = e.detail.value == true ? 1 : 0
				uni.showLoading({
					title: this.$t('lang.loading')
				});
				// 【关键修复】直接使用 checkoutInfo.total 而不是 this.total，确保获取最新的值（包括 coupons_money、bonus_money 等）
				const latestTotal = this.checkoutInfo && this.checkoutInfo.total ? this.checkoutInfo.total : this.total;
				uni.request({
					url: this.websiteUrl + '/api/trade/changeint',
					method: 'POST',
					data: {
						total: latestTotal,
						integral_type: this.use_integral_val,
						cart_value: this.cart_id,
						flow_type: this.checkoutInfo.flow_type,
						shipping_id: this.shipping_id,
						// 【关键修复】如果有优惠券并且使用的情况，传递已选中的优惠券ID
						uc_id: (this.couponsObject.couponsIdArr && this.couponsObject.couponsIdArr.length > 0) ? this.couponsObject.couponsIdArr : []
					},
					header: {
						'Content-Type': 'application/json',
						'token': uni.getStorageSync('token'),
						'X-Client-Hash': uni.getStorageSync('client_hash')
					},
					success: (res) => {
						const normalized = this.mergeValueCardData(res.data.data, 'integralSelfHandle');
						this.$store.dispatch('setCheckoutTotal', normalized)

						if (normalized.card_money > 0) {
							this.valueCardObject.valueCardContent = normalized.card_formated

						} else {
							this.valueCardObject.valueCardContent = this.$t('lang.no_use_value_card')
						}

						this.valueCardObject.vc_dis = normalized.vc_dis
						this.amountPrice = normalized.amount
						// 储值卡扣款以后端返回的 card_money 为准
						if (normalized.value_card_id > 0) {
							const cardMoney = this.moneyPrecision(Number(normalized.card_money) || 0);
							this.valueCardObject.valueCardMoney = cardMoney;
							if (cardMoney > 0) {
								this.valueCardObject.valueCardContent = normalized.card_money_formated || (this.currency + this.formatCurrencyValue(cardMoney));
							} else {
								this.valueCardObject.valueCardContent = this.$t('lang.no_use_value_card');
							}
							this.valueCardObject.valueCardId = normalized.value_card_id;
						} else {
							this.valueCardObject.valueCardMoney = 0;
							this.valueCardObject.valueCardContent = this.$t('lang.no_use_value_card');
						}
						this.valueCardObject.vc_dis_money = normalized.vc_dis_money
						this.valueCardObject.valueCardId = normalized.value_card_id
						if (!this.balancePaymentActive) {
							this.use_surplus_val = 0
							this.use_credit_val = 0
						}
						this.getType = false
						this.persistValueCardFromResponse(normalized, 'integralSelfHandle');
						uni.hideLoading();
					},
					fail: (res) => {
						uni.hideLoading();
					}
				})
			},
			// 商品清单
			onListShow(i) {
				this.inventoryShow = true
				let newList = this.checkoutInfo.goods_list.find((item, index) => {
					return item.ru_id == i
				})
				this.inventoryList = newList

			},
			//展开弹出层
			popupHandle(val) {
				if (val == 'bonus') {
					this.bonusObject.bonusBase = true
				} else if (val == 'coupon') {
					this.couponsObject.couponsBase = true
				} else if (val == 'valueCard') {
					// 【关键修复】打开弹窗时，传递 skipEnsurePaymentPriority = true，避免触发自动计算
					this.valueCardLoad(true);
					// 【关键修复】打开弹窗时，初始化临时状态为当前实际状态
					this.tempValueCardId = this.valueCardObject.valueCardId
					this.valueCardObject.valueCardBase = true
				}
				if (!this.balancePaymentActive) {
					this.use_surplus_val = 0
					this.use_credit_val = 0
				}
			},
			//关闭弹出层
			handelClose(val) {
				if (val == 'payment') {
					this.paymentShow = false
				} else if (val == 'fee') {
					this.feeShow = false
				} else if (val == 'bonus') {
					this.bonusObject.bonusBase = false
				} else if (val == 'coupon') {
					this.couponsObject.couponsBase = false

		watch: {
			// 监听储值卡金额的变化，用于追踪显示值
			'valueCardObject.valueCardMoney'(newVal, oldVal) {
				// 储值卡金额变化监听（已移除日志）
			},
			checkoutInfo() {
				this.checkoutInfoWatchCount += 1;
				if (this.checkoutInfo.length == 0) {
					uni.switchTab({
						url: '/pages/cart/cart'
					})
					return false
				}

				this.checkoutDisplay = this.checkoutInfo.error || this.checkoutInfo.errors ? false : true
				
				// 【关键修复】如果 checkoutInfo 更新且没有错误，且 order info loading 还在显示，则关闭 loading
				// 这是为了确保即使 checkoutPromise.then() 没有执行，loading 也能被关闭
				if (this.checkoutDisplay && !this.checkoutInfo.error && !this.checkoutInfo.errors && !this.checkoutLoadingClosed && this.orderInfoLoadingActive) {
					this.checkoutLoadingClosed = true;
					this.orderInfoLoadingActive = false;
					// 使用 nextTick 确保在下一个事件循环中关闭，避免与其他逻辑冲突
					this.$nextTick(() => {
						uni.hideLoading();
					});
				}

				// 【修复】智能处理 userBalanceModified 和 userCreditModified 标记
				// 如果有保存的支付状态，先恢复用户修改标记，避免被自动逻辑覆盖
				if (this.savedPaymentState) {
					this.userBalanceModified = this.savedPaymentState.userBalanceModified || false;
					this.userCreditModified = this.savedPaymentState.userCreditModified || false;
					this.userDisabledBalancePayment = this.savedPaymentState.userDisabledBalancePayment || false;
					this.userDisabledCreditPayment = this.savedPaymentState.userDisabledCreditPayment || false;
				} else {
					// 【关键修复】检查商品列表是否变化，如果变化则重置标记
					// 这样可以确保在商品变化时，如果价格满足条件，可以自动开启
					const currentRecList = this.checkoutInfo && this.checkoutInfo.total && Array.isArray(this.checkoutInfo.total.rec_list) 
						? this.checkoutInfo.total.rec_list.join(',') : '';
					const lastRecList = this.lastRecList && Array.isArray(this.lastRecList) 
						? this.lastRecList.join(',') : '';
					
					// 如果商品列表变化，重置用户修改标记，允许重新自动应用
					if (currentRecList !== lastRecList && currentRecList && lastRecList) {
						this.userBalanceModified = false;
						this.userCreditModified = false;
					}
					
					this.autoPriorityApplied = false;
				}
			this.prioritySelectingValueCard = false;
				this.balanceToggleDisabled = false;
				this.balanceToggleDisabledReason = '';
				this.creditToggleDisabled = false;
				this.creditToggleDisabledReason = '';
			this.initializingPaymentToggles = true;
				this.initializeShopGoodsCollapsed();
				this.seedPersistedValueCardFromTotal('checkoutInfo watch');
				
				// 【关键修复】保存 order info 的原始 amount（已减折扣，未减优惠券），用于初始化时使用
				if (this.checkoutInfo && this.checkoutInfo.total && this.checkoutInfo.total.amount !== undefined) {
					this.orderInfoOriginalAmount = Number(this.checkoutInfo.total.amount) || 0;
				}

				const valueCardPrerequisiteReady =
					this.checkoutInfo &&
					this.checkoutInfo.total &&
					Array.isArray(this.checkoutInfo.total.rec_list) &&
					this.checkoutInfo.total.rec_list.length > 0;

				if (valueCardPrerequisiteReady) {
					if (!this.checkoutInfoLoadedAt) {
						this.checkoutInfoLoadedAt = Date.now();
					}
					this.valueCardLoad();
				} else {
					this.scheduleValueCardLoadRetry('checkoutInfo watch');
				}

				if (this.checkoutInfo.error) {
					switch (this.checkoutInfo.error) {
						case 'address':
							uni.showModal({
								content: this.$t('lang.goto_add_address'),
								success: (res) => {
									if (res.confirm) {
										uni.navigateTo({
											url: '/pagesB/address/addressEdit'
										})
									} else if (res.cancel) {
										uni.switchTab({
											url: '/pages/cart/cart'
										})
									}
								}
							});
							break
						case 'excess':
							uni.showModal({
								content: this.checkoutInfo.msg,
								showCancel: false,
								confirmText: this.$t('lang.back'),
								success: (res) => {
									if (res.confirm) {
										uni.switchTab({
											url: '/pages/cart/cart'
										})
									}
								}
							})
							break
					}

					return false
				}

				const balanceMethod = (this.payment_method || []).find(item => item.pay_id === 11 || item.pay_name === this.balancePaymentLabel);

				//默认选中支付  is_checked  = 1
				if (this.pay_name == '') {
					if (Array.isArray(this.payment_method) && this.payment_method.length > 0) {
						this.payment_method.forEach(v => {
							if (v.is_checked == 1) {
								this.pay_name = v.pay_name
								this.pay_id = v.pay_id
								this.pay_code = v.pay_code
								this.balance_money = v.use_list && v.use_list.money ? v.use_list.money : 0
								// 【关键修复】如果用户已开启信用付，保持计算的值，不使用后端返回的值
								if (this.use_credit_val !== 1) {
									this.surplus_credit_line = v.use_list && v.use_list.surplus_credit_line ? v.use_list.surplus_credit_line : 0
								}
							}
						})
					}
				} else if (this.pay_id === 11 || this.pay_name == this.balancePaymentLabel) {
					this.balance_money = this.balance_money || (balanceMethod && balanceMethod.use_list && balanceMethod.use_list.money) || 0
					// 【关键修复】如果用户已开启信用付，保持计算的值，不使用后端返回的值
					if (this.use_credit_val !== 1) {
						this.surplus_credit_line = this.surplus_credit_line || (balanceMethod && balanceMethod.use_list && balanceMethod.use_list.surplus_credit_line) || 0
					}
				}

			this.payDisplayName = this.pay_name;
			this.submit_pay_id = this.pay_id;
			this.submit_pay_code = this.pay_code;
			
			// 【关键修复】只有在用户没有明确关闭余额开关时，才根据 pay_id 判断
			// 如果用户明确关闭了余额开关（userBalanceModified = true），保持用户的选择
			// 【新增逻辑】如果储值卡数据尚未就绪（valueCardLoaded 为 false），不在这里自动开启余额，
			// 避免在后续储值卡完全覆盖时出现“余额先开启再关闭”的闪烁，由 ensurePaymentPriority 统一处理
			if (!this.userBalanceModified) {
				if (!this.valueCardLoaded) {
					// 初次进入且储值卡数据未加载完成：保持余额关闭状态
					this.balancePaymentActive = false;
					this.use_surplus_val = 0;
				} else {
					const shouldBeActive = (this.pay_id === 11 || this.pay_name === this.balancePaymentLabel);
					this.balancePaymentActive = shouldBeActive;
					this.use_surplus_val = shouldBeActive ? 1 : 0; // 【修复】与balancePaymentActive严格同步
				}
			}
			// 如果用户明确修改过，保持当前状态（不重新设置）

			// 【修复】确保按钮状态与 payment_info 同步
			if (this.balancePaymentActive && !this.userBalanceModified) {
				// 【关键修复】只有在用户没有明确关闭余额开关时，才自动设置 use_surplus_val
				const activeBalanceOption = balanceMethod || this.getBalancePaymentOption();
				const availableBalance = activeBalanceOption && activeBalanceOption.use_list ? Number(activeBalanceOption.use_list
					.money || 0) : 0;
				const availableCredit = activeBalanceOption && activeBalanceOption.use_list ? Number(activeBalanceOption.use_list
					.surplus_credit_line || 0) : 0;

				this.balance_money = availableBalance;
			// 【关键修复】surplus_credit_line 是已使用的信用付金额，应该由后续计算得出，所以重置为0
				this.surplus_credit_line = 0;
				this.balance_money_available = availableBalance;
				this.surplus_credit_line_available = availableCredit;

				this.balancePaymentActive = true;
			this.use_surplus_val = 1; // 【修复】与balancePaymentActive严格同步
			// 【关键修复】不要在这里强制重置 use_credit_val，让 ensurePaymentPriority 来决定是否应该开启信用付
			// 如果余额已开启且有剩余金额需要信用付，ensurePaymentPriority 会自动开启
			// this.use_credit_val = 0; // 已移除：让 ensurePaymentPriority 来决定
			// 【修复】确保在按钮状态正确时才计算 payment_info
			this.applyBalancePaymentState({
				silent: true
			});
			} else if (this.balancePaymentActive && this.userBalanceModified) {
				// 【修复】如果 balancePaymentActive 为 true 但 userBalanceModified 为 true
				// 需要确保 use_surplus_val 与 balancePaymentActive 同步，并重新计算 payment_info
				if (this.use_surplus_val === 0) {
					this.use_surplus_val = 1;
				}
				// 重新计算 payment_info，确保与按钮状态同步
				this.applyBalancePaymentState({
					silent: true
				});
			} else {
					// 【修复】确保balancePaymentActive为false时，use_surplus_val同步为0
					// 如果balancePaymentActive为true但userBalanceModified为true，保持用户的选择，不修改use_surplus_val
					
					// 【关键修复】即使 balancePaymentActive 为 false，也应该初始化 surplus_credit_line_available
					// 这样可以确保先用后付行能够正确显示（只要后端返回了信用付额度）
					const activeBalanceOption = balanceMethod || this.getBalancePaymentOption();
					if (activeBalanceOption && activeBalanceOption.use_list) {
						const availableCredit = Number(activeBalanceOption.use_list.surplus_credit_line || 0);
						if (availableCredit > 0) {
							this.surplus_credit_line_available = availableCredit;
						}
					}
					
					if (!this.balancePaymentActive) {
					this.use_surplus_val = 0;
						// 【关键修复】如果按钮关闭，重置 payment_info
						// 但是，如果API回调已经更新了remaining_debt（通过检查checkoutInfo.total.amount），不要覆盖
						const latestTotal = this.checkoutInfo && this.checkoutInfo.total ? this.checkoutInfo.total : this.total;
						const apiAmount = latestTotal && latestTotal.amount !== undefined ? Number(latestTotal.amount) : null;
						
						// 如果API已经返回了正确的amount，使用API返回的值更新remaining_debt，而不是重置
						if (apiAmount !== null && apiAmount > 0) {
							if (this.payment_info) {
								this.$set(this.payment_info, 'remaining_debt', this.moneyPrecision(apiAmount));
							}
						} else {
							// 如果API还没有返回，使用正确的原始金额（goods_price + shippingFee - couponsMoney）
							const goodsPrice = latestTotal && latestTotal.goods_price ? Number(latestTotal.goods_price) : 0;
							const shippingFee = this.shippingFee ? Number(this.shippingFee) : 0;
							const couponsMoney = Number(this.couponsObject && this.couponsObject.couponsMoney ? this.couponsObject.couponsMoney : 0);
							const resetAmountSource = this.moneyPrecision(goodsPrice + shippingFee - couponsMoney);
							this.resetPaymentStatus(resetAmountSource);
						}
					}
					this.use_credit_val = 0;
					this.payDisplayName = this.pay_name;
					this.submit_pay_id = this.pay_id;
					this.submit_pay_code = this.pay_code;
					const currentOption = this.collectCurrentPaymentOption();
					if (currentOption) {
						this.rememberLastNonBalancePayment(currentOption);
					}
					if (!this.balancePaymentActive) {
					this.princeType = false;
					}
				}

				// 【修复】Android 上的异步时序问题
				// 使用 Promise 确保状态同步，避免时序问题
				this.$nextTick(() => {
					// 确保在下一个事件循环中执行，但使用 Promise 确保状态已同步
					Promise.resolve().then(() => {
						// 再次检查状态是否同步
						if (this.balancePaymentActive && this.use_surplus_val === 0) {
							this.use_surplus_val = 1;
						}
						if (!this.balancePaymentActive && this.use_surplus_val !== 0) {
							this.use_surplus_val = 0;
						}
					this.ensurePaymentPriority();
					});
				});

				//是否是门店商品
				if (this.storeCart) {
					this.store_type = ''
					this.store_mobile = this.storeCart.store_mobile
					this.take_time = this.storeCart.take_time
				}

				//跨境身份证信息
				if (this.checkoutInfo.consignee) {
					this.checkout_real_id = this.checkoutInfo.consignee.id_num
					this.checkout_real_name = this.checkoutInfo.consignee.rel_name
				}

				//发票内容
				if (this.checkoutInfo.can_invoice == 1) {
					this.invoice.invoiceConent = this.invoiceValue[0]
				}

				// 领券购买
				if (this.uc_id > 0) {
					this.submitCoupons(this.uc_id)
				}

				//立即付款可以点击
				this.disabled = false
				this.loading = false
			},
			payment_method() {
				if (this.payment_method == '' && !this.checkoutInfo.error) {
					uni.showToast({
						title: this.$t('lang.payment_method_not_installed'),
						icon: 'none'
					})
					return false
				}
			},
			processedGoodsList: {
				handler(newList) {
					this.initializeShopGoodsCollapsed(newList);
				},
				immediate: true
			},
			shipping() {
				this.shipping_id = [];
				this.shipping_code = [];
				this.shipping_name = [];
				this.format_shipping_fee = [];
				this.shipping_fee = [];
				this.shipping_type = [];
				this.rate_price = [];

				//获取默认配送放id,code,type
				this.shipping.forEach((v) => {
					if (v == undefined && this.store_id == 0) {
						this.shipping_name.push('')
						uni.showToast({
							title: this.$t('lang.noshipping_list_propmt'),
							icon: 'none'
						})
						return false
					}

					this.shipping_id.push(v.shipping_id)
					this.shipping_code.push(v.shipping_code)
					this.shipping_name.push(v.shipping_name)
