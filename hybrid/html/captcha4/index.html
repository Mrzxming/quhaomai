<!doctype html>
<html>

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="renderer" content="webkit">
    <meta name="viewport" content="width=device-width,initial-scale=1,minimum-scale=1,maximum-scale=1,user-scalable=no, viewport-fit=cover" />
    <title>请通过以下验证</title>
    <style>
        body {
            margin: 0;
        }

        .title {
            height: 18px;
            margin: 15px;
            font-size: 18px;
            line-height: 18px;
        }

        #log {
            display: none;
            margin: 0;
            word-break: break-all;
        }

        #log.log {
            display: block;
        }

        #captcha_index_loading {
            position: fixed;
            top: 50%;
            left: 50%;
            overflow: hidden;
            transform: translate(-50%, -50%);
        }

        #captcha {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 260px;
            height: 50px;
            transform: translate(-50%, -50%);
        }

        /* loading */
        .loader {
            width: 40px;
            height: 40px;
        }

        svg path,
        svg rect {
            fill: #3973ff;
        }
    </style>
</head>

<body>
    <div id="log"></div>
    <div id="captcha"></div>

    <div id="captcha_index_loading">
        <img class="captcha_index_img loader" id="captcha_img_loading" alt="加载中" style="display: none;">
    </div>
    <script>
        var debug = false;
        var logEle = document.getElementById('log');
        var isOffline = false;
        var indexVersion = '1.0.0';
        function log(str) {
            if (!debug) {
                return;
            }
            var p = document.createElement('p');
            p.appendChild(document.createTextNode(str));
            logEle.insertBefore(p, logEle.firstChild);
            console.log(str);
        }
        function newError(msg, code, detail) {
                return {
                    desc: {
                        indexVersion: indexVersion,
                        detail: detail
                    },
                    msg: msg,
                    code: code
                }
            }

        (function () {
            var jsBridge = (function () {

                var callbacks = {
                    showBox: function () {
                        captchaObj.showBox &&  captchaObj.showBox();
                    }
                };

                // URL scheme 通信：通过 iframe 导航触发 overrideUrlLoading
                function sendViaScheme(data) {
                    try {
                        var url = 'gt4bridge://msg?' + encodeURIComponent(JSON.stringify(data));
                        var f = document.createElement('iframe');
                        f.style.cssText = 'display:none;width:0;height:0;';
                        f.src = url;
                        document.body.appendChild(f);
                        setTimeout(function(){ try{ document.body.removeChild(f); }catch(e){} }, 200);
                    } catch(e) {
                        console.error('sendViaScheme error:', e);
                    }
                }

                return {
                    callback: function (type, data) {
                        return callbacks[type](data);
                    },
                    callNative: function(data){
                        // 优先走 URL scheme（最可靠）
                        sendViaScheme(data);
                    }
                }
            })();
            window.jsBridge = jsBridge;

            if (window.addEventListener) {
                window.addEventListener('error', function (e) {
                    jsBridge.callNative({
                        time:new Date().getTime(),
                        type: 'error',
                        data: newError("gt4-index error", 60302, e.message)
                    });
                })
            } else {
                window.onerror = function (e) {
                    jsBridge.callNative({
                        time:new Date().getTime(),
                        type: 'error',
                        data: newError("gt4-index error", 60302, e.message)
                    });
                }
            }
        })();
    </script>

    <script src="./ct4.js"></script>
    <script>
        (function () {
            var startTime = 0;
            var clearID = 0;
            var captcha = document.getElementById('captcha');
            var loadingEle = document.getElementById('captcha_index_loading');
            var img = document.getElementById('captcha_img_loading');

            var query = location.href.split('?')[1];
            var ua = navigator.userAgent.toLowerCase();
            if(/Android/.test(window.navigator.userAgent) && /android\s([\w.]+)/.exec(ua) && /android\s([\w.]+)/.exec(ua)[1] <= 4.3) {
                loadingEle.style.left = '45%';
            }
            
            if (typeof Object.assign != 'function') {
                Object.defineProperty(Object, "assign", {
                    value: function assign(target, varArgs) {
                    if (target == null) {
                        throw new TypeError('Cannot convert undefined or null to object');
                    }

                    var to = Object(target);

                    for (var index = 1; index < arguments.length; index++) {
                        var nextSource = arguments[index];

                        if (nextSource != null) {
                        for (var nextKey in nextSource) {
                            if (Object.prototype.hasOwnProperty.call(nextSource, nextKey)) {
                            to[nextKey] = nextSource[nextKey];
                            }
                        }
                        }
                    }
                    return to;
                    },
                    writable: true,
                    configurable: true
                });
            }
            var config = {
                product: 'bind',
                onError: function (e) {
                    e.desc = Object.assign({}, e.desc, { indexVersion: indexVersion });
                    jsBridge.callNative({
						time:new Date().getTime(),
                        type: 'error',
                        data: e
                    });
                }
            };
            function setDebug() {
                debug = true;
                logEle.className = 'log';
            }
            
            function paseURI() {
                return JSON.parse(decodeURIComponent(query.split('=')[1]));
            }

            function checkArgs(args) {
                img.src = args['loading'] ? args['loading'] : './gt4-loading.gif';

                clearID = setTimeout(function () {
                    img.style.display = 'inline-block';
                }, 200);

                if (args['debug']) {
                    setDebug(true);
                    startTime = (new Date()).getTime();
                    log(JSON.stringify(args))
                }

                if (args['title'] && args['title'] != "") {
                    var h3 = document.createElement('h3');
                    h3.className = 'title';
                    h3.appendChild(document.createTextNode(decodeURIComponent(args['title'])));
                    captcha.appendChild(h3);
                }

                if (!args['captchaId']) {
                    log('args error: ' + query);
                }

                if (args['useLocalOffline']) {
                    config.offlineCb = function () {

                        isOffline = true;

                        jsBridge.callNative({
							time:new Date().getTime(),
                            type: 'result',
                            data: {
                                captcha_id: args['captchaId'],
                                challenge: args['challenge'],
                                offline: true
                            }
                        });
                    }
                }
            }

            function mergeOptions(args) {
                for (var k in args) {
                    if (args.hasOwnProperty(k) &&
                        ['debug', 'title',  args['type']].indexOf(k) === -1) {
                        config[k] = args[k];
                    }
                }
            }

            if (!query) {
                setDebug();
                log('no query: ' + location.href);
                return false;
            }

            var args = paseURI(query);
            checkArgs(args);
            mergeOptions(args);

            var handler = function (captchaObj) {
                window.captchaObj = captchaObj;
                captchaObj
                    .appendTo(captcha)
                    .onSuccess(function () {
                        var result = captchaObj.getValidate();
                        log('Success validate: ' + result);
                        jsBridge.callNative({
							time:new Date().getTime(),
                            type: 'result',
                            data: result
                        });

                    })
                    .onReady(function () {
                        log('load time: ' + ((new Date()).getTime() - (startTime || 0)));
                        
                        jsBridge.callNative({
							time:new Date().getTime(),
                            type: 'ready',
                            data: {
                                ready: 0
                            }
                        })

                        if (!isOffline) {
                            jsBridge.callNative({
								time:new Date().getTime(),
                                type: 'get'
                            })
                        }

                        clearTimeout(clearID);
                        loadingEle.style.display = 'none';
                    })
                    .onClose(function () {

                        jsBridge.callNative({
							time:new Date().getTime(),
                            type: 'close'
                        });
                    })
                    .onError(function (e) {
                        e.desc && (e.desc.indexVersion = indexVersion);
                     
                        jsBridge.callNative({
							time:new Date().getTime(),
                            type: 'error',
                            data: e
                        });
                    })
                    .onFail(function (e) {
                    
                        jsBridge.callNative({
							time:new Date().getTime(),
                            type: 'fail',
                            data: e
                        });
                    })
            };
            
            try {
              window.initAlicom4(config, handler);
            } catch (error) {
              jsBridge.callNative({
				  time:new Date().getTime(),
                  type: 'error',
                  data: newError("gt4-index error", 60302, '加载验证过程中报错')
              });
            }

        })();

    </script>
</body>

</html>
